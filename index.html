<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CMM SMS Store - Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   MODERN DESIGN SYSTEM & VARIABLES
   ========================================================================= */
:root {
  /* Core Colors */
  --bg-app: #f8fafc;
  --surface: #ffffff;
  --brand-primary: #f59e0b;
  --brand-hover: #d97706;
  --brand-glow: rgba(245, 158, 11, 0.15);
  
  /* Slate/Navy Tones */
  --slate-900: #0f172a;
  --slate-800: #1e293b;
  --slate-700: #334155;
  --slate-600: #475569;
  --slate-500: #64748b;
  --slate-300: #cbd5e1;
  --slate-200: #e2e8f0;
  --slate-100: #f1f5f9;
  --slate-50:  #f8fafc;

  /* Status Colors */
  --success: #10b981;
  --success-bg: #d1fae5;
  --success-text: #065f46;
  --danger: #ef4444;
  --danger-bg: #fee2e2;
  --danger-text: #991b1b;
  --warning: #f59e0b;
  --warning-bg: #fef3c7;
  --warning-text: #92400e;

  /* Geometry & Shadows */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.025);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.025);
  --shadow-float: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
  
  /* Transitions */
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--slate-700);
  background-color: var(--bg-app);
  font-size: 14.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, .display {
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--slate-900);
  letter-spacing: -0.02em;
}

.mono, code, .tool-code, .qty { 
  font-family: 'JetBrains Mono', monospace; 
  font-size: 0.9em;
}
a { color: var(--brand-primary); text-decoration: none; transition: var(--transition); }
a:hover { color: var(--brand-hover); }
.hidden { display: none !important; }

/* =========================================================================
   TOP NAVIGATION
   ========================================================================= */
.topbar { 
  background: rgba(255, 255, 255, 0.85); 
  backdrop-filter: blur(12px); 
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--slate-200); 
  position: sticky; top: 0; z-index: 50; 
}
.topbar-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 32px; padding: 0 24px; height: 64px; }
.brand { display: flex; align-items: center; gap: 10px; color: var(--slate-900); font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.03em; white-space: nowrap; }
.brand-mark { color: var(--surface); background: var(--brand-primary); width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: transform 0.4s ease; box-shadow: 0 2px 8px var(--brand-glow); }
.brand:hover .brand-mark { transform: rotate(15deg) scale(1.05); }

.nav { display: flex; gap: 6px; flex: 1; }
.nav button.navlink {
  background: transparent; border: none; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--slate-500); font-size: 14px; font-weight: 600;
  padding: 8px 16px; border-radius: 99px; transition: var(--transition);
}
.nav button.navlink:hover { color: var(--slate-900); background: var(--slate-100); }
.nav button.navlink.active { color: var(--brand-primary); background: var(--brand-glow); }

.who { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
.who-name { color: var(--slate-800); font-size: 14px; font-weight: 600; }
.who-role { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 99px; font-weight: 600; }
.who-role.role-admin { background: var(--slate-900); color: var(--surface); }
.who-role.role-user { background: var(--slate-100); color: var(--slate-600); }

.status-bar { background: var(--slate-50); border-bottom: 1px solid var(--slate-200); }
.status-bar-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 6px 24px; gap: 14px; }
.status-sync { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--slate-500); font-weight: 500; }
.status-sync .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-clock { font-size: 12px; color: var(--slate-500); }
.link-btn { background: none; border: none; color: var(--slate-500); font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); }
.link-btn:hover { color: var(--danger); }

/* =========================================================================
   LAYOUT & CONTAINERS
   ========================================================================= */
.app-main { max-width: 1400px; margin: 0 auto; padding: 40px 24px 80px; animation: viewFadeIn 0.4s ease-out; }
@keyframes viewFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Login Screen Background */
.auth-main { min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background-color: var(--slate-50);
  background-image: radial-gradient(at 0% 0%, rgba(245, 158, 11, 0.08) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
  padding: 24px; }

.page-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
.page-head h1 { font-size: 32px; margin: 0; font-weight: 800; color: var(--slate-900); }
.page-sub { color: var(--slate-500); font-size: 15px; margin-top: 6px; }
.eyebrow { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brand-primary); display: block; margin-bottom: 8px; }

/* Panels / Cards */
.panel { background: var(--surface); border: 1px solid var(--slate-200); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); transition: var(--transition); overflow: hidden; margin-bottom: 24px;}
.panel:hover { box-shadow: var(--shadow-md); }
.panel-pad { padding: 32px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--slate-100); background: var(--surface); }
.panel-head h2 { font-size: 18px; margin: 0; font-weight: 700; }

/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 32px; }
.kpi { background: var(--surface); border: 1px solid var(--slate-200); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); transition: var(--transition); display: flex; flex-direction: column; justify-content: space-between;}
.kpi:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
.kpi-label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--slate-500); font-weight: 700; margin-bottom: 12px; }
.kpi-value { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 36px; color: var(--slate-900); line-height: 1; }

.kpi.warn .kpi-value { color: var(--brand-primary); }
.kpi.good .kpi-value { color: var(--success); }

/* =========================================================================
   MODERN DATA TABLES
   ========================================================================= */
.table-wrap { overflow-x: auto; width: 100%; }
table.reg { width: 100%; border-collapse: separate; border-spacing: 0; text-align: left; }
table.reg th { 
  background: var(--slate-50); color: var(--slate-500); padding: 14px 20px; 
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 700; 
  text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap;
  border-bottom: 1px solid var(--slate-200); border-top: 1px solid var(--slate-200);
}
table.reg td { 
  padding: 16px 20px; border-bottom: 1px solid var(--slate-100); 
  vertical-align: middle; white-space: nowrap; color: var(--slate-700); font-size: 14px;
}
table.reg tbody tr { transition: background 0.2s ease; background: var(--surface); }
table.reg tbody tr:hover { background: var(--slate-50); }

/* Badges */
.badge { display: inline-flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
.badge.good { background: var(--success-bg); color: var(--success-text); }
.badge.warn { background: var(--warning-bg); color: var(--warning-text); }
.badge.bad { background: var(--danger-bg); color: var(--danger-text); }

/* =========================================================================
   FORMS & BUTTONS
   ========================================================================= */
.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 24px; }
.form-grid .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 600; color: var(--slate-700); }

input, select, textarea {
  font-family: 'Inter', sans-serif; font-size: 14px; padding: 12px 16px; 
  border: 1px solid var(--slate-200); border-radius: var(--radius-sm); 
  background: var(--slate-50); color: var(--slate-900); width: 100%;
  transition: var(--transition);
}
input:hover, select:hover, textarea:hover { border-color: var(--slate-300); }
input:focus, select:focus, textarea:focus { 
  outline: none; background: var(--surface); border-color: var(--brand-primary); 
  box-shadow: 0 0 0 4px var(--brand-glow); 
}
textarea { resize: vertical; min-height: 90px; }

/* Action Buttons */
.btn { 
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; 
  font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 14px; 
  padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; 
  transition: var(--transition); white-space: nowrap;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.btn-primary { background: var(--brand-primary); color: #fff; box-shadow: 0 2px 4px var(--brand-glow); }
.btn-primary:hover:not(:disabled) { background: var(--brand-hover); box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); transform: translateY(-1px); }

.btn-dark { background: var(--slate-900); color: #fff; }
.btn-dark:hover { background: var(--slate-800); box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2); transform: translateY(-1px); }

.btn-ghost { background: var(--surface); color: var(--slate-700); border: 1px solid var(--slate-200); }
.btn-ghost:hover { background: var(--slate-50); border-color: var(--slate-300); color: var(--slate-900); }

.btn-danger { background: #fff; color: var(--danger); border: 1px solid var(--danger-bg); }
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }

.btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 6px;}

.actions-row { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
.filter-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; background: var(--surface); padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--slate-200); box-shadow: var(--shadow-sm);}
.filter-bar input[type="text"] { min-width: 280px; width: auto; background: var(--surface);}
.filter-bar select { width: auto; min-width: 140px; background: var(--surface);}

.alert { padding: 14px 18px; border-radius: var(--radius-sm); font-size: 14px; margin-bottom: 24px; font-weight: 500; display: flex; align-items: center; gap: 10px;}
.alert-error { background: var(--danger-bg); color: var(--danger-text); border: 1px solid rgba(239, 68, 68, 0.2); }
.alert-info { background: var(--warning-bg); color: var(--warning-text); border: 1px solid rgba(245, 158, 11, 0.2); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--slate-500); }
.empty-state .display { font-size: 18px; margin-bottom: 8px; color: var(--slate-900); font-weight: 700;}

/* =========================================================================
   LOGIN SCREEN
   ========================================================================= */
.auth-card { 
  width: 100%; max-width: 440px; background: var(--surface); 
  border-radius: var(--radius-lg); padding: 48px 40px; 
  box-shadow: var(--shadow-float); animation: authCardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
  border: 1px solid var(--slate-100);
}
@keyframes authCardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.auth-card .brand { justify-content: center; margin-bottom: 8px; font-size: 22px; }
.auth-sub { text-align: center; color: var(--slate-500); font-size: 14px; margin-bottom: 24px; }
.login-sync-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--slate-600); font-weight: 600; margin-bottom: 32px; padding: 8px 16px; background: var(--slate-50); border-radius: 99px; border: 1px solid var(--slate-200); }
.login-sync-row .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
.auth-card form { display: flex; flex-direction: column; gap: 20px; }
.auth-card .btn { justify-content: center; margin-top: 8px; padding: 12px; font-size: 15px;}
.auth-hint { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--slate-100); font-size: 12.5px; color: var(--slate-500); line-height: 1.6; text-align: center;}
.request-link-row { text-align: center; margin-top: 24px; }
.request-link-row button { background: none; border: none; color: var(--slate-600); font-size: 13.5px; font-weight: 600; cursor: pointer; transition: var(--transition); text-decoration: underline; text-underline-offset: 4px; }
.request-link-row button:hover { color: var(--brand-primary); }

/* Utilities */
.tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--slate-100); color: var(--slate-700); padding: 4px 8px; border-radius: 6px; border: 1px solid var(--slate-200);}
.muted { color: var(--slate-500); }
.qty-pending { color: var(--warning); font-weight: 700; }

/* Sync Dots */
.sync-dot-good { background: var(--success); box-shadow: 0 0 0 3px var(--success-bg); animation: pulseDot 2.5s infinite; }
.sync-dot-bad { background: var(--danger); box-shadow: 0 0 0 3px var(--danger-bg); }
@keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 3px var(--success-bg); } 50% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.15); } }

/* Storage Bar */
.storage-bar-wrap { margin-bottom: 24px; }
.storage-bar-track { width: 100%; height: 12px; border-radius: 99px; background: var(--slate-100); overflow: hidden; border: 1px solid var(--slate-200);}
.storage-bar-fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
.storage-legend-row { display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 8px 0; border-bottom: 1px solid var(--slate-100);}
.storage-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.1); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* =========================================================================
   MOBILE RESPONSIVENESS
   ========================================================================= */
@media (max-width: 860px) {
  .topbar-inner { flex-wrap: wrap; height: auto; padding: 12px 20px; gap: 12px; justify-content: space-between; }
  .brand { font-size: 16px; }
  .nav { order: 3; width: 100%; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav button.navlink { padding: 8px 14px; font-size: 13px; flex-shrink: 0; }
  .who-name { display: none; }
  
  .app-main { padding: 24px 16px 60px; }
  .page-head h1 { font-size: 24px; }
  .page-head .btn { width: 100%; }

  .form-grid { grid-template-columns: 1fr; gap: 16px; }
  .panel-pad { padding: 20px; }
  .panel-head { padding: 16px 20px; }

  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi { padding: 16px; }
  .kpi-value { font-size: 28px; }

  input, select, textarea { font-size: 16px; } /* Prevents iOS Zoom */
  .btn { width: 100%; }
  .actions-row { flex-direction: column; gap: 12px;}
  
  .filter-bar { flex-direction: column; align-items: stretch; gap: 12px;}
  .filter-bar input[type="text"], .filter-bar select { width: 100%; min-width: 0; }

  .auth-main { padding: 16px; align-items: flex-start; padding-top: 48px; }
  .auth-card { padding: 32px 24px; border-radius: var(--radius-md); }

  /* Mobile Tables */
  table.reg, table.reg thead, table.reg tbody, table.reg th, table.reg td, table.reg tr { display: block; }
  table.reg thead { display: none; }
  table.reg tr {
    background: var(--surface); border: 1px solid var(--slate-200); border-radius: var(--radius-md);
    margin-bottom: 16px; padding: 8px 16px; box-shadow: var(--shadow-sm);
  }
  table.reg td {
    display: flex; justify-content: space-between; align-items: center; gap: 16px;
    padding: 12px 0; border-bottom: 1px solid var(--slate-100); white-space: normal; text-align: right;
  }
  table.reg td:last-child { border-bottom: none; }
  table.reg td::before {
    content: attr(data-label); font-size: 12px; font-weight: 700; text-transform: uppercase; 
    color: var(--slate-500); text-align: left; flex-shrink: 0;
  }
  table.reg td:empty::before { content: none; }
  table.reg td:has(input), table.reg td:has(select) { flex-direction: column; align-items: stretch; gap: 8px; }
  table.reg td:has(input)::before, table.reg td:has(select)::before { text-align: left; }
  table.reg td:has(button) { justify-content: flex-end; flex-wrap: wrap;}
  table.reg td:has(button) .btn { width: auto; flex: 1;}
}
</style>
</head>
<body>

<div id="authScreen" class="auth-main hidden">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark">⚙</span>
      <span class="brand-text">CMM SMS <strong>STORE</strong></span>
    </div>
    <div class="auth-sub">Issue &amp; Return Register Workspace</div>

    <div id="loginSyncStatus" class="login-sync-row">
      <span class="sync-dot sync-dot-bad" id="loginSyncDot"></span>
      <span id="loginSyncLabel">Connecting to cloud...</span>
    </div>

    <div id="authError" class="alert alert-error hidden"></div>
    <div id="authInfo" class="alert alert-info hidden"></div>

    <form id="loginForm">
      <div class="field">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" required autocomplete="username" autocapitalize="none" placeholder="Enter your username" />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary" disabled>Log In to Dashboard</button>
    </form>

    <form id="requestForm" class="hidden">
      <div class="field">
        <label for="reqFullName">Full Name</label>
        <input type="text" id="reqFullName" required autocomplete="name" placeholder="John Doe" />
      </div>
      <div class="field">
        <label for="reqUsername">Desired Username</label>
        <input type="text" id="reqUsername" required autocomplete="username" autocapitalize="none" placeholder="johndoe" />
      </div>
      <div class="field">
        <label for="reqPassword">Desired Password</label>
        <input type="password" id="reqPassword" required minlength="4" autocomplete="new-password" placeholder="••••••••" />
      </div>
      <button type="submit" id="reqSubmitBtn" class="btn btn-primary" disabled>Submit Access Request</button>
    </form>

    <div class="request-link-row">
      <button type="button" id="showRequestForm">Need an account? Request access.</button>
      <button type="button" id="showLoginForm" class="hidden">← Back to secure login</button>
    </div>

    <div class="auth-hint" id="authHintText">
      Staff accounts require Administrator approval before logging in.
    </div>
  </div>
</div>

<div id="appScreen" class="hidden">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">⚙</span>
        <span class="brand-text">CMM SMS <strong>STORE</strong></span>
      </div>
      <nav class="nav" id="navLinks"></nav>
      <div class="who">
        <span class="who-name" id="whoName"></span>
        <span class="who-role" id="whoRole"></span>
        <button class="link-btn" id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-bar-inner">
        <span class="status-sync">
          <span class="sync-dot sync-dot-bad" id="appSyncDot"></span>
          <span id="appSyncLabel">Checking…</span>
        </span>
        <span class="status-clock mono" id="appClock"></span>
      </div>
    </div>
  </header>
  <main class="app-main" id="appMain"></main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getDatabase, ref, get, set, push, update, remove, onValue, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
import {
  getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

/* =========================================================================
   FIREBASE CONFIG
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyARRGKgQ_R_RFi40KXnhdmt6VZrVHVHgc0",
  authDomain: "store-issue-register.firebaseapp.com",
  databaseURL: "https://store-issue-register-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "store-issue-register",
  storageBucket: "store-issue-register.firebasestorage.app",

/* =========================================================================
   STATE & CORE LOGIC
   ========================================================================= */
let currentUser = null; 
let toolsCache = [];
let issuesCache = [];
let unsubTools = null;
let unsubIssues = null;
let unsubRequests = null;
let currentView = 'dashboard';

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const escapeHtml = (s) => (s ?? '').toString().replace(/[&<>"']/g, (c) => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[c]));
const todayStr = () => new Date().toISOString().slice(0, 10);

function showScreen(id) {
  ['authScreen', 'appScreen'].forEach((s) => {
    $('#' + s).classList.toggle('hidden', s !== id);
  });
}

let app, db, storage;
let cloudSyncOk = false;
let lastSyncedAt = null;
let appBootstrapped = false;
let clockStarted = false;
let cloudConnected = false;
let clockInterval = null;

const ADMIN_USERNAME = 'admin';
const ADMIN_PASSWORD = 'admin';
const SESSION_KEY = 'mechtools_session';

// Init
function startApp() {
  const saved = loadSession();
  if (saved) {
    currentUser = saved;
    initTopbar();
    showScreen('appScreen');
    navigateTo(currentUser.role === 'admin' ? 'admin-dashboard' : 'dashboard');
  } else {
    showScreen('authScreen');
  }
  attemptFirebaseInit();
}

function attemptFirebaseInit() {
  try {
    app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    try { storage = getStorage(app); } catch (e) { storage = null; }
  } catch (err) {
    console.error('Firebase init error:', err);
    return;
  }

  onValue(ref(db, '.info/connected'), (snap) => {
    const connected = snap.val() === true;
    cloudConnected = connected;
    if (connected) {
      lastSyncedAt = new Date();
      if (!appBootstrapped) {
        appBootstrapped = true;
        if (currentUser) listenToCollections();
      }
    }
    updateLoginSyncIndicator(connected);
    if (currentView === 'settings-admin') render();
  });
}

function updateLoginSyncIndicator(connected) {
  const dot = $('#loginSyncDot');
  const label = $('#loginSyncLabel');
  if (dot && label) {
    dot.className = 'sync-dot ' + (connected ? 'sync-dot-good' : 'sync-dot-bad');
    label.textContent = connected ? 'Cloud connected — Login enabled' : 'Cloud sync unavailable';
  }
  const loginBtn = $('#loginBtn');
  const reqBtn = $('#reqSubmitBtn');
  if (loginBtn) loginBtn.disabled = !connected;
  if (reqBtn) reqBtn.disabled = !connected;

  const appDot = $('#appSyncDot');
  const appLabel = $('#appSyncLabel');
  if (appDot && appLabel) {
    appDot.className = 'sync-dot ' + (connected ? 'sync-dot-good' : 'sync-dot-bad');
    appLabel.textContent = connected ? 'Cloud Connected' : 'Disconnected';
  }
}

function startLiveClock() {
  const clockEl = $('#appClock');
  if (!clockEl) return;
  if (clockInterval) clearInterval(clockInterval); 
  const tick = () => {
    const el = $('#appClock');
    if (!el) { clearInterval(clockInterval); clockStarted = false; return; }
    const now = new Date();
    el.textContent = now.toLocaleString(undefined, {
      weekday: 'short', day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  };
  tick();
  clockInterval = setInterval(tick, 1000); 
}

function saveSession(user) { try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch (e) {} }
function loadSession() { try { const raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
function clearSession() { try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {} }

function clearAuthMessages() { $('#authError').classList.add('hidden'); $('#authInfo').classList.add('hidden'); }
function showAuthError(msg) { $('#authInfo').classList.add('hidden'); $('#authError').textContent = msg; $('#authError').classList.remove('hidden'); }
function showAuthInfo(msg) { $('#authError').classList.add('hidden'); $('#authInfo').textContent = msg; $('#authInfo').classList.remove('hidden'); }

// Login Handlers
$('#loginForm').addEventListener('submit', async (e) => {
  e.preventDefault(); clearAuthMessages();
  if (!cloudConnected) return showAuthError('Cloud sync is not connected.');
  const username = $('#loginUsername').value.trim();
  const password = $('#loginPassword').value;
  const btn = $('#loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Logging in…';

  try {
    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      currentUser = { username: ADMIN_USERNAME, fullName: 'Administrator', role: 'admin' };
      saveSession(currentUser); initTopbar(); listenToCollections(); showScreen('appScreen'); navigateTo('admin-dashboard'); return;
    }
    const snap = await get(ref(db, 'users/' + username));
    if (!snap.exists() || snap.val().password !== password) return showAuthError('Incorrect username or password.');
    const record = snap.val();
    currentUser = { username, fullName: record.fullName || username, role: 'user', toolStockAuth: !!record.toolStockAuth };
    saveSession(currentUser); initTopbar(); listenToCollections(); showScreen('appScreen'); navigateTo('dashboard');
  } catch (err) {
    showAuthError('Login failed: ' + err.message);
  } finally { btn.disabled = false; btn.textContent = 'Log In to Dashboard'; }
});

$('#logoutBtn').addEventListener('click', () => {
  if (unsubTools) { unsubTools(); unsubTools = null; }
  if (unsubIssues) { unsubIssues(); unsubIssues = null; }
  if (unsubRequests) { unsubRequests(); unsubRequests = null; }
  currentUser = null; clearSession(); showScreen('authScreen');
});

$('#showRequestForm').addEventListener('click', () => {
  clearAuthMessages(); $('#loginForm').classList.add('hidden'); $('#requestForm').classList.remove('hidden');
  $('#showRequestForm').classList.add('hidden'); $('#showLoginForm').classList.remove('hidden');
});
$('#showLoginForm').addEventListener('click', () => {
  clearAuthMessages(); $('#requestForm').classList.add('hidden'); $('#loginForm').classList.remove('hidden');
  $('#showLoginForm').classList.add('hidden'); $('#showRequestForm').classList.remove('hidden');
});

$('#requestForm').addEventListener('submit', async (e) => {
  e.preventDefault(); clearAuthMessages();
  if (!cloudConnected) return showAuthError('Cloud sync is not connected.');
  const fullName = $('#reqFullName').value.trim();
  const username = $('#reqUsername').value.trim();
  const password = $('#reqPassword').value;
  const btn = $('#reqSubmitBtn');

  if (username.toLowerCase() === ADMIN_USERNAME) return showAuthError(`Username unavailable.`);
  if (/[.#$\[\]\/\s'"]/.test(username)) return showAuthError('Username contains invalid characters.');

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Submitting…';
  try {
    const existingUser = await get(ref(db, 'users/' + username));
    if (existingUser.exists()) return showAuthError('Username is already taken.');
    const existingReq = await get(ref(db, 'accessRequests/' + username));
    if (existingReq.exists()) return showAuthError('A request for this username is pending.');
    await set(ref(db, 'accessRequests/' + username), { fullName, password, requestedAt: serverTimestamp() });
    
    $('#requestForm').classList.add('hidden'); $('#showLoginForm').classList.add('hidden');
    $('#showRequestForm').classList.remove('hidden');
    showAuthInfo('Request submitted for admin approval.');
    $('#requestForm').reset();
  } catch (err) { showAuthError('Submit failed: ' + err.message);
  } finally { btn.disabled = false; btn.textContent = 'Submit Access Request'; }
});

startApp();

/* =========================================================================
   UI ROUTING & RENDERING
   ========================================================================= */
function initTopbar() {
  $('#whoName').textContent = currentUser.fullName || currentUser.username;
  $('#whoRole').textContent = currentUser.role;
  $('#whoRole').className = 'who-role role-' + currentUser.role;
  updateLoginSyncIndicator(cloudConnected);
  if (!clockStarted) { startLiveClock(); clockStarted = true; }

  const nav = $('#navLinks');
  const links = currentUser.role === 'admin'
    ? [['admin-dashboard', 'Dashboard'], ['register', 'Register'], ['tools-admin', 'Tools'], ['users-admin', 'Users'], ['settings-admin', 'Settings']]
    : [['dashboard', 'Dashboard'], ['register', 'Register'], ['issue-new', 'New Issue'], ...(currentUser.toolStockAuth ? [['tools-admin', 'Tools']] : [])];

  nav.innerHTML = links.map(([id, label]) => `<button class="navlink" data-view="${id}">${label}</button>`).join('');
  nav.querySelectorAll('.navlink').forEach((btn) => btn.addEventListener('click', () => navigateTo(btn.dataset.view)));

  if (currentUser.role === 'admin') {
    if (unsubRequests) { unsubRequests(); unsubRequests = null; }
    unsubRequests = onValue(ref(db, 'accessRequests'), (snap) => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      updatePendingRequestsNavBadge(count);
    });
  }
}

function updatePendingRequestsNavBadge(count) {
  const navBtn = document.querySelector('.navlink[data-view="users-admin"]');
  if (!navBtn) return;
  const existing = navBtn.querySelector('.pending-count-dot');
  if (existing) existing.remove();
  if (count > 0) {
    const dot = document.createElement('span');
    dot.className = 'badge bad';
    dot.style.marginLeft = '6px';
    dot.style.fontSize = '10px';
    dot.textContent = count;
    navBtn.appendChild(dot);
  }
}

function navigateTo(viewId) {
  currentView = viewId;
  $$('.navlink').forEach((btn) => btn.classList.toggle('active', btn.dataset.view === viewId));
  render();
}

function snapshotToArray(snap) {
  const val = snap.val(); return !val ? [] : Object.keys(val).map((key) => ({ id: key, ...val[key] }));
}

function listenToCollections() {
  if (unsubTools) unsubTools();
  if (unsubIssues) unsubIssues();
  unsubTools = onValue(ref(db, 'tools'), (snap) => { toolsCache = snapshotToArray(snap).sort((a, b) => (a.toolName || '').localeCompare(b.toolName || '')); render(); });
  unsubIssues = onValue(ref(db, 'issues'), (snap) => { issuesCache = snapshotToArray(snap).sort((a, b) => (b.issueDate || '').localeCompare(a.issueDate || '')); render(); });
}

function statusOf(issue) { return ((issue.qtyReturned || 0) >= issue.qtyIssued) ? 'Returned' : 'Issued'; }

function enrichedIssues() {
  return issuesCache.map((i) => {
    let displayName = i.materialName;
    if (!displayName && i.toolId) { const legacyTool = toolsCache.find((t) => t.id === i.toolId); displayName = legacyTool ? legacyTool.toolName : '(unknown)'; }
    return { ...i, materialName: displayName || '(unnamed)', status: statusOf(i) };
  });
}

function render() {
  if (!currentUser) return;
  const main = $('#appMain');
  const adminOnlyViews = ['admin-dashboard', 'users-admin', 'settings-admin', 'edit-return'];
  
  if (currentUser.role !== 'admin' && currentView === 'tools-admin' && !currentUser.toolStockAuth) currentView = 'dashboard';
  if (currentUser.role !== 'admin' && adminOnlyViews.includes(currentView)) currentView = 'dashboard';
  if (currentUser.role === 'admin' && ['dashboard'].includes(currentView)) currentView = 'admin-dashboard';

  const views = {
    'dashboard': renderUserDashboard, 'admin-dashboard': renderAdminDashboard, 'register': renderRegister,
    'issue-new': renderIssueForm, 'tools-admin': renderToolsAdmin, 'users-admin': renderUsersAdmin,
    'settings-admin': renderSettingsAdmin, 'return-record': renderReturnForm, 'edit-return': renderEditReturnForm,
    'edit-issue': renderEditIssueForm, 
  };
  
  main.innerHTML = (views[currentView] || renderUserDashboard)();
  wireViewEvents(currentView);
}

function statsSummary() {
  const issues = enrichedIssues();
  return { total: issues.length, pending: issues.filter((i) => i.status === 'Issued').length, returned: issues.filter((i) => i.status === 'Returned').length };
}

let registerFilterState = { q: '', status: 'all', month: 'all', year: 'all' };

function formatTimestamp(ms) {
  if (!ms || typeof ms !== 'number') return '—';
  return new Date(ms).toLocaleString(undefined, { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function renderRegister() {
  const isAdmin = currentUser.role === 'admin';
  let rows = enrichedIssues();

  if (registerFilterState.q) {
    const needle = registerFilterState.q.toLowerCase();
    rows = rows.filter((r) => (r.materialName||'').toLowerCase().includes(needle) || (r.vendor||'').toLowerCase().includes(needle) || (r.area||'').toLowerCase().includes(needle) || (r.supervisorName||'').toLowerCase().includes(needle) || (r.empCode||'').toLowerCase().includes(needle));
  }
  if (registerFilterState.status !== 'all') rows = rows.filter((r) => r.status.replace(/\s/g, '').toLowerCase() === registerFilterState.status);
  if (registerFilterState.year !== 'all') rows = rows.filter(r => r.issueDate && r.issueDate.startsWith(registerFilterState.year));
  if (registerFilterState.month !== 'all') rows = rows.filter(r => r.issueDate && r.issueDate.split('-')[1] === registerFilterState.month);

  return `
    <div class="page-head">
      <div><span class="eyebrow">Records</span><h1>${isAdmin ? 'Full Register' : 'Issue & Return Register'}</h1></div>
      <button class="btn btn-primary" data-nav="issue-new">+ New Issue</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="regSearch" placeholder="Search material, vendor, area..." value="${escapeHtml(registerFilterState.q)}" />
      <select id="regStatus">
        <option value="all" ${registerFilterState.status === 'all' ? 'selected' : ''}>All Statuses</option>
        <option value="issued" ${registerFilterState.status === 'issued' ? 'selected' : ''}>Issued</option>
        <option value="returned" ${registerFilterState.status === 'returned' ? 'selected' : ''}>Returned</option>
      </select>
      <select id="regYear">
        <option value="all" ${registerFilterState.year === 'all' ? 'selected' : ''}>All Years</option>
        ${['2024','2025','2026','2027','2028'].map(y => `<option value="${y}" ${registerFilterState.year === y ? 'selected' : ''}>${y}</option>`).join('')}
      </select>
      <select id="regMonth">
        <option value="all" ${registerFilterState.month === 'all' ? 'selected' : ''}>All Months</option>
        ${['01','02','03','04','05','06','07','08','09','10','11','12'].map((m, i) => `<option value="${m}" ${registerFilterState.month === m ? 'selected' : ''}>${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][i]}</option>`).join('')}
      </select>
    </div>

    <div class="panel">
      <div class="table-wrap">
        ${rows.length === 0 ? `<div class="empty-state"><div class="display">No matching records</div><p>Try clearing your filters.</p></div>` : `
        <table class="reg">
          <thead>
            <tr>
              <th>Material</th><th>Qty</th><th>Vendor</th><th>Area</th>
              <th>Issue Date</th><th>Supervisor</th><th>Issued By</th>
              <th>Return Date</th><th>Returned At</th><th>R-Qty</th><th>Rem</th><th>Cond</th><th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((r) => {
              const qtyR = r.qtyReturned || 0;
              const qtyRem = r.qtyIssued - qtyR;
              return `
              <tr>
                <td data-label="Material" style="font-weight:600;">${escapeHtml(r.materialName)}</td>
                <td class="qty" data-label="Qty Issued">${r.qtyIssued}</td>
                <td data-label="Vendor">${escapeHtml(r.vendor) || '—'}</td>
                <td data-label="Area">${escapeHtml(r.area) || '—'}</td>
                <td class="mono" data-label="Issue Date">${escapeHtml(r.issueDate)}</td>
                <td data-label="Supervisor">${escapeHtml(r.supervisorName)}</td>
                <td data-label="Issued By">${escapeHtml(r.issuedByName)}</td>
                
                <td class="mono" data-label="Return Date">${escapeHtml(r.returnDate) || '—'}</td>
                <td class="mono" data-label="Returned At">${r.returnedAt ? formatTimestamp(r.returnedAt) : '—'}</td>
                
                <td class="qty" data-label="Qty Returned">${qtyR}</td>
                <td class="qty ${qtyRem > 0 && r.status !== 'Returned' ? 'qty-pending' : ''}" data-label="Remaining">${qtyRem > 0 ? qtyRem : '—'}</td>
                <td data-label="Condition">${escapeHtml(r.conditionOnReturn) || '—'}</td>
                <td data-label="Status">${r.status === 'Returned' ? '<span class="badge good">Returned</span>' : '<span class="badge warn">Issued</span>'}</td>
                <td data-label="Action" style="display:flex; gap:8px; justify-content:flex-end;">
                  ${r.status !== 'Returned' ? `<button class="btn btn-dark btn-sm" data-return="${r.id}">Return</button> <button class="btn btn-ghost btn-sm" data-edit-issue="${r.id}">Edit</button>` : ''}
                  ${isAdmin && r.status === 'Returned' ? `<button class="btn btn-ghost btn-sm" data-edit-return="${r.id}">Edit Rtn</button>` : ''}
                  ${isAdmin ? `<button class="btn btn-danger btn-sm" data-delete-issue="${r.id}">Del</button>` : ''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
      </div>
    </div>`;
}

let returnFormTargetId = null; let returnFormError = ''; let returnSelectedPhotoFile = null;

// Storage UI
function renderStorageUsage() {
  const holder = $('#storageUsageHolder'); if (!holder) return;
  const LIMIT_KB = 1024 * 1024; 
  let usersKB = 0;
  get(ref(db, 'users')).then((snap) => { const v=snap.val(); usersKB = v?new Blob([JSON.stringify(v)]).size/1024:0; }).catch(()=>{})
  .finally(() => {
    const k1 = new Blob([JSON.stringify(toolsCache)]).size/1024;
    const k2 = new Blob([JSON.stringify(issuesCache)]).size/1024;
    const usedKB = k1 + k2 + usersKB; const pct = Math.min(100, (usedKB/LIMIT_KB)*100);
    holder.innerHTML = `<div class="storage-bar-wrap"><div class="storage-bar-track"><div class="storage-bar-fill" style="width:${pct}%;background:var(--brand-primary);"></div></div><div style="display:flex;justify-content:space-between;font-size:12px;margin-top:8px;color:var(--slate-500);"><span>${usedKB.toFixed(2)} KB used</span><span>${pct.toFixed(2)}% of 1GB free</span></div></div>`;
  });
}
/* =========================================================================
   EVENT WIRING & DATA OPERATIONS
   ========================================================================= */
// FIX 1: Prevent form disappearing by isolating active form views
function listenToCollections() {
  if (unsubTools) unsubTools();
  if (unsubIssues) unsubIssues();
  
  const formViews = ['issue-new', 'edit-issue', 'return-record', 'edit-return'];
  
  unsubTools = onValue(ref(db, 'tools'), (snap) => { 
    toolsCache = snapshotToArray(snap).sort((a, b) => (a.toolName || '').localeCompare(b.toolName || '')); 
    if (!formViews.includes(currentView)) render(); 
  });
  unsubIssues = onValue(ref(db, 'issues'), (snap) => { 
    issuesCache = snapshotToArray(snap).sort((a, b) => (b.issueDate || '').localeCompare(a.issueDate || '')); 
    if (!formViews.includes(currentView)) render(); 
  });
}

function wireViewEvents(viewId) {
  $$('[data-nav]').forEach((btn) => btn.addEventListener('click', () => navigateTo(btn.dataset.nav)));

  if (viewId === 'register') {
    const rf = () => { render(); const sb = $('#regSearch'); if(sb){ sb.focus(); sb.setSelectionRange(sb.value.length, sb.value.length); }};
    $('#regSearch')?.addEventListener('input', (e) => { registerFilterState.q = e.target.value; rf(); });
    $('#regStatus')?.addEventListener('change', (e) => { registerFilterState.status = e.target.value; render(); });
    $('#regYear')?.addEventListener('change', (e) => { registerFilterState.year = e.target.value; render(); });
    $('#regMonth')?.addEventListener('change', (e) => { registerFilterState.month = e.target.value; render(); });
    
    $$('[data-return]').forEach((btn) => btn.addEventListener('click', () => { returnFormTargetId = btn.dataset.return; returnFormError = ''; navigateTo('return-record'); }));
    $$('[data-delete-issue]').forEach((btn) => btn.addEventListener('click', () => { if (confirm('Delete this register entry permanently?')) deleteIssue(btn.dataset.deleteIssue); }));
    $$('[data-edit-return]').forEach((btn) => btn.addEventListener('click', () => { editReturnTargetId = btn.dataset.editReturn; editReturnError = ''; navigateTo('edit-return'); }));
    $$('[data-edit-issue]').forEach((btn) => btn.addEventListener('click', () => { editIssueTargetId = btn.dataset.editIssue; editIssueError = ''; navigateTo('edit-issue'); }));
  }

  // FIX 2 & 3: Clean event wiring for all photo inputs
  if (viewId === 'issue-new') {
    $('#issueForm').addEventListener('submit', handleIssueSubmit);
    $('#f_photo').addEventListener('change', (e) => handlePhotoSelect(e, 'f'));
    $('#f_photoClear').addEventListener('click', () => handlePhotoClear('f'));
  }
  if (viewId === 'edit-issue') {
    $('#editIssueForm').addEventListener('submit', handleEditIssueSubmit);
    $('#ei_photo').addEventListener('change', (e) => handlePhotoSelect(e, 'ei'));
    $('#ei_photoClear').addEventListener('click', () => handlePhotoClear('ei'));
  }
  if (viewId === 'return-record') {
    $('#returnForm').addEventListener('submit', handleReturnSubmit);
    $('#r_photo').addEventListener('change', (e) => handlePhotoSelect(e, 'r'));
    $('#r_photoClear').addEventListener('click', () => handlePhotoClear('r'));
  }
  if (viewId === 'edit-return') {
    $('#editReturnForm').addEventListener('submit', handleEditReturnSubmit);
    $('#er_photo').addEventListener('change', (e) => handlePhotoSelect(e, 'er'));
    $('#er_photoClear').addEventListener('click', () => handlePhotoClear('er'));
  }

  if (viewId === 'tools-admin') {
    $('#newToolForm').addEventListener('submit', handleNewToolSubmit);
    $$('[data-save-tool]').forEach((btn) => btn.addEventListener('click', () => handleSaveTool(btn.dataset.saveTool)));
    $$('[data-delete-tool]').forEach((btn) => btn.addEventListener('click', () => handleDeleteTool(btn.dataset.deleteTool)));
  }
  if (viewId === 'users-admin') {
    $('#newUserForm').addEventListener('submit', handleNewUserSubmit);
    loadRequestsTable(); loadUsersTable();
  }
  if (viewId === 'settings-admin') { renderStorageUsage(); $('#refreshSyncStatusBtn')?.addEventListener('click', render); }
}

// --- REUSABLE PHOTO HANDLERS ---
let selectedPhotos = { f: null, ei: null, r: null, er: null };

function handlePhotoSelect(e, prefix) {
  const file = e.target.files && e.target.files[0];
  if (!file) { handlePhotoClear(prefix); return; }
  if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
  if (file.size > 5 * 1024 * 1024) { alert('Image must be under 5 MB.'); e.target.value = ''; return; }
  
  selectedPhotos[prefix] = file;
  const reader = new FileReader();
  reader.onload = () => { $(`#${prefix}_photoPreview`).src = reader.result; $(`#${prefix}_photoPreviewWrap`).style.display = 'block'; };
  reader.readAsDataURL(file);
  $(`#${prefix}_photoClear`).dataset.deleted = "false"; // Reset deletion flag
}

function handlePhotoClear(prefix) {
  selectedPhotos[prefix] = null;
  const input = $(`#${prefix}_photo`);
  if (input) input.value = '';
  $(`#${prefix}_photoPreviewWrap`).style.display = 'none';
  $(`#${prefix}_photoClear`).dataset.deleted = "true"; // Flag that user explicitly removed photo
}

async function uploadPhoto(file, path) {
  if (!storage) throw new Error("Storage not initialized");
  const fileRef = storageRef(storage, path);
  await uploadBytes(fileRef, file);
  return await getDownloadURL(fileRef);
}

// Issue Submit
async function handleIssueSubmit(e) {
  e.preventDefault(); issueFormError = '';
  const payload = {
    materialName: $('#f_material').value.trim(), qtyIssued: parseInt($('#f_qty').value, 10),
    vendor: $('#f_vendor').value.trim(), area: $('#f_area').value.trim(), issueDate: $('#f_issueDate').value,
    supervisorName: $('#f_supervisorName').value.trim(), supervisorContact: $('#f_supervisorContact').value.trim(),
    empCode: $('#f_empCode').value.trim(), remarks: $('#f_remarks').value.trim(),
    returnDate: null, qtyReturned: 0, conditionOnReturn: null,
    issuedBy: currentUser.username, issuedByName: currentUser.fullName,
    createdAt: serverTimestamp(), updatedAt: serverTimestamp()
  };
  
  const btn = $('#issueSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  
  try {
    const newRef = push(ref(db, 'issues'));
    
    if (selectedPhotos['f'] && storage) {
      const ext = selectedPhotos['f'].name.split('.').pop() || 'jpg';
      const path = `issue-photos/${newRef.key}.${ext}`;
      payload.photoUrl = await uploadPhoto(selectedPhotos['f'], path);
      payload.photoPath = path;
    }

    await set(newRef, payload);
    selectedPhotos['f'] = null;
    navigateTo('register');
  } catch (err) { issueFormError = err.message; render(); }
}

// Edit Issue Submit
async function handleEditIssueSubmit(e) {
  e.preventDefault(); editIssueError = '';
  const issue = issuesCache.find((i) => i.id === editIssueTargetId); if (!issue) return;
  const qty = parseInt($('#ei_qty').value, 10);
  if (qty < (issue.qtyReturned || 0)) { editIssueError = 'Quantity issued cannot be less than returned.'; return render(); }
  
  const btn = $('#editIssueSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  
  try {
    const updates = {
      materialName: $('#ei_material').value.trim(), qtyIssued: qty, vendor: $('#ei_vendor').value.trim(),
      area: $('#ei_area').value.trim(), issueDate: $('#ei_issueDate').value, supervisorName: $('#ei_supervisorName').value.trim(),
      supervisorContact: $('#ei_supervisorContact').value.trim(), empCode: $('#ei_empCode').value.trim(), remarks: $('#ei_remarks').value.trim(), updatedAt: serverTimestamp()
    };

    const newPhoto = selectedPhotos['ei'];
    const wantsDeleted = $('#ei_photoClear').dataset.deleted === "true";

    if ((newPhoto || wantsDeleted) && issue.photoPath && storage) {
      try { await deleteObject(storageRef(storage, issue.photoPath)); } catch(_) {}
      if (wantsDeleted && !newPhoto) { updates.photoUrl = null; updates.photoPath = null; }
    }

    if (newPhoto && storage) {
      const ext = newPhoto.name.split('.').pop() || 'jpg';
      const path = `issue-photos/${issue.id}.${ext}`;
      updates.photoUrl = await uploadPhoto(newPhoto, path);
      updates.photoPath = path;
    }

    await update(ref(db, 'issues/' + issue.id), updates);
    selectedPhotos['ei'] = null;
    $('#ei_photoClear').dataset.deleted = "false";
    navigateTo('register');
  } catch (err) { editIssueError = err.message; render(); }
}

// Return Submit
async function handleReturnSubmit(e) {
  e.preventDefault(); returnFormError = '';
  const issue = issuesCache.find((i) => i.id === returnFormTargetId); if (!issue) return;
  const qty = parseInt($('#r_qty').value, 10);
  
  const btn = document.querySelector('#returnForm button[type="submit"]');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…'; }
  
  try {
    const updates = {
      returnDate: $('#r_date').value, qtyReturned: (issue.qtyReturned || 0) + qty,
      conditionOnReturn: $('#r_condition').value, remarks: $('#r_remarks').value.trim(),
      updatedAt: serverTimestamp(), returnedAt: serverTimestamp()
    };

    if (selectedPhotos['r'] && storage) {
      const ext = selectedPhotos['r'].name.split('.').pop() || 'jpg';
      const path = `return-photos/${issue.id}.${ext}`;
      updates.returnPhotoUrl = await uploadPhoto(selectedPhotos['r'], path);
      updates.returnPhotoPath = path;
    }

    await update(ref(db, 'issues/' + issue.id), updates);
    selectedPhotos['r'] = null;
    navigateTo('register');
  } catch (err) { returnFormError = err.message; render(); }
}

async function deleteIssue(id) {
  try {
    const issue = issuesCache.find((i) => i.id === id);
    await remove(ref(db, 'issues/' + id));
    if (storage && issue) {
      if (issue.photoPath) { try { await deleteObject(storageRef(storage, issue.photoPath)); } catch (_) {} }
      if (issue.returnPhotoPath) { try { await deleteObject(storageRef(storage, issue.returnPhotoPath)); } catch (_) {} }
    }
  } catch (err) { alert(err.message); }
}
