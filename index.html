<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CMM SMS Store</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
<style>
:root {
  --steel-950: #14181d;
  --steel-900: #1b2128;
  --steel-800: #242b33;
  --steel-700: #323b46;
  --steel-600: #475160;
  --steel-300: #aab4c0;
  --steel-100: #e7eaee;
  --steel-50:  #f7f8fa;
  --amber: #e8a23a;
  --amber-dark: #c9821f;
  --amber-soft: #fbe6c4;
  --good: #3f8c5a;
  --good-soft: #dff0e3;
  --warn: #c9821f;
  --warn-soft: #fbe9cf;
  --bad: #b14a3f;
  --bad-soft: #f7dfdb;
  --radius: 10px;
  --radius-sm: 7px;
  --radius-lg: 16px;
  --shadow-xs: 0 1px 2px rgba(20,24,29,0.05);
  --shadow: 0 1px 3px rgba(20,24,29,0.06), 0 6px 16px rgba(20,24,29,0.06);
  --shadow-lg: 0 4px 6px rgba(20,24,29,0.05), 0 16px 36px rgba(20,24,29,0.10);
  --shadow-focus: 0 0 0 3px rgba(232,162,58,0.22);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--steel-900);
  background: linear-gradient(180deg, var(--steel-50) 0%, #eef0f3 100%);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
h1, h2, h3, .display {
  font-family: 'Barlow Condensed', 'Inter', sans-serif;
  font-weight: 800;
  letter-spacing: 0.01em;
  text-transform: uppercase;
  color: var(--steel-950);
}
.mono, code, .tool-code, .qty { font-family: 'IBM Plex Mono', monospace; }
a { color: var(--amber-dark); text-decoration: none; }
a:hover { text-decoration: underline; }
.hidden { display: none !important; }

/* Topbar */
.topbar { background: rgba(20,24,29,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.06); box-shadow: 0 1px 0 var(--amber), 0 8px 24px rgba(0,0,0,0.18); position: sticky; top: 0; z-index: 50; }
.topbar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 28px; padding: 0 24px; height: 60px; }
.brand { display: flex; align-items: center; gap: 8px; color: var(--steel-50); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 0.04em; white-space: nowrap; }
.brand-mark { color: var(--amber); font-size: 22px; display: inline-block; transform: translateY(-1px); transition: transform 0.4s var(--ease-out); }
.brand:hover .brand-mark { transform: translateY(-1px) rotate(45deg); }
.brand-text strong { color: var(--amber); font-weight: 800; }
.nav { display: flex; gap: 3px; flex: 1; }
.nav button.navlink {
  background: none; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
  color: var(--steel-300); font-size: 13.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.04em; padding: 9px 14px; border-radius: 999px; transition: background 0.2s var(--ease), color 0.2s var(--ease), transform 0.15s var(--ease);
}
.nav button.navlink:hover { color: #fff; background: rgba(255,255,255,0.08); }
.nav button.navlink:active { transform: scale(0.97); }
.nav button.navlink.active { color: var(--steel-950); background: var(--amber); box-shadow: 0 2px 8px rgba(232,162,58,0.35); }
.who { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.who-name { color: var(--steel-100); font-size: 13.5px; font-weight: 600; }
.who-role { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
.who-role.role-admin { background: var(--amber-soft); color: #6b4716; }
.who-role.role-user { background: var(--steel-700); color: var(--steel-100); }

.status-bar { background: rgba(0,0,0,0.18); border-top: 1px solid rgba(255,255,255,0.06); }
.status-bar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 5px 24px; gap: 14px; }
.status-sync { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--steel-300); font-weight: 600; }
.status-sync .sync-dot { width: 7px; height: 7px; }
.status-clock { font-size: 11.5px; color: var(--steel-300); letter-spacing: 0.02em; }
.link-btn { background: none; border: none; color: var(--steel-300); font-size: 13px; cursor: pointer; font-family: inherit; padding: 6px 4px; transition: color 0.2s var(--ease); }
.link-btn:hover { color: var(--amber); text-decoration: underline; }

/* Layout */
.app-main { max-width: 1280px; margin: 0 auto; padding: 32px 24px 64px; animation: viewFadeIn 0.35s var(--ease-out); }
@keyframes viewFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.auth-main { min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 20% 20%, rgba(232,162,58,0.12), transparent 45%),
  radial-gradient(circle at 85% 80%, rgba(63,140,90,0.08), transparent 40%),
  linear-gradient(160deg, var(--steel-950) 0%, var(--steel-900) 55%, var(--steel-800) 100%); padding: 24px; }

.page-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
.page-head h1 { font-size: 26px; margin: 0; }
.page-sub { color: var(--steel-600); font-size: 13.5px; margin-top: 4px; }
.eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber-dark); display: block; margin-bottom: 2px; }

.panel { background: #fff; border: 1px solid #e8eaed; border-radius: var(--radius-lg); box-shadow: var(--shadow); transition: box-shadow 0.25s var(--ease); }
.panel:hover { box-shadow: var(--shadow-lg); }
.panel-pad { padding: 22px 24px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #ebedf0; flex-wrap: wrap; gap: 10px; }
.panel-head h2 { font-size: 16px; margin: 0; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 28px; }
.kpi { background: #fff; border: 1px solid #e8eaed; border-left: 3px solid var(--steel-600); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow); transition: transform 0.25s var(--ease-out), box-shadow 0.25s var(--ease); }
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.kpi.amber { border-left-color: var(--amber); } .kpi.good { border-left-color: var(--good); }
.kpi.warn { border-left-color: var(--warn); } .kpi.bad { border-left-color: var(--bad); }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--steel-600); font-weight: 600; margin-bottom: 6px; }
.kpi-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 32px; color: var(--steel-950); line-height: 1; }

.table-wrap { overflow-x: auto; }
table.reg { width: 100%; border-collapse: collapse; font-size: 13.5px; }
table.reg th { background: var(--steel-950); color: var(--steel-100); text-align: left; padding: 11px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; white-space: nowrap; }
table.reg th:first-child { border-radius: var(--radius-lg) 0 0 0; }
table.reg th:last-child { border-radius: 0 var(--radius-lg) 0 0; }
table.reg td { padding: 11px 12px; border-bottom: 1px solid #eef0f2; vertical-align: middle; white-space: nowrap; transition: background 0.15s var(--ease); }
table.reg td input, table.reg td select { min-width: 90px; }
table.reg tbody tr { transition: background 0.15s var(--ease); }
table.reg tbody tr:hover { background: #fdf9f0; }
table.reg tbody tr:nth-child(even) { background: #fafbfc; }
table.reg tbody tr:nth-child(even):hover { background: #fdf9f0; }

.badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; padding: 4px 10px; border-radius: 999px; }
.badge.good { background: var(--good-soft); color: #1f5c34; }
.badge.warn { background: var(--warn-soft); color: #6b4716; }
.badge.bad { background: var(--bad-soft); color: #7a2c23; }
.badge.overdue { background: var(--bad); color: #fff; margin-left: 6px; }

.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 20px; }
.form-grid .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--steel-600); }
input, select, textarea {
  font-family: 'Inter', sans-serif; font-size: 14.5px; padding: 11px 13px; border: 1.5px solid #dde1e6;
  border-radius: var(--radius); background: #fff; color: var(--steel-900); width: 100%;
  transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease);
}
input:hover, select:hover, textarea:hover { border-color: #c5cad1; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--amber-dark); box-shadow: var(--shadow-focus); }
textarea { resize: vertical; min-height: 70px; }

.btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13.5px; text-transform: uppercase; letter-spacing: 0.03em; padding: 11px 20px; border-radius: var(--radius); border: none; cursor: pointer; transition: transform 0.15s var(--ease-out), filter 0.2s var(--ease), box-shadow 0.2s var(--ease); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; }
.btn-primary { background: var(--amber); color: var(--steel-950); box-shadow: 0 2px 8px rgba(232,162,58,0.3); }
.btn-primary:hover { filter: brightness(1.06); box-shadow: 0 4px 14px rgba(232,162,58,0.4); transform: translateY(-1px); }
.btn-dark { background: var(--steel-950); color: #fff; }
.btn-dark:hover { filter: brightness(1.3); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--steel-700); border: 1.5px solid #dde1e6; }
.btn-ghost:hover { background: var(--steel-50); border-color: #c5cad1; }
.btn-danger { background: var(--bad-soft); color: #7a2c23; }
.btn-danger:hover { filter: brightness(0.97); }
.btn-sm { padding: 6px 12px; font-size: 11.5px; }

.actions-row { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar input[type="text"] { min-width: 220px; width: auto; }
.filter-bar select { width: auto; min-width: 130px; }

.alert { padding: 12px 16px; border-radius: var(--radius); font-size: 13.5px; margin-bottom: 16px; font-weight: 500; }
.alert-error { background: var(--bad-soft); color: #7a2c23; border: 1px solid #e3b6af; }
.alert-info { background: var(--amber-soft); color: #6b4716; border: 1px solid #e9cb95; }
.alert-good { background: var(--good-soft); color: #1f5c34; border: 1px solid #b9dcc3; }

.empty-state { text-align: center; padding: 50px 20px; color: var(--steel-600); }
.empty-state .display { font-size: 20px; margin-bottom: 8px; color: var(--steel-700); }

.auth-card { width: 100%; max-width: 408px; background: #fff; border-radius: var(--radius-lg); padding: 38px 36px 32px; box-shadow: 0 24px 70px rgba(0,0,0,0.4), 0 2px 0 var(--amber); animation: authCardIn 0.5s var(--ease-out); }
@keyframes authCardIn { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
.auth-card .brand { color: var(--steel-950); justify-content: center; margin-bottom: 4px; font-size: 17px; }
.auth-sub { text-align: center; color: var(--steel-600); font-size: 13px; margin-bottom: 18px; }
.login-sync-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--steel-600); font-weight: 600; margin-bottom: 22px; padding: 8px 12px; background: var(--steel-50); border-radius: 999px; }
.login-sync-row .sync-dot { width: 8px; height: 8px; }
.auth-card form { display: flex; flex-direction: column; gap: 14px; }
.auth-card .btn { justify-content: center; margin-top: 6px; }
.auth-toggle { text-align: center; font-size: 13px; color: var(--steel-600); margin-top: 16px; }
.auth-toggle button { background: none; border: none; color: var(--amber-dark); font-weight: 600; cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0; transition: color 0.2s var(--ease); }
.auth-toggle button:hover { color: var(--amber); }
.auth-hint { margin-top: 18px; padding-top: 16px; border-top: 1px solid #eee; font-size: 11.5px; color: var(--steel-600); line-height: 1.6; }
.auth-hint code { background: var(--steel-50); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
.request-link-row { text-align: center; margin-top: 18px; }
.request-link-row button { background: none; border: none; color: var(--steel-600); font-size: 12.5px; cursor: pointer; font-family: inherit; padding: 4px; transition: color 0.2s var(--ease); }
.request-link-row button:hover { color: var(--amber-dark); }

.tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; background: var(--steel-100); color: var(--steel-700); padding: 2px 7px; border-radius: 4px; }
.muted { color: var(--steel-600); }
.section-divider { border: none; border-top: 1px solid #ebedf0; margin: 28px 0; }
.stock-low { color: var(--bad); font-weight: 700; }
.qty-pending { color: var(--warn); font-weight: 700; }

/* Settings page: sync status + storage usage */
.sync-status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.sync-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.sync-dot-good { background: var(--good); box-shadow: 0 0 0 4px var(--good-soft); animation: pulseDot 2.4s ease-in-out infinite; }
.sync-dot-bad { background: var(--bad); box-shadow: 0 0 0 4px var(--bad-soft); }
@keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 4px var(--good-soft); } 50% { box-shadow: 0 0 0 7px rgba(63,140,90,0.12); } }
.sync-status-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 17px; text-transform: uppercase; letter-spacing: 0.02em; }
.kv-grid { display: flex; flex-direction: column; gap: 0; border-top: 1px solid #ebedf0; margin-top: 6px; }
.kv-row { display: flex; justify-content: space-between; gap: 16px; padding: 10px 0; border-bottom: 1px solid #ebedf0; font-size: 13.5px; }
.kv-key { color: var(--steel-600); font-weight: 600; flex-shrink: 0; }
.kv-val { text-align: right; }

.storage-bar-wrap { margin-bottom: 20px; }
.storage-bar-track { width: 100%; height: 14px; border-radius: 999px; background: var(--steel-100); overflow: hidden; }
.storage-bar-fill { height: 100%; border-radius: 999px; transition: width 0.6s var(--ease-out); }
.storage-bar-caption { display: flex; justify-content: space-between; font-size: 12px; color: var(--steel-600); margin-top: 8px; }
.storage-legend { display: flex; flex-direction: column; gap: 9px; }
.storage-legend-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; }
.storage-legend-free { border-top: 1px solid #ebedf0; padding-top: 9px; margin-top: 2px; }
.storage-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.storage-legend-label { flex: 1; color: var(--steel-700); }
.storage-legend-val { font-weight: 700; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.12); border-top-color: var(--steel-950); border-radius: 50%; animation: spin 0.65s linear infinite; vertical-align: -2px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Pending request badge/list */
.request-card { border: 1.5px dashed var(--amber); background: var(--amber-soft); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.pending-count-dot { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: var(--bad); color: #fff; font-size: 10.5px; font-weight: 800; margin-left: 6px; }

@media (max-width: 760px) {
  .topbar-inner { flex-wrap: wrap; height: auto; padding: 10px 14px 8px; gap: 10px; justify-content: space-between; }
  .brand { font-size: 16px; flex-shrink: 0; }
  .who { 
    gap: 8px; 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; 
    flex-shrink: 1; 
    justify-content: flex-end; 
  }
  .who::-webkit-scrollbar { display: none; }
  
  .nav { order: 3; width: 100%; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav button.navlink { padding: 9px 13px; font-size: 12.5px; flex-shrink: 0; }
  .who-name { display: none; }
  
  .status-bar-inner { padding: 5px 14px; flex-wrap: wrap; gap: 4px 12px; justify-content: flex-start; }
  .status-clock { font-size: 10.5px; }
  .status-sync { font-size: 10.5px; }

  .app-main { padding: 18px 14px 48px; }
  .page-head { margin-bottom: 16px; }
  .page-head h1 { font-size: 21px; }
  .page-head .btn { width: 100%; justify-content: center; }

  .form-grid { grid-template-columns: 1fr; gap: 14px; }
  .panel-pad { padding: 16px; }
  .panel-head { padding: 13px 16px; }

  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
  .kpi { padding: 13px 14px; border-radius: var(--radius); }
  .kpi-value { font-size: 26px; }
  .kpi-label { font-size: 10px; }

  input, select, textarea { font-size: 16px; padding: 12px 13px; }
  .btn { width: 100%; justify-content: center; padding: 13px 18px; }
  .actions-row { flex-direction: column; }
  .actions-row .btn { width: 100%; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-bar input[type="text"] { min-width: 0; width: 100%; }
  .filter-bar select { width: 100%; }
  .filter-bar .btn { width: 100%; }

  .auth-main { padding: 16px; align-items: flex-start; padding-top: 48px; }
  .auth-card { padding: 28px 22px 24px; border-radius: var(--radius); max-width: 100%; }
  .auth-card .brand { font-size: 16px; }
  .login-sync-row { font-size: 11.5px; padding: 7px 10px; }

  table.reg, table.reg thead, table.reg tbody, table.reg th, table.reg td, table.reg tr {
    display: block;
  }
  table.reg thead { display: none; }
  table.reg tr {
    background: #fff; border: 1px solid #e8eaed; border-radius: var(--radius);
    margin-bottom: 12px; padding: 4px 14px; box-shadow: var(--shadow-xs);
  }
  table.reg tbody tr:nth-child(even) { background: #fff; }
  table.reg td {
    display: flex; justify-content: space-between; align-items: center; gap: 14px;
    padding: 10px 0; border-bottom: 1px solid #f0f1f3; white-space: normal;
    text-align: right;
  }
  table.reg td:last-child { border-bottom: none; }
  table.reg td::before {
    content: attr(data-label);
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--steel-600); text-align: left; flex-shrink: 0;
  }
  table.reg td:empty::before { content: none; }
  table.reg td:has(input), table.reg td:has(select) { flex-direction: column; align-items: stretch; gap: 6px; }
  table.reg td:has(input)::before, table.reg td:has(select)::before { text-align: left; }
  table.reg td input, table.reg td select { min-width: 0; }
  table.reg td:has(button) { justify-content: flex-end; }
  table.reg td:has(button) .btn { width: auto; }

  .kv-row { font-size: 13px; }
  .storage-legend-row { font-size: 13px; }
}

@media (max-width: 400px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .auth-card { padding: 24px 18px 20px; }
}
</style>
</head>
<body>

<div id="authScreen" class="auth-main hidden">
  <div class="auth-card">
    <div class="brand">
      <span class="brand-mark">⚙</span>
      <span class="brand-text">CMM SMS <strong>STORE</strong></span>
    </div>
    <div class="auth-sub">Issue &amp; Return Register — Store Access</div>

    <div id="loginSyncStatus" class="login-sync-row">
      <span class="sync-dot sync-dot-bad" id="loginSyncDot"></span>
      <span id="loginSyncLabel">Checking cloud connection…</span>
    </div>

    <div id="authError" class="alert alert-error hidden"></div>
    <div id="authInfo" class="alert alert-info hidden"></div>

    <form id="loginForm">
      <div class="field">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" required autocomplete="username" autocapitalize="none" />
      </div>
      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required autocomplete="current-password" />
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary" disabled>Log In</button>
    </form>

    <form id="requestForm" class="hidden">
      <div class="field">
        <label for="reqFullName">Full Name</label>
        <input type="text" id="reqFullName" required autocomplete="name" />
      </div>
      <div class="field">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getDatabase, ref, get, set, push, update, remove, onValue, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
import {
  getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

/* =========================================================================
   FIREBASE CONFIG
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyARRGKgQ_R_RFi40KXnhdmt6VZrVHVHgc0",
  authDomain: "store-issue-register.firebaseapp.com",
  databaseURL: "https://store-issue-register-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "store-issue-register",
  storageBucket: "store-issue-register.firebasestorage.app",
  messagingSenderId: "184487310656",
  appId: "1:184487310656:web:58be210595a80dfdbdf6a5"
};

/* =========================================================================
   STATE
   ========================================================================= */
let currentUser = null; 
let toolsCache = [];
let issuesCache = [];
let unsubTools = null;
let unsubIssues = null;
let unsubRequests = null;
let currentView = 'dashboard';

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const escapeHtml = (s) => (s ?? '').toString().replace(/[&<>"']/g, (c) => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[c]));
const todayStr = () => new Date().toISOString().slice(0, 10);

function showScreen(id) {
  ['authScreen', 'appScreen'].forEach((s) => {
    $('#' + s).classList.toggle('hidden', s !== id);
  });
}

const configIsPlaceholder = Object.values(firebaseConfig).some((v) => v.startsWith('YOUR_'));
let app, db, storage;
let cloudSyncOk = false;
let lastSyncedAt = null;
let appBootstrapped = false;
let clockStarted = false;
let cloudConnected = false;
let clockInterval = null;

const ADMIN_USERNAME = 'admin';
const ADMIN_PASSWORD = 'admin';
const SESSION_KEY = 'mechtools_session';

// =========================================================================
// APP BOOTSTRAPPING (Bypasses old loading screen)
// =========================================================================
function startApp() {
  const saved = loadSession();
  if (saved) {
    currentUser = saved;
    initTopbar();
    showScreen('appScreen');
    navigateTo(currentUser.role === 'admin' ? 'admin-dashboard' : 'dashboard');
  } else {
    showScreen('authScreen');
  }
  // Initialize Cloud Sync in the background
  attemptFirebaseInit();
}

function attemptFirebaseInit() {
  if (configIsPlaceholder) return;
  try {
    app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    try { storage = getStorage(app); } catch (e) { storage = null; }
  } catch (err) {
    console.error('Firebase init error:', err);
    return;
  }

  // Realtime Cloud Sync Check
  onValue(ref(db, '.info/connected'), (snap) => {
    const connected = snap.val() === true;
    cloudConnected = connected;
    if (connected) {
      lastSyncedAt = new Date();
      if (!appBootstrapped) {
        appBootstrapped = true;
        if (currentUser) listenToCollections();
      }
    }
    updateLoginSyncIndicator(connected);
    if (currentView === 'settings-admin') render();
  }, (err) => {
    console.error('Connectivity listener error:', err);
    cloudConnected = false;
    updateLoginSyncIndicator(false);
  });
}

function updateLoginSyncIndicator(connected) {
  const dot = $('#loginSyncDot');
  const label = $('#loginSyncLabel');
  if (dot && label) {
    dot.className = 'sync-dot ' + (connected ? 'sync-dot-good' : 'sync-dot-bad');
    label.textContent = connected ? 'Cloud connected — login enabled' : 'Cloud sync unavailable — login disabled';
  }

  const loginBtn = $('#loginBtn');
  const reqBtn = $('#reqSubmitBtn');
  if (loginBtn) loginBtn.disabled = !connected;
  if (reqBtn) reqBtn.disabled = !connected;

  const appDot = $('#appSyncDot');
  const appLabel = $('#appSyncLabel');
  if (appDot && appLabel) {
    appDot.className = 'sync-dot ' + (connected ? 'sync-dot-good' : 'sync-dot-bad');
    appLabel.textContent = connected ? 'Cloud Connected' : 'Cloud Disconnected';
  }
}

function startLiveClock() {
  const clockEl = $('#appClock');
  if (!clockEl) return;
  if (clockInterval) clearInterval(clockInterval); 
  const tick = () => {
    const el = $('#appClock');
    if (!el) { clearInterval(clockInterval); clockStarted = false; return; }
    const now = new Date();
    el.textContent = now.toLocaleString(undefined, {
      weekday: 'short', day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  };
  tick();
  clockInterval = setInterval(tick, 1000); 
}

function saveSession(user) { try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch (e) {} }
function loadSession() { try { const raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
function clearSession() { try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {} }

function clearAuthMessages() { $('#authError').classList.add('hidden'); $('#authInfo').classList.add('hidden'); }
function showAuthError(msg) { $('#authInfo').classList.add('hidden'); $('#authError').textContent = msg; $('#authError').classList.remove('hidden'); }
function showAuthInfo(msg) { $('#authError').classList.add('hidden'); $('#authInfo').textContent = msg; $('#authInfo').classList.remove('hidden'); }

// =========================================================================
// LOGIN FLOW
// =========================================================================
$('#loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAuthMessages();
  if (!cloudConnected) { showAuthError('Cloud sync is not connected. Login is disabled until the connection is restored.'); return; }
  const username = $('#loginUsername').value.trim();
  const password = $('#loginPassword').value;
  const btn = $('#loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Logging in…';

  try {
    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      currentUser = { username: ADMIN_USERNAME, fullName: 'Administrator', role: 'admin' };
      saveSession(currentUser);
      initTopbar();
      listenToCollections();
      showScreen('appScreen');
      navigateTo('admin-dashboard');
      return;
    }

    const snap = await get(ref(db, 'users/' + username));
    if (!snap.exists() || snap.val().password !== password) { showAuthError('Incorrect username or password.'); return; }
    const record = snap.val();
    
    currentUser = { 
      username, 
      fullName: record.fullName || username, 
      role: 'user',
      toolStockAuth: !!record.toolStockAuth 
    };
    
    saveSession(currentUser);
    initTopbar();
    listenToCollections();
    showScreen('appScreen');
    navigateTo('dashboard');
  } catch (err) {
    console.error(err);
    showAuthError('Unable to log in: failed to sync with cloud. (' + (err.message || 'unknown error') + ')');
  } finally {
    btn.disabled = false; btn.textContent = 'Log In';
  }
});

$('#logoutBtn').addEventListener('click', () => {
  if (unsubTools) { unsubTools(); unsubTools = null; }
  if (unsubIssues) { unsubIssues(); unsubIssues = null; }
  if (unsubRequests) { unsubRequests(); unsubRequests = null; }
  currentUser = null;
  clearSession();
  showScreen('authScreen');
});

$('#showRequestForm').addEventListener('click', () => {
  clearAuthMessages();
  $('#loginForm').classList.add('hidden'); $('#requestForm').classList.remove('hidden');
  $('#showRequestForm').classList.add('hidden'); $('#showLoginForm').classList.remove('hidden');
});
$('#showLoginForm').addEventListener('click', () => {
  clearAuthMessages();
  $('#requestForm').classList.add('hidden'); $('#loginForm').classList.remove('hidden');
  $('#showLoginForm').classList.add('hidden'); $('#showRequestForm').classList.remove('hidden');
});

$('#requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAuthMessages();
  if (!cloudConnected) { showAuthError('Cloud sync is not connected.'); return; }
  const fullName = $('#reqFullName').value.trim();
  const username = $('#reqUsername').value.trim();
  const password = $('#reqPassword').value;
  const btn = $('#reqSubmitBtn');

  if (username.toLowerCase() === ADMIN_USERNAME) { showAuthError(`"${ADMIN_USERNAME}" is reserved and can't be requested as a username.`); return; }
  if (/[.#$\[\]\/\s'"]/.test(username)) { showAuthError('Username can\'t contain spaces, quotes, or the characters . # $ [ ] /'); return; }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Submitting…';
  try {
    const existingUser = await get(ref(db, 'users/' + username));
    if (existingUser.exists()) { showAuthError('That username is already taken.'); return; }
    const existingReq = await get(ref(db, 'accessRequests/' + username));
    if (existingReq.exists()) { showAuthError('A request for that username is already pending approval.'); return; }
    await set(ref(db, 'accessRequests/' + username), { fullName, password, requestedAt: serverTimestamp() });
    
    $('#requestForm').classList.add('hidden'); $('#showLoginForm').classList.add('hidden');
    $('#showRequestForm').classList.remove('hidden');
    showAuthInfo('Request submitted. An Admin needs to approve it before you can log in — check back soon.');
    $('#requestForm').reset();
  } catch (err) {
    showAuthError('Unable to submit request: failed to sync with cloud.');
  } finally {
    btn.disabled = false; btn.textContent = 'Submit Request';
  }
});

// START APP IMMEDIATELY
startApp();

/* =========================================================================
   TOPBAR / NAV
   ========================================================================= */
function initTopbar() {
  $('#whoName').textContent = currentUser.fullName || currentUser.username;
  $('#whoRole').textContent = currentUser.role;
  $('#whoRole').className = 'who-role role-' + currentUser.role;
  updateLoginSyncIndicator(cloudConnected);
  if (!clockStarted) { startLiveClock(); clockStarted = true; }

  const nav = $('#navLinks');
  const links = currentUser.role === 'admin'
    ? [
        ['admin-dashboard', 'Dashboard'],
        ['register', 'Register'],
        ['tools-admin', 'Tools'],
        ['users-admin', 'Users'],
        ['settings-admin', 'Settings'],
      ]
    : [
        ['dashboard', 'Dashboard'],
        ['register', 'Register'],
        ['issue-new', 'New Issue'],
        ...(currentUser.toolStockAuth ? [['tools-admin', 'Tools']] : [])
      ];

  nav.innerHTML = links.map(([id, label]) => `<button class="navlink" data-view="${id}">${label}</button>`).join('');
  nav.querySelectorAll('.navlink').forEach((btn) => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.view));
  });

  if (currentUser.role === 'admin') {
    if (unsubRequests) { unsubRequests(); unsubRequests = null; }
    unsubRequests = onValue(ref(db, 'accessRequests'), (snap) => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      updatePendingRequestsNavBadge(count);
    }, (err) => console.error('access requests listener error', err));
  }
}

function navigateTo(viewId) {
  currentView = viewId;
  $$('.navlink').forEach((btn) => btn.classList.toggle('active', btn.dataset.view === viewId));
  render();
}

function snapshotToArray(snap) {
  const val = snap.val();
  if (!val) return [];
  return Object.keys(val).map((key) => ({ id: key, ...val[key] }));
}

function listenToCollections() {
  if (unsubTools) unsubTools();
  if (unsubIssues) unsubIssues();
  
  unsubTools = onValue(ref(db, 'tools'), (snap) => {
    toolsCache = snapshotToArray(snap).sort((a, b) => (a.toolName || '').localeCompare(b.toolName || ''));
    render();
  });

  unsubIssues = onValue(ref(db, 'issues'), (snap) => {
    issuesCache = snapshotToArray(snap).sort((a, b) => (b.issueDate || '').localeCompare(a.issueDate || ''));
    render();
  });
}

function statusOf(issue) { return ((issue.qtyReturned || 0) >= issue.qtyIssued) ? 'Returned' : 'Issued'; }

function enrichedIssues() {
  return issuesCache.map((i) => {
    let displayName = i.materialName;
    if (!displayName && i.toolId) {
      const legacyTool = toolsCache.find((t) => t.id === i.toolId);
      displayName = legacyTool ? legacyTool.toolName : '(unknown material)';
    }
    return { ...i, materialName: displayName || '(unnamed)', status: statusOf(i) };
  });
}

function render() {
  if (!currentUser) return;
  const main = $('#appMain');

  const adminOnlyViews = ['admin-dashboard', 'users-admin', 'settings-admin', 'edit-return'];
  
  if (currentUser.role !== 'admin' && currentView === 'tools-admin' && !currentUser.toolStockAuth) currentView = 'dashboard';
  if (currentUser.role !== 'admin' && adminOnlyViews.includes(currentView)) currentView = 'dashboard';
  
  const storekeeperOnlyViews = ['dashboard']; 
  if (currentUser.role === 'admin' && storekeeperOnlyViews.includes(currentView)) currentView = 'admin-dashboard';

  const views = {
    'dashboard': renderUserDashboard,
    'admin-dashboard': renderAdminDashboard,
    'register': renderRegister,
    'issue-new': renderIssueForm,
    'tools-admin': renderToolsAdmin,
    'users-admin': renderUsersAdmin,
    'settings-admin': renderSettingsAdmin,
    'return-record': renderReturnForm,
    'edit-return': renderEditReturnForm,
    'edit-issue': renderEditIssueForm, 
  };
  
  const fn = views[currentView] || (currentUser.role === 'admin' ? renderAdminDashboard : renderUserDashboard);
  main.innerHTML = fn();
  wireViewEvents(currentView);
}

function statsSummary() {
  const issues = enrichedIssues();
  return {
    total: issues.length,
    pending: issues.filter((i) => i.status === 'Issued').length,
    returned: issues.filter((i) => i.status === 'Returned').length,

}

// FILTER STATE - Added Month & Year
let registerFilterState = { q: '', status: 'all', month: 'all', year: 'all' };

function formatTimestamp(ms) {
  if (!ms || typeof ms !== 'number') return '—';
  const d = new Date(ms);
  return d.toLocaleString(undefined, {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function renderRegister() {
  const isAdmin = currentUser.role === 'admin';
  let rows = enrichedIssues();

  // Search Text Filter
  if (registerFilterState.q) {
    const needle = registerFilterState.q.toLowerCase();
    rows = rows.filter((r) =>
      r.materialName.toLowerCase().includes(needle) ||
      (r.vendor || '').toLowerCase().includes(needle) ||
      (r.area || '').toLowerCase().includes(needle) ||
      (r.supervisorName || '').toLowerCase().includes(needle) ||
      (r.empCode || '').toLowerCase().includes(needle)
    );
  }
  
  // Status Filter
  if (registerFilterState.status !== 'all') {
    rows = rows.filter((r) => r.status.replace(/\s/g, '').toLowerCase() === registerFilterState.status);
  }

  // Monthly / Yearly Date Filter Logic
  if (registerFilterState.year !== 'all') {
    rows = rows.filter(r => r.issueDate && r.issueDate.startsWith(registerFilterState.year));
  }
  
  if (registerFilterState.month !== 'all') {
    rows = rows.filter(r => {
      if (!r.issueDate) return false;
      const parts = r.issueDate.split('-'); // format is YYYY-MM-DD
      return parts[1] === registerFilterState.month;
    });
  }

  return `
    <div class="page-head">
      <div>
        <span class="eyebrow">Records</span>
        <h1>${isAdmin ? 'Full Register' : 'Issue & Return Register'}</h1>
        <div class="page-sub">${isAdmin ? 'Every record. Admins can remove entries here.' : 'All material movements logged by the store.'}</div>

      <button class="btn btn-primary" data-nav="issue-new">+ New Issue</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="regSearch" placeholder="Search material, vendor, area, supervisor…" value="${escapeHtml(registerFilterState.q)}" />
      <select id="regStatus">
        <option value="all" ${registerFilterState.status === 'all' ? 'selected' : ''}>All statuses</option>
        <option value="issued" ${registerFilterState.status === 'issued' ? 'selected' : ''}>Issued</option>
        <option value="returned" ${registerFilterState.status === 'returned' ? 'selected' : ''}>Returned</option>
      </select>
      <select id="regYear">
        <option value="all" ${registerFilterState.year === 'all' ? 'selected' : ''}>All Years</option>
        <option value="2024" ${registerFilterState.year === '2024' ? 'selected' : ''}>2024</option>

        <option value="2026" ${registerFilterState.year === '2026' ? 'selected' : ''}>2026</option>
        <option value="2027" ${registerFilterState.year === '2027' ? 'selected' : ''}>2027</option>
        <option value="2028" ${registerFilterState.year === '2028' ? 'selected' : ''}>2028</option>
      </select>
      <select id="regMonth">
        <option value="all" ${registerFilterState.month === 'all' ? 'selected' : ''}>All Months</option>
        <option value="01" ${registerFilterState.month === '01' ? 'selected' : ''}>Jan</option>
        <option value="02" ${registerFilterState.month === '02' ? 'selected' : ''}>Feb</option>
        <option value="03" ${registerFilterState.month === '03' ? 'selected' : ''}>Mar</option>
        <option value="04" ${registerFilterState.month === '04' ? 'selected' : ''}>Apr</option>
        <option value="05" ${registerFilterState.month === '05' ? 'selected' : ''}>May</option>
        <option value="06" ${registerFilterState.month === '06' ? 'selected' : ''}>Jun</option>
        <option value="07" ${registerFilterState.month === '07' ? 'selected' : ''}>Jul</option>
        <option value="08" ${registerFilterState.month === '08' ? 'selected' : ''}>Aug</option>
        <option value="09" ${registerFilterState.month === '09' ? 'selected' : ''}>Sep</option>
        <option value="10" ${registerFilterState.month === '10' ? 'selected' : ''}>Oct</option>
        <option value="11" ${registerFilterState.month === '11' ? 'selected' : ''}>Nov</option>
        <option value="12" ${registerFilterState.month === '12' ? 'selected' : ''}>Dec</option>
      </select>
    </div>

    <div class="panel">
      <div class="table-wrap">
        ${rows.length === 0 ? `
          <div class="empty-state"><div class="display">No matching records</div><p>Try clearing filters, or log a new issue to get started.</p></div>
        ` : `
        <table class="reg">
          <thead>
            <tr>
              <th>Material</th><th>Qty Issued</th><th>Vendor</th><th>Area</th>
              <th>Issue Date</th><th>Issued At</th><th>Supervisor</th><th>Issued By</th>

              const qtyReturned = r.qtyReturned || 0;

              return `
              <tr>
                <td data-label="Material">${escapeHtml(r.materialName)}</td>
                <td class="qty" data-label="Qty Issued">${r.qtyIssued}</td>

function renderStorageUsage() {
  const holder = $('#storageUsageHolder');
  if (!holder) return;

  const LIMIT_KB = 1024 * 1024; // ~1 GB in KB

  const sections = [
    { label: 'Tools', data: toolsCache, color: '#e8a23a' },
    { label: 'Issues', data: issuesCache, color: '#3b82f6' },
  ];

  let usersKB = 0;
  const usersSizePromise = get(ref(db, 'users')).then((snap) => {
    const val = snap.val();
    usersKB = val ? new Blob([JSON.stringify(val)]).size / 1024 : 0;
  }).catch(() => { usersKB = 0; });

  usersSizePromise.then(() => {
    const breakdown = sections.map((s) => ({
      ...s, kb: new Blob([JSON.stringify(s.data)]).size / 1024,
    }));
    breakdown.push({ label: 'Users', kb: usersKB, color: '#7c3aed' });

    const usedKB = breakdown.reduce((sum, s) => sum + s.kb, 0);
    const freeKB = Math.max(0, LIMIT_KB - usedKB);
    const pct = Math.min(100, (usedKB / LIMIT_KB) * 100);

    holder.innerHTML = `
      <div class="storage-bar-wrap">
        <div class="storage-bar-track">
          <div class="storage-bar-fill" style="width:${pct.toFixed(3)}%; background:${pct > 80 ? 'linear-gradient(90deg,#b14a3f,#e8a23a)' : 'linear-gradient(90deg,#3f8c5a,#e8a23a)'};"></div>
        </div>
        <div class="storage-bar-caption">
          <span>${usedKB.toFixed(2)} KB used</span>
          <span>${pct.toFixed(3)}% of ~1 GB free-tier limit</span>
        </div>
      </div>
      <div class="storage-legend">
        ${breakdown.map((s) => `
          <div class="storage-legend-row">
            <span class="storage-dot" style="background:${s.color};"></span>
            <span class="storage-legend-label">${s.label}</span>
            <span class="storage-legend-val mono">${s.kb.toFixed(2)} KB</span>
          </div>`).join('')}
        <div class="storage-legend-row storage-legend-free">
          <span class="storage-dot" style="background:rgba(20,24,29,0.08); border:1px solid #d4d8de;"></span>
          <span class="storage-legend-label">Free</span>

/* =========================================================================
   EVENT WIRING (after each render)
   ========================================================================= */
function wireViewEvents(viewId) {
  $$('[data-nav]').forEach((btn) => btn.addEventListener('click', () => navigateTo(btn.dataset.nav)));

  if (viewId === 'register') {
    $('#regSearch')?.addEventListener('input', (e) => { 
      registerFilterState.q = e.target.value; render(); 
      const searchBox = $('#regSearch');
      if (searchBox) { searchBox.focus(); searchBox.setSelectionRange(searchBox.value.length, searchBox.value.length); }
    });
    $('#regStatus')?.addEventListener('change', (e) => { registerFilterState.status = e.target.value; render(); });
    $('#regYear')?.addEventListener('change', (e) => { registerFilterState.year = e.target.value; render(); });
    $('#regMonth')?.addEventListener('change', (e) => { registerFilterState.month = e.target.value; render(); });
    
    $$('[data-return]').forEach((btn) => btn.addEventListener('click', () => {
      returnFormTargetId = btn.dataset.return;
      returnFormError = '';
      navigateTo('return-record');
    }));
    $$('[data-delete-issue]').forEach((btn) => btn.addEventListener('click', () => {
      if (confirm('Delete this register entry permanently?')) deleteIssue(btn.dataset.deleteIssue);
    }));
    $$('[data-edit-return]').forEach((btn) => btn.addEventListener('click', () => {
      editReturnTargetId = btn.dataset.editReturn;
      editReturnError = '';
      navigateTo('edit-return');
    }));
    $$('[data-edit-issue]').forEach((btn) => btn.addEventListener('click', () => {
      editIssueTargetId = btn.dataset.editIssue;
      editIssueError = '';
      navigateTo('edit-issue');
    }));
  }

  if (viewId === 'issue-new') {
    $('#issueForm').addEventListener('submit', handleIssueSubmit);
    $('#f_photo').addEventListener('change', handlePhotoSelected);
    $('#f_photoClear').addEventListener('click', clearSelectedPhoto);
  }

  if (viewId === 'return-record') {
    $('#returnForm').addEventListener('submit', handleReturnSubmit);
    $('#r_photo').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { returnSelectedPhotoFile = null; $('#r_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
      returnSelectedPhotoFile = file;
      const reader = new FileReader();
      reader.onload = () => { $('#r_photoPreview').src = reader.result; $('#r_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);
    });
    $('#r_photoClear').addEventListener('click', () => {
      returnSelectedPhotoFile = null;
      const input = $('#r_photo');
      if (input) input.value = '';
      $('#r_photoPreviewWrap').style.display = 'none';
    });
  }

  if (viewId === 'edit-return') {
    $('#editReturnForm').addEventListener('submit', handleEditReturnSubmit);
    $('#er_photo').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { editReturnSelectedPhotoFile = null; $('#er_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
      editReturnSelectedPhotoFile = file;
      const reader = new FileReader();
      reader.onload = () => { $('#er_photoPreview').src = reader.result; $('#er_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);
    });
    $('#er_photoClear').addEventListener('click', () => {
      editReturnSelectedPhotoFile = null;
      const input = $('#er_photo');
      if (input) input.value = '';
      $('#er_photoPreviewWrap').style.display = 'none';
    });
  }
  
  if (viewId === 'edit-issue') {
    $('#editIssueForm').addEventListener('submit', handleEditIssueSubmit);
    $('#ei_photo').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { editIssueSelectedPhotoFile = null; $('#ei_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
      editIssueSelectedPhotoFile = file;
      const reader = new FileReader();
      reader.onload = () => { $('#ei_photoPreview').src = reader.result; $('#ei_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);
    });
    $('#ei_photoClear').addEventListener('click', () => {
      editIssueSelectedPhotoFile = null;
      const input = $('#ei_photo');
      if (input) input.value = '';
      $('#ei_photoPreviewWrap').style.display = 'none';
    });
  }

  if (viewId === 'tools-admin') {
    $('#newToolForm').addEventListener('submit', handleNewToolSubmit);
    $$('[data-save-tool]').forEach((btn) => btn.addEventListener('click', () => handleSaveTool(btn.dataset.saveTool)));
    $$('[data-delete-tool]').forEach((btn) => btn.addEventListener('click', () => handleDeleteTool(btn.dataset.deleteTool)));
  }

  if (viewId === 'users-admin') {
    $('#newUserForm').addEventListener('submit', handleNewUserSubmit);
    loadRequestsTable();
    loadUsersTable();
  }

  if (viewId === 'settings-admin') {
    renderStorageUsage();
    $('#refreshSyncStatusBtn')?.addEventListener('click', () => render());
  }
}

let selectedPhotoFile = null;

function handlePhotoSelected(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) { clearSelectedPhoto(); return; }
  if (!file.type.startsWith('image/')) {
    alert('Please choose an image file.');
    e.target.value = '';
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    alert('Please choose an image smaller than 5 MB.');
    e.target.value = '';
    return;
  }
  selectedPhotoFile = file;
  const reader = new FileReader();
  reader.onload = () => {
    $('#f_photoPreview').src = reader.result;
    $('#f_photoPreviewWrap').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearSelectedPhoto() {
  selectedPhotoFile = null;
  const input = $('#f_photo');
  if (input) input.value = '';
  const wrap = $('#f_photoPreviewWrap');
  if (wrap) wrap.style.display = 'none';
}

async function handleIssueSubmit(e) {
  e.preventDefault();
  issueFormError = '';
  const materialName = $('#f_material').value.trim();
  const qty = parseInt($('#f_qty').value, 10);
  const vendor = $('#f_vendor').value.trim();
  const area = $('#f_area').value.trim();
  const issueDate = $('#f_issueDate').value;
  const supervisorName = $('#f_supervisorName').value.trim();
  const supervisorContact = $('#f_supervisorContact').value.trim();
  const empCode = $('#f_empCode').value.trim();
  const remarks = $('#f_remarks').value.trim();

  if (!materialName || !qty || qty <= 0 || !vendor || !area || !issueDate || !supervisorName || !supervisorContact) {
    issueFormError = 'Please fill in material name, quantity, vendor, area, issue date, supervisor name, and supervisor contact number.';
    return render();
  }

  const btn = $('#issueSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';

  try {
    const newRef = push(ref(db, 'issues'));
    await set(newRef, {
      materialName, qtyIssued: qty, vendor, area, empCode: empCode || null,
      issueDate, supervisorName, supervisorContact,
      returnDate: null, qtyReturned: 0, conditionOnReturn: null,
      issuedBy: currentUser.username, issuedByName: currentUser.fullName,
      receivedBy: null, receivedByName: null,
      remarks: remarks || null,
      photoUrl: null,
      createdAt: serverTimestamp(), updatedAt: serverTimestamp(),
    });

    if (selectedPhotoFile && storage) {
      try {
        btn.innerHTML = '<span class="spinner"></span> Uploading photo…';
        const ext = (selectedPhotoFile.name.split('.').pop() || 'jpg').slice(0, 8);
        const path = `issue-photos/${newRef.key}.${ext}`;
        const fileRef = storageRef(storage, path);
        await uploadBytes(fileRef, selectedPhotoFile);
        const url = await getDownloadURL(fileRef);
        await update(newRef, { photoUrl: url, photoPath: path });
      } catch (photoErr) {
        console.error('Photo upload failed:', photoErr);
        alert('The issue was saved, but the photo could not be uploaded: ' + (photoErr.message || 'unknown error'));
      }
    }

    clearSelectedPhoto();
    navigateTo('register');
  } catch (err) {
    console.error(err);
    issueFormError = 'Could not save this record: ' + (err.message || 'unknown error');
    render();
  }
}

    const issue = issuesCache.find((i) => i.id === id);
    await remove(ref(db, 'issues/' + id));
    if (storage && issue) {
      if (issue.photoPath) {
        try { await deleteObject(storageRef(storage, issue.photoPath)); } catch (_) {}
      }
      if (issue.returnPhotoPath) {
        try { await deleteObject(storageRef(storage, issue.returnPhotoPath)); } catch (_) {}
      }
    }
  } catch (err) {
    alert('Could not delete this record: ' + (err.message || 'unknown error'));
  }
}

/* =========================================================================
   USERS / ACCESS REQUESTS (ADMIN VIEW)
   ========================================================================= */
async function loadRequestsTable() {
  const holder = $('#requestsHolder');
  if (!holder) return;
  const pad = holder.querySelector('.panel-pad');
  try {
    const snap = await get(ref(db, 'accessRequests'));
    const requests = snapshotToArray(snap);
    updatePendingRequestsNavBadge(requests.length);

    if (requests.length === 0) {
      pad.innerHTML = `<div class="empty-state" style="padding:20px 0;"><p>No pending requests right now.</p></div>`;
      return;
    }

    pad.innerHTML = requests.map((r) => `
      <div class="request-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;">
          <div>
            <div style="font-weight:700; font-size:14.5px;">${escapeHtml(r.fullName)}</div>
            <div class="mono muted" style="font-size:12.5px; margin-top:2px;">Username: ${escapeHtml(r.id)}</div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn btn-primary btn-sm" data-approve-request="${escapeHtml(r.id)}">Approve</button>
            <button class="btn btn-danger btn-sm" data-reject-request="${escapeHtml(r.id)}">Reject</button>
          </div>
        </div>
      </div>`).join('');

    pad.querySelectorAll('[data-approve-request]').forEach((btn) => {
      btn.addEventListener('click', () => handleApproveRequest(btn.dataset.approveRequest));
    });
    pad.querySelectorAll('[data-reject-request]').forEach((btn) => {
      btn.addEventListener('click', () => handleRejectRequest(btn.dataset.rejectRequest));
    });
  } catch (err) {
    pad.innerHTML = `<div class="alert alert-error">Could not load requests: ${escapeHtml(err.message || 'unknown error')}</div>`;
  }
}

async function handleApproveRequest(username) {
  try {
    const reqSnap = await get(ref(db, 'accessRequests/' + username));
    if (!reqSnap.exists()) { loadRequestsTable(); return; }
    const existing = await get(ref(db, 'users/' + username));
    if (existing.exists()) {
      alert(`A user named "${username}" already exists. Reject this request or ask them to choose a different username.`);
      return;
    }
    const { fullName, password } = reqSnap.val();
    
    await set(ref(db, 'users/' + username), { 
      fullName, 
      password, 
      toolStockAuth: false, 
      createdAt: serverTimestamp() 
    });
    
    await remove(ref(db, 'accessRequests/' + username));
    loadRequestsTable();
    loadUsersTable();
  } catch (err) {
    alert('Could not approve this request: ' + (err.message || 'unknown error'));
  }
}

async function handleRejectRequest(username) {
  if (!confirm(`Reject the access request from "${username}"?`)) return;
  try {
    await remove(ref(db, 'accessRequests/' + username));
    loadRequestsTable();
  } catch (err) {
    alert('Could not reject this request: ' + (err.message || 'unknown error'));
  }
}

function updatePendingRequestsNavBadge(count) {
  const navBtn = document.querySelector('.navlink[data-view="users-admin"]');
  if (!navBtn) return;
  const existing = navBtn.querySelector('.pending-count-dot');
  if (existing) existing.remove();
  if (count > 0) {
    const dot = document.createElement('span');
    dot.className = 'pending-count-dot';
    dot.textContent = count;
    navBtn.appendChild(dot);
  }
}

async function loadUsersTable() {
  const holder = $('#usersTableHolder');
  if (!holder) return;
  try {
    const snap = await get(ref(db, 'users'));
    const users = snapshotToArray(snap);
    holder.innerHTML = `
      <div class="table-wrap">
        ${users.length === 0 ? `
          <div class="empty-state"><div class="display">No staff accounts yet</div><p>Add one using the form below.</p></div>
        ` : `
        <table class="reg">
          <thead><tr><th>Username</th><th>Full Name</th><th>Tool Stock Auth</th><th>Action</th></tr></thead>
          <tbody>
            ${users.map((u) => `
              <tr>
                <td class="mono" data-label="Username">${escapeHtml(u.id)}</td>
                <td data-label="Full Name">${escapeHtml(u.fullName)}</td>
                <td data-label="Tool Stock Auth">
                  <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="checkbox" data-toggle-auth="${escapeHtml(u.id)}" ${u.toolStockAuth ? 'checked' : ''} />
                    <span class="muted" style="font-size:12px;">Authorized</span>
                  </label>
                </td>
                <td data-label="Action"><button class="btn btn-danger btn-sm" data-remove-user="${escapeHtml(u.id)}">Delete</button></td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>`;
      
    holder.querySelectorAll('[data-toggle-auth]').forEach((chk) => {
      chk.addEventListener('change', async (e) => {
        try {
          await update(ref(db, 'users/' + chk.dataset.toggleAuth), {
            toolStockAuth: e.target.checked
          });
        } catch (err) {
          alert('Could not update user authority: ' + (err.message || 'unknown error'));
          e.target.checked = !e.target.checked; 
        }
      });
    });

    holder.querySelectorAll('[data-remove-user]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Delete the account "${btn.dataset.removeUser}"? They will no longer be able to log in.`)) return;
        try {
          await remove(ref(db, 'users/' + btn.dataset.removeUser));
          loadUsersTable();
        } catch (err) {
          alert('Could not delete this account: ' + (err.message || 'unknown error'));
        }
      });
    });
  } catch (err) {
    holder.innerHTML = `<div class="alert alert-error" style="margin:16px;">Could not load users: ${escapeHtml(err.message || 'unknown error')}</div>`;
  }
}

async function handleNewUserSubmit(e) {
  e.preventDefault();
  userFormError = '';
  const username = $('#nu_username').value.trim();
  const fullName = $('#nu_fullname').value.trim();
  const password = $('#nu_password').value;
  const toolAuth = $('#nu_toolAuth').checked;

  if (!username || !fullName || !password) {
    userFormError = 'Please fill in username, full name, and password.';
    return render();
  }
  if (username.toLowerCase() === ADMIN_USERNAME) {
    userFormError = `"${ADMIN_USERNAME}" is reserved for the Admin login and can't be used here.`;
    return render();
  }
  if (/[.#$\[\]\/\s'"]/.test(username)) {
    userFormError = 'Username can\'t contain spaces, quotes, or the characters . # $ [ ] /';
    return render();
  }

  try {
    const existing = await get(ref(db, 'users/' + username));
    if (existing.exists()) {
      userFormError = 'That username already exists.';
      return render();
    }
    
    await set(ref(db, 'users/' + username), {
      fullName, 
      password, 
      toolStockAuth: toolAuth,
      createdAt: serverTimestamp(),
    });
    navigateTo('users-admin');
  } catch (err) {
    userFormError = 'Could not create this account: ' + (err.message || 'unknown error');
    render();
  }
}
</script>

</body>
</html>
