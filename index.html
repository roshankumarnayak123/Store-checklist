<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CMM SMS Store</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
<style>
:root {
  /* Modern Slate Palette */
  --steel-950: #0f172a;
  --steel-900: #1e293b;
  --steel-800: #334155;
  --steel-700: #475569;
  --steel-600: #64748b;
  --steel-300: #cbd5e1;
  --steel-100: #f1f5f9;
  --steel-50:  #f8fafc;
  
  /* Accents */
  --amber: #f59e0b;
  --amber-dark: #d97706;
  --amber-soft: #fef3c7;
  
  --good: #10b981;
  --good-soft: #d1fae5;
  --good-dark: #047857;
  
  --warn: #f59e0b;
  --warn-soft: #fef3c7;
  --warn-dark: #b45309;
  
  --bad: #ef4444;
  --bad-soft: #fee2e2;
  --bad-dark: #b91c1c;
  
  /* Geometry & Shadows */
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-focus: 0 0 0 4px rgba(245, 158, 11, 0.25);
  
  /* Transitions */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Base & Scrollbars */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--steel-800);
  background: linear-gradient(135deg, var(--steel-50) 0%, #e2e8f0 100%);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--steel-300); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--steel-600); }

/* Typography */
h1, h2, h3, .display {
  font-family: 'Barlow Condensed', 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--steel-950);
}
.mono, code, .tool-code, .qty { font-family: 'IBM Plex Mono', monospace; font-size: 0.95em; }
a { color: var(--amber-dark); text-decoration: none; transition: color 0.2s var(--ease); }
a:hover { color: var(--amber); }
.hidden { display: none !important; }

/* Sync Spinner Animation */
@keyframes syncRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.syncing-icon {
  display: inline-block;
  animation: syncRotate 1s linear infinite;
  color: var(--amber);
}

/* Topbar */
.topbar { 
  background: rgba(15, 23, 42, 0.85); 
  backdrop-filter: blur(16px); 
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.05); 
  box-shadow: 0 1px 0 var(--amber), 0 10px 30px -10px rgba(0,0,0,0.3); 
  position: sticky; top: 0; z-index: 50; 
  transition: all 0.3s var(--ease);
}
.topbar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 32px; padding: 0 24px; height: 64px; }
.brand { display: flex; align-items: center; gap: 8px; color: var(--steel-50); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: 0.06em; white-space: nowrap; cursor: default; }
.brand-mark { color: var(--amber); font-size: 22px; display: inline-block; transition: transform 0.6s var(--ease-spring); }
.brand:hover .brand-mark { transform: rotate(90deg) scale(1.1); }
.brand-text strong { color: var(--amber); }

.nav { display: flex; gap: 6px; flex: 1; }
.nav button.navlink {
  background: transparent; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
  color: var(--steel-300); font-size: 13.5px; font-weight: 600;
  padding: 8px 16px; border-radius: 999px; 
  transition: all 0.25s var(--ease);
  position: relative;
}
.nav button.navlink:hover { color: #fff; background: rgba(255,255,255,0.1); }
.nav button.navlink:active { transform: scale(0.95); }
.nav button.navlink.active { color: var(--steel-950); background: var(--amber); box-shadow: 0 4px 12px rgba(245,158,11,0.3); }

.who { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
.who-name { color: var(--steel-100); font-size: 13.5px; font-weight: 600; }
.who-role { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
.who-role.role-admin { background: var(--amber-soft); color: var(--amber-dark); }
.who-role.role-user { background: var(--steel-700); color: var(--steel-50); }

.status-bar { background: rgba(0,0,0,0.25); border-top: 1px solid rgba(255,255,255,0.05); }
.status-bar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 6px 24px; gap: 14px; }
.status-sync { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--steel-300); font-weight: 500; }
.status-sync .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-clock { font-size: 11.5px; color: var(--steel-300); letter-spacing: 0.03em; }
.link-btn { background: none; border: none; color: var(--steel-300); font-size: 13px; font-weight: 500; cursor: pointer; padding: 6px 4px; transition: color 0.2s var(--ease); }
.link-btn:hover { color: var(--amber); }

/* Layout & Views */
.app-main { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; animation: viewFadeIn 0.5s var(--ease-out); }
@keyframes viewFadeIn { 
  0% { opacity: 0; transform: translateY(12px) scale(0.995); } 
  100% { opacity: 1; transform: translateY(0) scale(1); } 
}

.auth-main { 
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 15% 50%, rgba(245,158,11,0.15), transparent 35%),
              radial-gradient(circle at 85% 30%, rgba(16,185,129,0.1), transparent 40%),
              var(--steel-950); 
  padding: 24px; 
}
.auth-card { 
  width: 100%; max-width: 420px; 
  background: rgba(255, 255, 255, 0.98); 
  backdrop-filter: blur(20px);
  border-radius: var(--radius-lg); 
  padding: 40px; 
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1); 
  border-top: 3px solid var(--amber);
  animation: authCardIn 0.6s var(--ease-spring); 
}
@keyframes authCardIn { 
  0% { opacity: 0; transform: translateY(24px) scale(0.95); } 
  100% { opacity: 1; transform: translateY(0) scale(1); } 
}

/* Headers */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
.page-head h1 { font-size: 28px; margin: 0; line-height: 1.1; }
.page-sub { color: var(--steel-600); font-size: 14px; margin-top: 6px; font-weight: 400; }
.eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber-dark); display: block; margin-bottom: 4px; font-weight: 600; }

/* Panels & Cards */
.panel { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: var(--radius-lg); box-shadow: var(--shadow); transition: box-shadow 0.3s var(--ease), transform 0.3s var(--ease); }
.panel:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.panel-pad { padding: 28px 32px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--steel-100); }
.panel-head h2 { font-size: 18px; margin: 0; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: all 0.3s var(--ease); }
.kpi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; background: var(--steel-300); }
.kpi:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.kpi.amber::before { background: var(--amber); } .kpi.good::before { background: var(--good); }
.kpi.warn::before { background: var(--warn); } .kpi.bad::before { background: var(--bad); }
.kpi-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--steel-600); font-weight: 600; margin-bottom: 8px; }
.kpi-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 36px; color: var(--steel-950); line-height: 1; }

/* Tables */
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); }
table.reg { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
table.reg th { background: var(--steel-900); color: var(--steel-50); text-align: left; padding: 14px 16px; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; white-space: nowrap; }
table.reg th:first-child { border-top-left-radius: var(--radius-lg); }
table.reg th:last-child { border-top-right-radius: var(--radius-lg); }
table.reg td { padding: 14px 16px; border-bottom: 1px solid var(--steel-100); vertical-align: middle; white-space: nowrap; background: #fff; transition: background 0.2s var(--ease); }
table.reg tbody tr { transition: transform 0.2s var(--ease); }
table.reg tbody tr:hover td { background: var(--steel-50); }
table.reg tbody tr:last-child td { border-bottom: none; }
table.reg tbody tr:last-child td:first-child { border-bottom-left-radius: var(--radius-lg); }
table.reg tbody tr:last-child td:last-child { border-bottom-right-radius: var(--radius-lg); }

.badge { display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 12px; border-radius: 999px; }
.badge.good { background: var(--good-soft); color: var(--good-dark); }
.badge.warn { background: var(--warn-soft); color: var(--warn-dark); }
.badge.bad { background: var(--bad-soft); color: var(--bad-dark); }
.badge.overdue { background: var(--bad); color: #fff; margin-left: 6px; }

/* Forms & Inputs */
.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 24px; }
.form-grid .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 12.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--steel-700); }
input, select, textarea {
  font-family: 'Inter', sans-serif; font-size: 14.5px; padding: 12px 16px; 
  border: 1px solid var(--steel-300); border-radius: var(--radius); 
  background: var(--steel-50); color: var(--steel-950); width: 100%;
  transition: all 0.2s var(--ease); outline: none;
}
input:hover, select:hover, textarea:hover { border-color: var(--steel-600); }
input:focus, select:focus, textarea:focus { background: #fff; border-color: var(--amber); box-shadow: var(--shadow-focus); }
textarea { resize: vertical; min-height: 80px; }
input:disabled { opacity: 0.6; cursor: not-allowed; }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; padding: 12px 24px; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.2s var(--ease-spring); }
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--amber); color: var(--steel-950); box-shadow: 0 4px 12px rgba(245,158,11,0.25); }
.btn-primary:hover { background: #fcd34d; box-shadow: 0 6px 16px rgba(245,158,11,0.35); transform: translateY(-2px); }
.btn-dark { background: var(--steel-950); color: #fff; box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
.btn-dark:hover { background: var(--steel-800); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,23,42,0.3); }
.btn-ghost { background: transparent; color: var(--steel-700); border: 1px solid var(--steel-300); }
.btn-ghost:hover { background: var(--steel-50); border-color: var(--steel-600); color: var(--steel-950); }
.btn-danger { background: var(--bad-soft); color: var(--bad-dark); }
.btn-danger:hover { background: #fecaca; }
.btn-sm { padding: 8px 16px; font-size: 12.5px; }

.actions-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
.filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; background: #fff; padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04); }
.filter-bar input[type="text"] { min-width: 260px; flex: 1; }
.filter-bar select { width: auto; min-width: 140px; }

/* Alerts & States */
.alert { padding: 14px 20px; border-radius: var(--radius); font-size: 14px; margin-bottom: 20px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: viewFadeIn 0.3s var(--ease-out); }
.alert-error { background: var(--bad-soft); color: var(--bad-dark); border: 1px solid #fecaca; }
.alert-info { background: var(--amber-soft); color: var(--warn-dark); border: 1px solid #fde68a; }
.alert-good { background: var(--good-soft); color: var(--good-dark); border: 1px solid #a7f3d0; }

.empty-state { text-align: center; padding: 60px 24px; color: var(--steel-600); }
.empty-state .display { font-size: 22px; margin-bottom: 12px; color: var(--steel-900); }

/* Auth Extras */
.auth-card .brand { color: var(--steel-950); justify-content: center; margin-bottom: 8px; font-size: 22px; }
.auth-sub { text-align: center; color: var(--steel-600); font-size: 14px; margin-bottom: 24px; }
.login-sync-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--steel-700); font-weight: 600; margin-bottom: 28px; padding: 10px 16px; background: var(--steel-50); border-radius: 999px; border: 1px solid var(--steel-100); }
.login-sync-row .sync-dot { width: 10px; height: 10px; border-radius: 50%; }
.auth-card form { display: flex; flex-direction: column; gap: 18px; }
.auth-card .btn { justify-content: center; margin-top: 8px; padding: 14px; font-size: 15px; }
.auth-hint { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--steel-100); font-size: 12.5px; color: var(--steel-600); line-height: 1.6; text-align: center; }
.request-link-row { text-align: center; margin-top: 24px; }
.request-link-row button { background: none; border: none; color: var(--steel-600); font-size: 13.5px; font-weight: 500; cursor: pointer; transition: color 0.2s var(--ease); }
.request-link-row button:hover { color: var(--amber-dark); }

.tag { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; background: var(--steel-100); color: var(--steel-800); padding: 4px 8px; border-radius: 6px; }
.muted { color: var(--steel-600); }
.stock-low { color: var(--bad); font-weight: 700; }
.qty-pending { color: var(--warn-dark); font-weight: 700; }

/* Settings / Storage */
.sync-status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.sync-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.sync-dot-good { background: var(--good); box-shadow: 0 0 0 4px var(--good-soft); animation: pulseDot 2.5s ease-in-out infinite; }
.sync-dot-bad { background: var(--bad); box-shadow: 0 0 0 4px var(--bad-soft); }
@keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 4px var(--good-soft); } 50% { box-shadow: 0 0 0 8px rgba(16,185,129,0.15); } }
.sync-status-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 0.04em; }
.kv-grid { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--steel-100); margin-top: 8px; }
.kv-row { display: flex; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--steel-100); font-size: 14px; }
.kv-key { color: var(--steel-600); font-weight: 600; flex-shrink: 0; }
.kv-val { text-align: right; color: var(--steel-900); font-weight: 500; }

.storage-bar-wrap { margin-bottom: 24px; }
.storage-bar-track { width: 100%; height: 16px; border-radius: 999px; background: var(--steel-100); overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
.storage-bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s var(--ease-spring); }
.storage-bar-caption { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--steel-600); margin-top: 10px; font-weight: 500; }
.storage-legend { display: flex; flex-direction: column; gap: 12px; }
.storage-legend-row { display: flex; align-items: center; gap: 12px; font-size: 14px; }
.storage-legend-free { border-top: 1px solid var(--steel-100); padding-top: 12px; margin-top: 4px; }
.storage-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.storage-legend-label { flex: 1; color: var(--steel-700); font-weight: 500; }
.storage-legend-val { font-weight: 600; color: var(--steel-900); }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(0,0,0,0.1); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Badges */
.request-card { border: 1.5px dashed var(--amber); background: var(--amber-soft); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; transition: transform 0.2s var(--ease); }
.request-card:hover { transform: translateX(4px); }
.pending-count-dot { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: var(--bad); color: #fff; font-size: 11px; font-weight: 800; margin-left: 8px; }

/* Responsive Adjustments */
@media (max-width: 768px) {
  /* Enforce two-row topbar layout */
  .topbar-inner { 
    flex-wrap: wrap; 
    height: auto; 
    padding: 12px 16px; 
    gap: 12px 8px;
    justify-content: space-between; 
  }
  .brand { font-size: 17.5px; flex-shrink: 0; }
  .who { flex-shrink: 0; margin-left: auto; gap: 10px; }
  .who-name { display: none; } 
  
  /* Force navigation to the second row and enable horizontal scrolling */
  .nav { 
    order: 3; 
    flex: 1 1 100%; 
    width: 100%; 
    margin: 0;
    overflow-x: auto; 
    padding-bottom: 4px; 
    -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; 
    display: flex;
    flex-wrap: nowrap; 
    gap: 8px;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav button.navlink { padding: 8px 16px; font-size: 13px; flex-shrink: 0; }
  
  /* Fix status bar wrapping */
  .status-bar-inner { padding: 8px 16px; flex-wrap: nowrap; gap: 12px; justify-content: space-between; }
  .status-sync { font-size: 10.5px; white-space: nowrap; flex-shrink: 0; }
  .status-clock { font-size: 10.5px; white-space: nowrap; flex-shrink: 0; text-align: right; }

  /* Main Layout Adjustments */
  .app-main { padding: 24px 16px 64px; }
  .page-head h1 { font-size: 24px; }
  .page-head .btn { width: 100%; justify-content: center; }
  
  .form-grid { grid-template-columns: 1fr; gap: 16px; }
  .panel-pad { padding: 20px 16px; }
  
  /* KPI Dashboard Adjustments */
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi { padding: 16px; }
  .kpi-value { font-size: 28px; }
  
  .actions-row { flex-direction: column; gap: 10px; }
  .actions-row .btn { width: 100%; }
  
  .filter-bar { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
  .filter-bar input[type="text"], .filter-bar select { width: 100%; min-width: 0; }
  
  /* Mobile Table View (Card Format) */
  table.reg, table.reg thead, table.reg tbody, table.reg th, table.reg td, table.reg tr { display: block; }
  table.reg thead { display: none; }
  table.reg tr { 
    background: #fff; 
    border: 1px solid var(--steel-100); 
    border-radius: var(--radius); 
    margin-bottom: 16px; 
    padding: 8px 16px; 
    box-shadow: var(--shadow-sm); 
  }
  table.reg td { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    gap: 16px; 
    padding: 12px 0; 
    border-bottom: 1px solid var(--steel-50); 
    white-space: normal; 
    text-align: right; 
  }
  table.reg td::before { 
    content: attr(data-label); 
    font-size: 11.5px; 
    font-weight: 600; 
    text-transform: uppercase; 
    letter-spacing: 0.05em; 
    color: var(--steel-600); 
    text-align: left; 
    flex-shrink: 0; 
  }
  table.reg td:last-child { border-bottom: none; }
  table.reg td:has(input), table.reg td:has(select) { flex-direction: column; align-items: stretch; gap: 8px; }
  table.reg td:has(input)::before, table.reg td:has(select)::before { text-align: left; }
  table.reg td input, table.reg td select { min-width: 0; }
  table.reg td:has(button) { justify-content: flex-end; }
  table.reg td:has(button) .btn { width: auto; }
}

<body>

<div id="appScreen" class="hidden">
  <header class="topbar">
    <div class="topbar-inner">

  <main class="app-main" id="appMain"></main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import {
  getDatabase, ref, get, set, push, update, remove, onValue, serverTimestamp, increment
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
import {
  getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

/* =========================================================================
   FIREBASE CONFIG
   ========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyARRGKgQ_R_RFi40KXnhdmt6VZrVHVHgc0",
  authDomain: "store-issue-register.firebaseapp.com",
  databaseURL: "https://store-issue-register-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "store-issue-register",
  storageBucket: "store-issue-register.firebasestorage.app",
  messagingSenderId: "184487310656",
  appId: "1:184487310656:web:58be210595a80dfdbdf6a5"
};

/* =========================================================================
   STATE
   ========================================================================= */
let currentUser = null; 
let issuesCache = [];
let unsubIssues = null;
let unsubRequests = null;
let currentView = 'dashboard';

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const escapeHtml = (s) => (s ?? '').toString().replace(/[&<>"']/g, (c) => ({
  '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
}[c]));

const todayStr = () => {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
};

// Sync State Helper
function setSyncingState(isSyncing) {
  const icon = $('#syncIcon');
  if (!icon) return;
  if (isSyncing) {
    icon.textContent = '⟳';
    icon.style.display = 'inline-block';
    icon.classList.add('syncing-icon');
  } else {
    icon.style.display = 'none';
    icon.classList.remove('syncing-icon');
  }
}

// Auto-select current month and year on load
const initDate = new Date();
initDate.setMinutes(initDate.getMinutes() - initDate.getTimezoneOffset());
const initMonth = initDate.toISOString().slice(5, 7);
const initYear = initDate.toISOString().slice(0, 4);

let registerFilterState = { q: '', status: 'all', month: initMonth, year: initYear };

function showScreen(id) {
  ['authScreen', 'appScreen'].forEach((s) => {
    $('#' + s).classList.toggle('hidden', s !== id);
  });
}

const configIsPlaceholder = Object.values(firebaseConfig).some((v) => v.startsWith('YOUR_'));
let app, db, storage;
let cloudSyncOk = false;
let lastSyncedAt = null;
let appBootstrapped = false;
let clockStarted = false;
let cloudConnected = false;
let clockInterval = null;

const ADMIN_USERNAME = 'admin';
const ADMIN_PASSWORD = 'admin';
const SESSION_KEY = 'mechtools_session';

// =========================================================================
// APP BOOTSTRAPPING
// =========================================================================
function startApp() {
  const saved = loadSession();
  if (saved) {
    currentUser = saved;
    initTopbar();
    showScreen('appScreen');
    navigateTo(currentUser.role === 'admin' ? 'admin-dashboard' : 'dashboard');
  } else {
    showScreen('authScreen');
  }
  attemptFirebaseInit();
}

function attemptFirebaseInit() {
  if (configIsPlaceholder) return;
  try {
    app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    try { storage = getStorage(app); } catch (e) { storage = null; }
  } catch (err) {
    console.error('Firebase init error:', err);
    return;
  }

  onValue(ref(db, '.info/connected'), (snap) => {
    const connected = snap.val() === true;
    cloudConnected = connected;
    if (connected) {
      lastSyncedAt = new Date();
      if (!appBootstrapped) {
        appBootstrapped = true;
        if (currentUser) listenToCollections();
      }
    }
    updateLoginSyncIndicator(connected);
    if (currentView === 'settings-admin') render();
  }, (err) => {
    console.error('Connectivity listener error:', err);
    cloudConnected = false;
    updateLoginSyncIndicator(false);
  });
}

function updateLoginSyncIndicator(connected) {
  const dot = $('#loginSyncDot');
  const label = $('#loginSyncLabel');
  if (dot && label) {
    dot.className = 'sync-dot ' + (connected ? 'sync-dot-good' : 'sync-dot-bad');
    label.textContent = connected ? 'Cloud connected — login enabled' : 'Cloud sync unavailable — login disabled';
  }

  const loginBtn = $('#loginBtn');
  const reqBtn = $('#reqSubmitBtn');
  if (loginBtn) loginBtn.disabled = !connected;
  if (reqBtn) reqBtn.disabled = !connected;

  const appDot = $('#appSyncDot');
  const appLabel = $('#appSyncLabel');
  if (appDot && appLabel) {
    appDot.className = 'sync-dot ' + (connected ? 'sync-dot-good' : 'sync-dot-bad');
    appLabel.textContent = connected ? 'Cloud Connected' : 'Cloud Disconnected';
  }
}

function startLiveClock() {
  const clockEl = $('#appClock');
  if (!clockEl) return;
  if (clockInterval) clearInterval(clockInterval); 
  const tick = () => {
    const el = $('#appClock');
    if (!el) { clearInterval(clockInterval); clockStarted = false; return; }
    const now = new Date();
    el.textContent = now.toLocaleString(undefined, {
      weekday: 'short', day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  };
  tick();
  clockInterval = setInterval(tick, 1000); 
}

function saveSession(user) { try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch (e) {} }
function loadSession() { try { const raw = sessionStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; } }
function clearSession() { try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {} }

function clearAuthMessages() { $('#authError').classList.add('hidden'); $('#authInfo').classList.add('hidden'); }
function showAuthError(msg) { $('#authInfo').classList.add('hidden'); $('#authError').innerHTML = msg; $('#authError').classList.remove('hidden'); }
function showAuthInfo(msg) { $('#authError').classList.add('hidden'); $('#authInfo').innerHTML = msg; $('#authInfo').classList.remove('hidden'); }

// =========================================================================
// LOGIN FLOW
// =========================================================================
$('#loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAuthMessages();
  if (!cloudConnected) { showAuthError('Cloud sync is not connected. Login is disabled until the connection is restored.'); return; }
  const username = $('#loginUsername').value.trim();
  const password = $('#loginPassword').value;
  const btn = $('#loginBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Logging in…';

  try {
    if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
      currentUser = { username: ADMIN_USERNAME, fullName: 'Administrator', role: 'admin' };
      saveSession(currentUser);
      initTopbar();
      listenToCollections();
      showScreen('appScreen');
      navigateTo('admin-dashboard');
      return;
    }

    const snap = await get(ref(db, 'users/' + username));
    if (!snap.exists() || snap.val().password !== password) { showAuthError('Incorrect username or password.'); return; }
    const record = snap.val();
    
    currentUser = { 
      username, 
      fullName: record.fullName || username, 
      role: 'user'
    };
    
    saveSession(currentUser);
    initTopbar();
    listenToCollections();
    showScreen('appScreen');
    navigateTo('dashboard');
  } catch (err) {
    console.error(err);
    showAuthError('Unable to log in: failed to sync with cloud. (' + (err.message || 'unknown error') + ')');
  } finally {
    btn.disabled = false; btn.textContent = 'Log In';
  }
});

$('#logoutBtn').addEventListener('click', () => {
  if (unsubIssues) { unsubIssues(); unsubIssues = null; }
  if (unsubRequests) { unsubRequests(); unsubRequests = null; }
  
  if (clockInterval) { 
    clearInterval(clockInterval); 
    clockStarted = false; 
  }
  
  currentUser = null;
  clearSession();
  showScreen('authScreen');
});

$('#showRequestForm').addEventListener('click', () => {
  clearAuthMessages();
  $('#loginForm').classList.add('hidden'); $('#requestForm').classList.remove('hidden');
  $('#showRequestForm').classList.add('hidden'); $('#showLoginForm').classList.remove('hidden');
});
$('#showLoginForm').addEventListener('click', () => {
  clearAuthMessages();
  $('#requestForm').classList.add('hidden'); $('#loginForm').classList.remove('hidden');
  $('#showLoginForm').classList.add('hidden'); $('#showRequestForm').classList.remove('hidden');
});

$('#requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearAuthMessages();
  if (!cloudConnected) { showAuthError('Cloud sync is not connected.'); return; }
  const fullName = $('#reqFullName').value.trim();
  const username = $('#reqUsername').value.trim();
  const password = $('#reqPassword').value;
  const btn = $('#reqSubmitBtn');

  if (username.toLowerCase() === ADMIN_USERNAME) { showAuthError(`"${ADMIN_USERNAME}" is reserved and can't be requested as a username.`); return; }
  if (/[.#$\[\]\/\s'"]/.test(username)) { showAuthError('Username can\'t contain spaces, quotes, or the characters . # $ [ ] /'); return; }

  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Submitting…';
  setSyncingState(true);
  try {
    const existingUser = await get(ref(db, 'users/' + username));
    if (existingUser.exists()) { showAuthError('That username is already taken.'); return; }
    const existingReq = await get(ref(db, 'accessRequests/' + username));
    if (existingReq.exists()) { showAuthError('A request for that username is already pending approval.'); return; }
    await set(ref(db, 'accessRequests/' + username), { fullName, password, requestedAt: serverTimestamp() });
    
    $('#requestForm').classList.add('hidden'); $('#showLoginForm').classList.add('hidden');
    $('#showRequestForm').classList.remove('hidden');
    showAuthInfo('Request submitted. An Admin needs to approve it before you can log in — check back soon.');
    $('#requestForm').reset();
  } catch (err) {
    showAuthError('Unable to submit request: failed to sync with cloud.');
  } finally {
    setSyncingState(false);
    btn.disabled = false; btn.textContent = 'Submit Request';
  }
});

// START APP IMMEDIATELY
startApp();

/* =========================================================================
   TOPBAR / NAV
   ========================================================================= */
function initTopbar() {
  $('#whoName').textContent = currentUser.fullName || currentUser.username;
  $('#whoRole').textContent = currentUser.role;
  $('#whoRole').className = 'who-role role-' + currentUser.role;
  updateLoginSyncIndicator(cloudConnected);
  if (!clockStarted) { startLiveClock(); clockStarted = true; }

  const nav = $('#navLinks');
  const links = currentUser.role === 'admin'
    ? [
        ['admin-dashboard', 'Dashboard'],
        ['register', 'Register'],
        ['users-admin', 'Users'],
        ['settings-admin', 'Settings'],
      ]
    : [
        ['dashboard', 'Dashboard'],
        ['register', 'Register'],
        ['issue-new', 'New Issue'],
      ];

  nav.innerHTML = links.map(([id, label]) => `<button class="navlink" data-view="${id}">${label}</button>`).join('');
  nav.querySelectorAll('.navlink').forEach((btn) => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.view));
  });

  if (currentUser.role === 'admin') {
    if (unsubRequests) { unsubRequests(); unsubRequests = null; }
    unsubRequests = onValue(ref(db, 'accessRequests'), (snap) => {
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      updatePendingRequestsNavBadge(count);
    }, (err) => console.error('access requests listener error', err));
  }
}

function navigateTo(viewId) {
  currentView = viewId;
  $$('.navlink').forEach((btn) => btn.classList.toggle('active', btn.dataset.view === viewId));
  render();
}

function snapshotToArray(snap) {
  const val = snap.val();
  if (!val) return [];
  return Object.keys(val).map((key) => ({ id: key, ...val[key] }));
}

function listenToCollections() {
  if (unsubIssues) unsubIssues();
  
  unsubIssues = onValue(ref(db, 'issues'), (snap) => {
    issuesCache = snapshotToArray(snap).sort((a, b) => (b.issueDate || '').localeCompare(a.issueDate || ''));
    render();
  });
}

function statusOf(issue) { return ((issue.qtyReturned || 0) >= issue.qtyIssued) ? 'Returned' : 'Issued'; }

function enrichedIssues() {
  return issuesCache.map((i) => {
    const displayName = i.materialName || '(unnamed)';
    return { ...i, materialName: displayName, status: statusOf(i) };
  });
}

function render() {
  if (!currentUser) return;
  
  // Clear pending photos when navigating views to prevent memory/state leaks
  selectedPhotoFile = null;
  returnSelectedPhotoFile = null;
  editReturnSelectedPhotoFile = null;
  editIssueSelectedPhotoFile = null;

  const main = $('#appMain');
  const adminOnlyViews = ['admin-dashboard', 'users-admin', 'settings-admin', 'edit-return'];
  
  if (currentUser.role !== 'admin' && adminOnlyViews.includes(currentView)) currentView = 'dashboard';
  
  const storekeeperOnlyViews = ['dashboard']; 
  if (currentUser.role === 'admin' && storekeeperOnlyViews.includes(currentView)) currentView = 'admin-dashboard';

  const views = {
    'dashboard': renderUserDashboard,
    'admin-dashboard': renderAdminDashboard,
    'register': renderRegister,
    'issue-new': renderIssueForm,
    'users-admin': renderUsersAdmin,
    'settings-admin': renderSettingsAdmin,
    'return-record': renderReturnForm,
    'edit-return': renderEditReturnForm,
    'edit-issue': renderEditIssueForm, 
  };
  
  const fn = views[currentView] || (currentUser.role === 'admin' ? renderAdminDashboard : renderUserDashboard);
  main.innerHTML = fn();
  wireViewEvents(currentView);
}

function statsSummary() {
  const issues = enrichedIssues();
  return {
    total: issues.length,
    pending: issues.filter((i) => i.status === 'Issued').length,
    returned: issues.filter((i) => i.status === 'Returned').length,
  };
}

function renderUserDashboard() {
  const s = statsSummary();
  return `
    <div class="page-head">
      <div>
        <span class="eyebrow">Store Overview</span>
        <h1>Dashboard</h1>
        <div class="page-sub">Live status of the material issue &amp; return register.</div>
      </div>
      <button class="btn btn-primary" data-nav="issue-new">+ New Issue</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total Entries</div><div class="kpi-value">${s.total}</div></div>
      <div class="kpi warn"><div class="kpi-label">Issued</div><div class="kpi-value">${s.pending}</div></div>
      <div class="kpi good"><div class="kpi-label">Returned</div><div class="kpi-value">${s.returned}</div></div>
    </div>
    <div class="panel panel-pad">
      <h2 style="margin-top:0;">Quick actions</h2>
      <div class="actions-row">
        <button class="btn btn-dark" data-nav="issue-new">Log a New Issue</button>
        <button class="btn btn-ghost" data-nav="register">View Full Register</button>
      </div>
    </div>`;
}

function renderAdminDashboard() {
  const s = statsSummary();
  return `
    <div class="page-head">
      <div>
        <span class="eyebrow">Administrator</span>
        <h1>Admin Dashboard</h1>
        <div class="page-sub">Store-wide overview and management tools.</div>
      </div>
    </div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total Entries</div><div class="kpi-value">${s.total}</div></div>
      <div class="kpi warn"><div class="kpi-label">Pending Return</div><div class="kpi-value">${s.pending}</div></div>
      <div class="kpi good"><div class="kpi-label">Returned</div><div class="kpi-value">${s.returned}</div></div>
    </div>
    <div class="actions-row">
      <button class="btn btn-dark" data-nav="register">Manage Full Register</button>
      <button class="btn btn-ghost" data-nav="users-admin">Manage Users</button>
      <button class="btn btn-ghost" data-nav="settings-admin">Settings</button>
    </div>`;
}

function formatTimestamp(ms) {
  if (!ms || typeof ms !== 'number') return 'Syncing...'; 
  
  const d = new Date(ms);
  return d.toLocaleString(undefined, {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function renderRegister() {
  const isAdmin = currentUser.role === 'admin';
  let rows = enrichedIssues();

  if (registerFilterState.q) {
    const needle = registerFilterState.q.toLowerCase();
    rows = rows.filter((r) => {
      // Combine all visible text fields for a robust state-based search (matches DOM search)
      const rowText = [
        r.materialName, r.vendor, r.area, r.supervisorName, 
        r.empCode, r.issueDate, r.returnDate, r.status
      ].join(' ').toLowerCase();
      
      return rowText.includes(needle);
    });
  }
  
  if (registerFilterState.status !== 'all') {
    rows = rows.filter((r) => r.status.replace(/\s/g, '').toLowerCase() === registerFilterState.status);
  }

  if (registerFilterState.year !== 'all') {
    rows = rows.filter(r => r.issueDate && r.issueDate.startsWith(registerFilterState.year));
  }
  
  if (registerFilterState.month !== 'all') {
    rows = rows.filter(r => {
      if (!r.issueDate) return false;
      const parts = r.issueDate.split('-'); 
      return parts[1] === registerFilterState.month;
    });
  }

  return `
    <div class="page-head">
      <div>
        <span class="eyebrow">Records</span>
        <h1>${isAdmin ? 'Full Register' : 'Issue & Return Register'}</h1>
        <div class="page-sub">${isAdmin ? 'Every record. Admins can remove entries here.' : 'All material movements logged by the store.'}</div>
      </div>
      <button class="btn btn-primary" data-nav="issue-new">+ New Issue</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="regSearch" placeholder="Search material, vendor, area, supervisor…" value="${escapeHtml(registerFilterState.q)}" />
      <select id="regStatus">
        <option value="all" ${registerFilterState.status === 'all' ? 'selected' : ''}>All statuses</option>
        <option value="issued" ${registerFilterState.status === 'issued' ? 'selected' : ''}>Issued</option>
        <option value="returned" ${registerFilterState.status === 'returned' ? 'selected' : ''}>Returned</option>
      </select>
      <select id="regYear">
        <option value="all" ${registerFilterState.year === 'all' ? 'selected' : ''}>All Years</option>
        <option value="2024" ${registerFilterState.year === '2024' ? 'selected' : ''}>2024</option>
        <option value="2025" ${registerFilterState.year === '2025' ? 'selected' : ''}>2025</option>
        <option value="2026" ${registerFilterState.year === '2026' ? 'selected' : ''}>2026</option>
        <option value="2027" ${registerFilterState.year === '2027' ? 'selected' : ''}>2027</option>
        <option value="2028" ${registerFilterState.year === '2028' ? 'selected' : ''}>2028</option>
      </select>
      <select id="regMonth">
        <option value="all" ${registerFilterState.month === 'all' ? 'selected' : ''}>All Months</option>
        <option value="01" ${registerFilterState.month === '01' ? 'selected' : ''}>Jan</option>
        <option value="02" ${registerFilterState.month === '02' ? 'selected' : ''}>Feb</option>
        <option value="03" ${registerFilterState.month === '03' ? 'selected' : ''}>Mar</option>
        <option value="04" ${registerFilterState.month === '04' ? 'selected' : ''}>Apr</option>
        <option value="05" ${registerFilterState.month === '05' ? 'selected' : ''}>May</option>
        <option value="06" ${registerFilterState.month === '06' ? 'selected' : ''}>Jun</option>
        <option value="07" ${registerFilterState.month === '07' ? 'selected' : ''}>Jul</option>
        <option value="08" ${registerFilterState.month === '08' ? 'selected' : ''}>Aug</option>
        <option value="09" ${registerFilterState.month === '09' ? 'selected' : ''}>Sep</option>
        <option value="10" ${registerFilterState.month === '10' ? 'selected' : ''}>Oct</option>
        <option value="11" ${registerFilterState.month === '11' ? 'selected' : ''}>Nov</option>
        <option value="12" ${registerFilterState.month === '12' ? 'selected' : ''}>Dec</option>
      </select>
    </div>

    <div class="panel">
      <div class="table-wrap">
        ${rows.length === 0 ? `
          <div class="empty-state"><div class="display">No matching records</div><p>Try clearing filters, or log a new issue to get started.</p></div>
        ` : `
        <table class="reg">
          <thead>
            <tr>

function renderStorageUsage() {
  const holder = $('#storageUsageHolder');
  if (!holder) return;

  const LIMIT_KB = 1024 * 1024; // ~1 GB in KB

  const sections = [
    { label: 'Issues', data: issuesCache, color: '#3b82f6' },
  ];

  let usersKB = 0;
  const usersSizePromise = get(ref(db, 'users')).then((snap) => {
    const val = snap.val();
    usersKB = val ? new Blob([JSON.stringify(val)]).size / 1024 : 0;
  }).catch(() => { usersKB = 0; });

  usersSizePromise.then(() => {
    if (!document.contains(holder)) return; // Abort if user navigated away

    const breakdown = sections.map((s) => ({
      ...s, kb: new Blob([JSON.stringify(s.data)]).size / 1024,
    }));
    breakdown.push({ label: 'Users', kb: usersKB, color: '#8b5cf6' });

    const usedKB = breakdown.reduce((sum, s) => sum + s.kb, 0);
    const freeKB = Math.max(0, LIMIT_KB - usedKB);
    const pct = Math.min(100, (usedKB / LIMIT_KB) * 100);

    holder.innerHTML = `
      <div class="storage-bar-wrap">
        <div class="storage-bar-track">
          <div class="storage-bar-fill" style="width:${pct.toFixed(3)}%; background:${pct > 80 ? 'linear-gradient(90deg,#ef4444,#f59e0b)' : 'linear-gradient(90deg,#10b981,#f59e0b)'};"></div>
        </div>
        <div class="storage-bar-caption">
          <span>${usedKB.toFixed(2)} KB used</span>
          <span>${pct.toFixed(3)}% of ~1 GB free-tier limit</span>
        </div>
      </div>
      <div class="storage-legend">
        ${breakdown.map((s) => `
          <div class="storage-legend-row">
            <span class="storage-dot" style="background:${s.color};"></span>
            <span class="storage-legend-label">${s.label}</span>
            <span class="storage-legend-val mono">${s.kb.toFixed(2)} KB</span>
          </div>`).join('')}
        <div class="storage-legend-row storage-legend-free">
          <span class="storage-dot" style="background:var(--steel-100); border:1px solid var(--steel-300);"></span>
          <span class="storage-legend-label">Free</span>
          <span class="storage-legend-val mono">${freeKB.toFixed(2)} KB</span>
        </div>
      </div>
      <div class="muted" style="font-size:12.5px; margin-top:16px;">
        Estimated from data currently loaded in this session.
      </div>`;
  });
}


/* =========================================================================
   EVENT WIRING
   ========================================================================= */
function wireViewEvents(viewId) {
  $$('[data-nav]').forEach((btn) => btn.addEventListener('click', () => navigateTo(btn.dataset.nav)));

  if (viewId === 'register') {
    $('#regSearch')?.addEventListener('input', (e) => { 
      const needle = e.target.value.toLowerCase();
      registerFilterState.q = needle; // Keep state in sync in case of tab switches
      
      // Directly filter the rows in the DOM instead of re-rendering everything
      document.querySelectorAll('table.reg tbody tr').forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(needle) ? '' : 'none';
      });
    });

    $('#regStatus')?.addEventListener('change', (e) => { registerFilterState.status = e.target.value; render(); });
    $('#regYear')?.addEventListener('change', (e) => { registerFilterState.year = e.target.value; render(); });
    $('#regMonth')?.addEventListener('change', (e) => { registerFilterState.month = e.target.value; render(); });
    
    $$('[data-return]').forEach((btn) => btn.addEventListener('click', () => {
      returnFormTargetId = btn.dataset.return;
      returnFormError = '';
      navigateTo('return-record');
    }));
    $$('[data-delete-issue]').forEach((btn) => btn.addEventListener('click', () => {
      if (confirm('Delete this register entry permanently?')) deleteIssue(btn.dataset.deleteIssue);
    }));
    $$('[data-edit-return]').forEach((btn) => btn.addEventListener('click', () => {
      editReturnTargetId = btn.dataset.editReturn;
      editReturnError = '';
      navigateTo('edit-return');
    }));
    $$('[data-edit-issue]').forEach((btn) => btn.addEventListener('click', () => {
      editIssueTargetId = btn.dataset.editIssue;
      editIssueError = '';
      navigateTo('edit-issue');
    }));
  }

  if (viewId === 'issue-new') {
    $('#issueForm').addEventListener('submit', handleIssueSubmit);
    $('#f_photo').addEventListener('change', handlePhotoSelected);
    $('#f_photoClear').addEventListener('click', clearSelectedPhoto);
  }

  if (viewId === 'return-record') {
    $('#returnForm').addEventListener('submit', handleReturnSubmit);
    $('#r_photo').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { returnSelectedPhotoFile = null; $('#r_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
      returnSelectedPhotoFile = file;
      const reader = new FileReader();
      reader.onload = () => { $('#r_photoPreview').src = reader.result; $('#r_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);
    });
    $('#r_photoClear').addEventListener('click', () => {
      returnSelectedPhotoFile = null;
      const input = $('#r_photo');
      if (input) input.value = '';
      $('#r_photoPreviewWrap').style.display = 'none';
    });
  }

  if (viewId === 'edit-return') {
    $('#editReturnForm').addEventListener('submit', handleEditReturnSubmit);
    $('#er_photo').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { editReturnSelectedPhotoFile = null; $('#er_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
      editReturnSelectedPhotoFile = file;
      const reader = new FileReader();
      reader.onload = () => { $('#er_photoPreview').src = reader.result; $('#er_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);
    });
    $('#er_photoClear').addEventListener('click', () => {
      editReturnSelectedPhotoFile = null;
      const input = $('#er_photo');
      if (input) input.value = '';
      $('#er_photoPreviewWrap').style.display = 'none';
    });
  }
  
  if (viewId === 'edit-issue') {
    $('#editIssueForm').addEventListener('submit', handleEditIssueSubmit);
    $('#ei_photo').addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { editIssueSelectedPhotoFile = null; $('#ei_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
      editIssueSelectedPhotoFile = file;
      const reader = new FileReader();
      reader.onload = () => { $('#ei_photoPreview').src = reader.result; $('#ei_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);
    });
    $('#ei_photoClear').addEventListener('click', () => {
      editIssueSelectedPhotoFile = null;
      const input = $('#ei_photo');
      if (input) input.value = '';
      $('#ei_photoPreviewWrap').style.display = 'none';
    });
  }

  if (viewId === 'users-admin') {
    $('#newUserForm').addEventListener('submit', handleNewUserSubmit);
    loadRequestsTable();
    loadUsersTable();
  }

  if (viewId === 'settings-admin') {
    renderStorageUsage();
    $('#refreshSyncStatusBtn')?.addEventListener('click', () => render());
  }
}

/* =========================================================================
   WRITE OPERATIONS
   ========================================================================= */
let selectedPhotoFile = null;
let returnSelectedPhotoFile = null;
let editReturnSelectedPhotoFile = null;
let editIssueSelectedPhotoFile = null;

function handlePhotoSelected(e) {
  const file = e.target.files && e.target.files[0];
  if (!file) { clearSelectedPhoto(); return; }
  if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
  if (file.size > 5 * 1024 * 1024) { alert('Please choose an image smaller than 5 MB.'); e.target.value = ''; return; }
  selectedPhotoFile = file;
  const reader = new FileReader();
  reader.onload = () => { $('#f_photoPreview').src = reader.result; $('#f_photoPreviewWrap').style.display = 'block'; };
  reader.readAsDataURL(file);
}

function clearSelectedPhoto() {
  selectedPhotoFile = null;
  const input = $('#f_photo');
  if (input) input.value = '';
  const wrap = $('#f_photoPreviewWrap');
  if (wrap) wrap.style.display = 'none';
}

async function handleIssueSubmit(e) {
  e.preventDefault();
  issueFormError = '';
  
  const materialName = $('#f_material').value.trim();
  const qty = parseInt($('#f_qty').value, 10);
  const vendor = $('#f_vendor').value.trim();
  const area = $('#f_area').value.trim();
  // Auto-capture the date for new issues
  const issueDate = todayStr();
  const supervisorName = $('#f_supervisorName').value.trim();
  const supervisorContact = $('#f_supervisorContact').value.trim();
  const empCode = $('#f_empCode').value.trim();
  const remarks = $('#f_remarks').value.trim();

  if (!materialName || !qty || qty <= 0 || !vendor || !area || !supervisorName || !supervisorContact) {
    issueFormError = 'Please fill in material, quantity, vendor, area, supervisor name, and supervisor contact number.';
    return render();
  }
  
  if (!/^\d{10}$/.test(supervisorContact)) {
    issueFormError = 'Supervisor contact number must be exactly 10 digits.';
    return render();
  }

  const btn = $('#issueSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  
  setSyncingState(true);
  try {
    const newRef = push(ref(db, 'issues'));
    await set(newRef, {
      materialName, qtyIssued: qty, vendor, area, empCode: empCode || null,
      issueDate, supervisorName, supervisorContact, returnDate: null, qtyReturned: 0, conditionOnReturn: null,
      issuedBy: currentUser.username, issuedByName: currentUser.fullName, receivedBy: null, receivedByName: null,
      remarks: remarks || null, photoUrl: null, createdAt: serverTimestamp(), updatedAt: serverTimestamp(),
    });

    if (selectedPhotoFile && storage) {
      try {
        btn.innerHTML = '<span class="spinner"></span> Uploading photo…';
        const ext = (selectedPhotoFile.name.split('.').pop() || 'jpg').slice(0, 8);
        const path = `issue-photos/${newRef.key}.${ext}`;
        const fileRef = storageRef(storage, path);
        await uploadBytes(fileRef, selectedPhotoFile);
        const url = await getDownloadURL(fileRef);
        await update(newRef, { photoUrl: url, photoPath: path });
      } catch (photoErr) {
        alert('The issue was saved, but the photo could not be uploaded: ' + (photoErr.message || 'unknown error'));
      }
    }

    clearSelectedPhoto();
    navigateTo('register');
  } catch (err) {
    issueFormError = 'Could not save this record: ' + (err.message || 'unknown error');
    render();
  } finally {
    setSyncingState(false);
  }
}

async function handleEditIssueSubmit(e) {
  e.preventDefault();
  editIssueError = '';
  const issue = issuesCache.find((i) => i.id === editIssueTargetId);
  if (!issue) return;

  const materialName = $('#ei_material').value.trim();
  const qtyIssued = parseInt($('#ei_qty').value, 10);
  const vendor = $('#ei_vendor').value.trim();
  const area = $('#ei_area').value.trim();
  const supervisorName = $('#ei_supervisorName').value.trim();
  const supervisorContact = $('#ei_supervisorContact').value.trim();
  const empCode = $('#ei_empCode').value.trim();
  const remarks = $('#ei_remarks').value.trim();

  if (!materialName || isNaN(qtyIssued) || qtyIssued < (issue.qtyReturned || 0) || !vendor || !area || !supervisorName || !supervisorContact) {
    editIssueError = `Please fill all required fields. Quantity issued cannot be less than quantity already returned (${issue.qtyReturned || 0}).`;
    return render();
  }
  
  if (!/^\d{10}$/.test(supervisorContact)) {
    editIssueError = 'Supervisor contact number must be exactly 10 digits.';
    return render();
  }

  const btn = $('#editIssueSubmitBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…'; }

  setSyncingState(true);
  try {
    const updates = {
      materialName, qtyIssued, vendor, area, supervisorName, supervisorContact,
      empCode: empCode || null, remarks: remarks || null, updatedAt: serverTimestamp(),
    };

    const newPhoto = editIssueSelectedPhotoFile;
    if (newPhoto && storage) {
      try {
        if (btn) btn.innerHTML = '<span class="spinner"></span> Uploading photo…';
        if (issue.photoPath && storage) try { await deleteObject(storageRef(storage, issue.photoPath)); } catch (_) {}
        const ext = (newPhoto.name.split('.').pop() || 'jpg').slice(0, 8);
        const path = `issue-photos/${issue.id}.${ext}`;
        const fileRef = storageRef(storage, path);
        await uploadBytes(fileRef, newPhoto);
        updates.photoUrl = await getDownloadURL(fileRef);
        updates.photoPath = path;
      } catch (photoErr) {
        alert('Changes saved, but photo could not be uploaded: ' + (photoErr.message || 'unknown error'));
      }
    }

    await update(ref(db, 'issues/' + issue.id), updates);
    editIssueSelectedPhotoFile = null;
    navigateTo('register');
  } catch (err) {
    editIssueError = 'Could not save changes: ' + (err.message || 'unknown error');
    render();
  } finally {
    setSyncingState(false);
  }
}

async function handleReturnSubmit(e) {
  e.preventDefault();
  returnFormError = '';
  const issue = issuesCache.find((i) => i.id === returnFormTargetId);
  if (!issue) return;

  const alreadyReturned = issue.qtyReturned || 0;
  const remaining = issue.qtyIssued - alreadyReturned;
  const qty = parseInt($('#r_qty').value, 10);
  const returnDate = $('#r_date').value;
  const condition = $('#r_condition').value;
  const remarks = $('#r_remarks').value.trim();

  if (!returnDate || isNaN(qty) || qty <= 0 || qty > remaining) {
    returnFormError = `Please enter a valid return date and quantity (max ${remaining} remaining).`;
    return render();
  }

  const submitBtn = document.querySelector('#returnForm button[type="submit"]');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<span class="spinner"></span> Saving…'; }

  setSyncingState(true);
  try {
    const updates = {
      returnDate, qtyReturned: increment(qty), conditionOnReturn: condition,
      receivedBy: currentUser.username, receivedByName: currentUser.fullName,
      remarks: remarks || issue.remarks || null, updatedAt: serverTimestamp(), returnedAt: serverTimestamp(),
    };

    if (returnSelectedPhotoFile && storage) {
      try {
        if (submitBtn) submitBtn.innerHTML = '<span class="spinner"></span> Uploading photo…';
        const ext = (returnSelectedPhotoFile.name.split('.').pop() || 'jpg').slice(0, 8);
        const path = `return-photos/${issue.id}.${ext}`;
        const fileRef = storageRef(storage, path);
        await uploadBytes(fileRef, returnSelectedPhotoFile);
        updates.returnPhotoUrl = await getDownloadURL(fileRef);
        updates.returnPhotoPath = path;
      } catch (photoErr) {
        alert('Return saved, but photo could not be uploaded: ' + (photoErr.message || 'unknown error'));
      }
    }

    await update(ref(db, 'issues/' + issue.id), updates);
    returnSelectedPhotoFile = null;
    navigateTo('register');
  } catch (err) {
    returnFormError = 'Could not save the return: ' + (err.message || 'unknown error');
    render();
  } finally {
    setSyncingState(false);
  }
}

async function deleteIssue(id) {
  setSyncingState(true);
  try {
    const issue = issuesCache.find((i) => i.id === id);
    if (!issue) return;
    
    await remove(ref(db, 'issues/' + id));
    
    if (storage && issue) {
      if (issue.photoPath) try { await deleteObject(storageRef(storage, issue.photoPath)); } catch (_) {}
      if (issue.returnPhotoPath) try { await deleteObject(storageRef(storage, issue.returnPhotoPath)); } catch (_) {}
    }
  } catch (err) { alert('Could not delete this record: ' + (err.message || 'unknown error')); }
  finally { setSyncingState(false); }
}

async function loadRequestsTable() {
  const holder = $('#requestsHolder');
  if (!holder) return;
  const pad = holder.querySelector('.panel-pad');
  
  setSyncingState(true);
  try {
    const snap = await get(ref(db, 'accessRequests'));
    const requests = snapshotToArray(snap);
    updatePendingRequestsNavBadge(requests.length);

    if (requests.length === 0) { pad.innerHTML = `<div class="empty-state" style="padding:40px 0;"><p>No pending requests right now.</p></div>`; return; }

    pad.innerHTML = requests.map((r) => `
      <div class="request-card">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap;">
          <div>
            <div style="font-weight:700; font-size:15px; color:var(--steel-900);">${escapeHtml(r.fullName)}</div>
            <div class="mono muted" style="font-size:12.5px; margin-top:4px;">Username: ${escapeHtml(r.id)}</div>
          </div>
          <div style="display:flex; gap:12px;">
            <button class="btn btn-primary btn-sm" data-approve-request="${escapeHtml(r.id)}">Approve</button>
            <button class="btn btn-danger btn-sm" data-reject-request="${escapeHtml(r.id)}">Reject</button>
          </div>
        </div>
      </div>`).join('');

    pad.querySelectorAll('[data-approve-request]').forEach((btn) => { btn.addEventListener('click', () => handleApproveRequest(btn.dataset.approveRequest)); });
    pad.querySelectorAll('[data-reject-request]').forEach((btn) => { btn.addEventListener('click', () => handleRejectRequest(btn.dataset.rejectRequest)); });
  } catch (err) { 
    pad.innerHTML = `<div class="alert alert-error">Could not load requests: ${escapeHtml(err.message || 'unknown error')}</div>`; 
  } finally {
    setSyncingState(false);
  }
}

async function handleApproveRequest(username) {
  setSyncingState(true);
  try {
    const reqSnap = await get(ref(db, 'accessRequests/' + username));
    if (!reqSnap.exists()) { loadRequestsTable(); return; }
    const existing = await get(ref(db, 'users/' + username));
    if (existing.exists()) { alert(`A user named "${username}" already exists. Reject this request or ask them to choose a different username.`); return; }
    const { fullName, password } = reqSnap.val();
    await set(ref(db, 'users/' + username), { fullName, password, createdAt: serverTimestamp() });
    await remove(ref(db, 'accessRequests/' + username));
    loadRequestsTable();
    loadUsersTable();
  } catch (err) { 
    alert('Could not approve this request: ' + (err.message || 'unknown error')); 
  } finally {
    setSyncingState(false);
  }
}

async function handleRejectRequest(username) {
  if (!confirm(`Reject the access request from "${username}"?`)) return;
  setSyncingState(true);
  try { 
    await remove(ref(db, 'accessRequests/' + username)); 
    loadRequestsTable(); 
  } catch (err) { 
    alert('Could not reject this request: ' + (err.message || 'unknown error')); 
  } finally {
    setSyncingState(false);
  }
}

function updatePendingRequestsNavBadge(count) {
  const navBtn = document.querySelector('.navlink[data-view="users-admin"]');
  if (!navBtn) return;
  const existing = navBtn.querySelector('.pending-count-dot');
  if (existing) existing.remove();
  if (count > 0) {
    const dot = document.createElement('span');
    dot.className = 'pending-count-dot';
    dot.textContent = count;
    navBtn.appendChild(dot);
  }
}

async function loadUsersTable() {
  const holder = $('#usersTableHolder');
  if (!holder) return;
  
  setSyncingState(true);
  try {
    const snap = await get(ref(db, 'users'));
    const users = snapshotToArray(snap);
    holder.innerHTML = `
      <div class="table-wrap">
        ${users.length === 0 ? `<div class="empty-state"><div class="display">No staff accounts yet</div><p>Add one using the form below.</p></div>` : `
        <table class="reg">
          <thead><tr><th>Username</th><th>Full Name</th><th>Action</th></tr></thead>
          <tbody>
            ${users.map((u) => `
              <tr>
                <td class="mono" data-label="Username">${escapeHtml(u.id)}</td>
                <td data-label="Full Name">${escapeHtml(u.fullName)}</td>
                <td data-label="Action"><button class="btn btn-danger btn-sm" data-remove-user="${escapeHtml(u.id)}">Delete</button></td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>`;

    holder.querySelectorAll('[data-remove-user]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (!confirm(`Delete the account "${btn.dataset.removeUser}"? They will no longer be able to log in.`)) return;
        setSyncingState(true);
        try { 
          await remove(ref(db, 'users/' + btn.dataset.removeUser)); 
          loadUsersTable(); 
        } catch (err) { 
          alert('Could not delete this account: ' + (err.message || 'unknown error')); 
        } finally {
          setSyncingState(false);
        }
      });
    });
  } catch (err) { 
    holder.innerHTML = `<div class="alert alert-error" style="margin:20px;">Could not load users: ${escapeHtml(err.message || 'unknown error')}</div>`; 
  } finally {
    setSyncingState(false);
  }
}

async function handleNewUserSubmit(e) {
  e.preventDefault();
  userFormError = '';
  const username = $('#nu_username').value.trim();
  const fullName = $('#nu_fullname').value.trim();
  const password = $('#nu_password').value;

  if (!username || !fullName || !password) { userFormError = 'Please fill in username, full name, and password.'; return render(); }
  if (username.toLowerCase() === ADMIN_USERNAME) { userFormError = `"${ADMIN_USERNAME}" is reserved for the Admin login and can't be used here.`; return render(); }
  if (/[.#$\[\]\/\s'"]/.test(username)) { userFormError = 'Username can\'t contain spaces, quotes, or the characters . # $ [ ] /'; return render(); }

  setSyncingState(true);
  try {
    const existing = await get(ref(db, 'users/' + username));
    if (existing.exists()) { userFormError = 'That username already exists.'; return render(); }
    await set(ref(db, 'users/' + username), { fullName, password, createdAt: serverTimestamp(), });
    navigateTo('users-admin');
  } catch (err) { 
    userFormError = 'Could not create this account: ' + (err.message || 'unknown error'); 
    render(); 
  } finally {
    setSyncingState(false);
  }
}
