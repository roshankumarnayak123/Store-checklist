<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CMM SMS Store</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" />
<style>
:root {
  /* Modern Slate Palette */
  --steel-950: #0f172a;
  --steel-900: #1e293b;
  --steel-800: #334155;
  --steel-700: #475569;
  --steel-600: #64748b;
  --steel-300: #cbd5e1;
  --steel-100: #f1f5f9;
  --steel-50:  #f8fafc;
  
  /* Accents */
  --amber: #f59e0b;
  --amber-dark: #b45309;
  --amber-soft: #fef3c7;
  
  --good: #10b981;
  --good-soft: #d1fae5;
  --good-dark: #047857;
  
  --warn: #f59e0b;
  --warn-soft: #fef3c7;
  --warn-dark: #b45309;
  
  --bad: #ef4444;
  --bad-soft: #fee2e2;
  --bad-dark: #b91c1c;
  
  /* Geometry & Shadows */
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-focus: 0 0 0 4px rgba(245, 158, 11, 0.25);
  
  /* Transitions */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Base & Scrollbars */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; scroll-behavior: smooth; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--text-main);
  background: var(--page-bg);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  min-height: 100vh;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--steel-300); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--steel-600); }

/* Typography */
h1, h2, h3, .display {
  font-family: 'Barlow Condensed', 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: 0.02em;
  text-transform: uppercase;
  color: var(--steel-950);
}
.mono, code, .tool-code, .qty { font-family: 'IBM Plex Mono', monospace; font-size: 0.95em; }
a { color: var(--amber-dark); text-decoration: none; transition: color 0.2s var(--ease); }
a:hover { color: var(--amber); }
.hidden { display: none !important; }

/* Sync Spinner Animation */
@keyframes syncRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.syncing-icon {
  display: inline-block;
  animation: syncRotate 1s linear infinite;
  color: var(--amber);
}

/* Light / Dark theme system */
:root {
  color-scheme: light;
  --page-bg: linear-gradient(135deg, var(--steel-50) 0%, #e2e8f0 100%);
  --surface: #ffffff;
  --surface-soft: var(--steel-50);
  --surface-border: rgba(0,0,0,0.06);
  --text-main: var(--steel-800);
  --text-strong: var(--steel-950);
  --text-muted: var(--steel-600);
  --table-row-hover: var(--steel-50);
  --table-divider: var(--steel-100);
  --input-bg: var(--steel-50);
}
html[data-theme="dark"] {
  color-scheme: dark;
  --page-bg: linear-gradient(135deg, #07101f 0%, #111827 55%, #172033 100%);
  --surface: #111827;
  --surface-soft: #172033;
  --surface-border: rgba(148,163,184,0.18);
  --text-main: #dbe4f0;
  --text-strong: #f8fafc;
  --text-muted: #94a3b8;
  --table-row-hover: #172033;
  --table-divider: rgba(148,163,184,0.14);
  --input-bg: #0f172a;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
  --shadow: 0 5px 14px rgba(0,0,0,0.30);
  --shadow-lg: 0 14px 28px rgba(0,0,0,0.38);
}
html[data-theme="dark"] body { background: var(--page-bg); color: var(--text-main); }
html[data-theme="dark"] h1,
html[data-theme="dark"] h2,
html[data-theme="dark"] h3,
html[data-theme="dark"] .display { color: var(--text-strong); }
html[data-theme="dark"] .page-sub,
html[data-theme="dark"] .muted,
html[data-theme="dark"] .kv-key,
html[data-theme="dark"] .storage-legend-label,
html[data-theme="dark"] .storage-bar-caption { color: var(--text-muted); }
html[data-theme="dark"] .panel,
html[data-theme="dark"] .kpi,
html[data-theme="dark"] .filter-bar,
html[data-theme="dark"] table.reg td,
html[data-theme="dark"] table.reg tr,
html[data-theme="dark"] .auth-card { background: var(--surface); border-color: var(--surface-border); color: var(--text-main); }
html[data-theme="dark"] .panel-head,
html[data-theme="dark"] table.reg td,
html[data-theme="dark"] .kv-row { border-color: var(--table-divider); }
html[data-theme="dark"] table.reg tbody tr:hover td { background: var(--table-row-hover); }
html[data-theme="dark"] .kpi-value,
html[data-theme="dark"] .kv-val,
html[data-theme="dark"] .storage-legend-val { color: var(--text-strong); }
html[data-theme="dark"] input,
html[data-theme="dark"] select,
html[data-theme="dark"] textarea { background: var(--input-bg); color: var(--text-strong); border-color: #475569; }
html[data-theme="dark"] input:focus,
html[data-theme="dark"] select:focus,
html[data-theme="dark"] textarea:focus { background: #111827; }
html[data-theme="dark"] input:disabled { background: #1e293b; color: #94a3b8; }
html[data-theme="dark"] .btn-ghost { color: #cbd5e1; border-color: #475569; }
html[data-theme="dark"] .btn-ghost:hover { background: #1e293b; color: #fff; }
html[data-theme="dark"] .tag,
html[data-theme="dark"] .photo-more,
html[data-theme="dark"] .login-sync-row { background: #1e293b; color: #dbe4f0; border-color: #334155; }
html[data-theme="dark"] .storage-bar-track { background: #263449; }
html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #475569; }

.theme-toggle {
  position: relative;
  width: 54px;
  height: 28px;
  flex: 0 0 54px;
  padding: 0;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px;
  background: #475569;
  cursor: pointer;
  transition: background .25s var(--ease), border-color .25s var(--ease);
}
.theme-toggle:hover { border-color: var(--amber); }
.theme-toggle-track { display: flex; align-items: center; justify-content: space-between; padding: 0 6px; font-size: 12px; line-height: 26px; }
.theme-toggle-knob {
  position: absolute;
  left: 3px;
  top: 3px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 5px rgba(0,0,0,.35);
  transition: transform .25s var(--ease-spring);
}
html[data-theme="dark"] .theme-toggle { background: #0f172a; }
html[data-theme="dark"] .theme-toggle-knob { transform: translateX(26px); background: var(--amber); }
.theme-toggle:focus-visible { outline: none; box-shadow: var(--shadow-focus); }
@media (max-width: 768px) {
  .theme-toggle { width: 50px; flex-basis: 50px; }
  html[data-theme="dark"] .theme-toggle-knob { transform: translateX(22px); }
}

/* Login-screen theme and contrast fixes */
.auth-theme-toggle {
  position: fixed;
  top: 22px;
  right: 24px;
  z-index: 100;
}
html[data-theme="dark"] .auth-card .brand { color: #f8fafc; }
html[data-theme="dark"] .auth-card .brand-text { color: #f8fafc; }
html[data-theme="dark"] .auth-card .brand-text strong { color: var(--amber); }
html[data-theme="dark"] .auth-sub { color: #cbd5e1; }
html[data-theme="dark"] .auth-card .field label { color: #cbd5e1; }
html[data-theme="dark"] .request-link-row button { color: #cbd5e1; }
html[data-theme="dark"] .request-link-row button:hover { color: var(--amber); }
html[data-theme="dark"] .auth-hint { color: #b8c4d4; border-top-color: #334155; }
html[data-theme="dark"] .login-sync-row { color: #e2e8f0; }
html[data-theme="dark"] .auth-card input { border-color: #52627a; }
html[data-theme="dark"] .auth-card input::placeholder { color: #94a3b8; }
html[data-theme="dark"] .auth-card .alert-error { background: #3b1518; color: #fecaca; border-color: #7f1d1d; }
html[data-theme="dark"] .auth-card .alert-info { background: #3a2b0b; color: #fde68a; border-color: #92400e; }
html[data-theme="dark"] .auth-card .alert-good { background: #073b2b; color: #a7f3d0; border-color: #047857; }
@media (max-width: 480px) {
  .auth-theme-toggle { top: 14px; right: 14px; }
}

/* Topbar */
.topbar { 
  background: rgba(15, 23, 42, 0.85); 
  backdrop-filter: blur(16px); 
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.05); 
  box-shadow: 0 1px 0 var(--amber), 0 10px 30px -10px rgba(0,0,0,0.3); 
  position: sticky; top: 0; z-index: 50; 
  transition: all 0.3s var(--ease);
}
.topbar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 32px; padding: 0 24px; height: 64px; }
.brand { display: flex; align-items: center; gap: 8px; color: var(--steel-50); font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: 0.06em; white-space: nowrap; cursor: default; }
.brand-mark { color: var(--amber); font-size: 22px; display: inline-block; transition: transform 0.6s var(--ease-spring); }
.brand:hover .brand-mark { transform: rotate(90deg) scale(1.1); }
.brand-text strong { color: var(--amber); }

.nav { display: flex; gap: 6px; flex: 1; }
.nav button.navlink {
  background: transparent; border: none; cursor: pointer; font-family: 'Inter', sans-serif;
  color: var(--steel-300); font-size: 13.5px; font-weight: 600;
  padding: 8px 16px; border-radius: 999px; 
  transition: all 0.25s var(--ease);
  position: relative;
}
.nav button.navlink:hover { color: #fff; background: rgba(255,255,255,0.1); }
.nav button.navlink:active { transform: scale(0.95); }
.nav button.navlink.active { color: var(--steel-950); background: var(--amber); box-shadow: 0 4px 12px rgba(245,158,11,0.3); }

.who { display: flex; align-items: center; gap: 12px; white-space: nowrap; }
.avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: var(--steel-300); flex-shrink: 0; border: 2px solid var(--steel-600); }
.who-name { color: var(--steel-100); font-size: 13.5px; font-weight: 600; }
.who-role { font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
.who-role.role-admin { background: var(--amber-soft); color: var(--amber-dark); }
.who-role.role-user { background: var(--steel-700); color: var(--steel-50); }

.status-bar { background: rgba(0,0,0,0.25); border-top: 1px solid rgba(255,255,255,0.05); }
.status-bar-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 6px 24px; gap: 14px; }
.status-sync { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--steel-300); font-weight: 500; }
.status-sync .sync-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-clock { font-size: 11.5px; color: var(--steel-300); letter-spacing: 0.03em; }
.link-btn { background: none; border: none; color: var(--steel-300); font-size: 13px; font-weight: 500; cursor: pointer; padding: 6px 4px; transition: color 0.2s var(--ease); }
.link-btn:hover { color: var(--amber); }

/* Layout & Views */
.app-main { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; animation: viewFadeIn 0.5s var(--ease-out); }
@keyframes viewFadeIn { 
  0% { opacity: 0; transform: translateY(12px) scale(0.995); } 
  100% { opacity: 1; transform: translateY(0) scale(1); } 
}

.auth-main { 
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 15% 50%, rgba(245,158,11,0.15), transparent 35%),
              radial-gradient(circle at 85% 30%, rgba(16,185,129,0.1), transparent 40%),
              var(--steel-950); 
  padding: 24px; 
}
.auth-card { 
  width: 100%; max-width: 420px; 
  background: rgba(255, 255, 255, 0.98); 
  backdrop-filter: blur(20px);
  border-radius: var(--radius-lg); 
  padding: 40px; 
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.1); 
  border-top: 3px solid var(--amber);
  animation: authCardIn 0.6s var(--ease-spring); 
}
@keyframes authCardIn { 
  0% { opacity: 0; transform: translateY(24px) scale(0.95); } 
  100% { opacity: 1; transform: translateY(0) scale(1); } 
}

/* Headers */
.page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
.page-head h1 { font-size: 28px; margin: 0; line-height: 1.1; }
.page-sub { color: var(--steel-600); font-size: 14px; margin-top: 6px; font-weight: 400; }
.eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber-dark); display: block; margin-bottom: 4px; font-weight: 600; }

/* Panels & Cards */
.panel { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: var(--radius-lg); box-shadow: var(--shadow); transition: box-shadow 0.3s var(--ease), transform 0.3s var(--ease); }
.panel:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.panel-pad { padding: 28px 32px; }
.panel-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--steel-100); }
.panel-head h2 { font-size: 18px; margin: 0; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
.kpi { background: #fff; border: 1px solid rgba(0,0,0,0.06); border-radius: var(--radius-lg); padding: 20px 24px; box-shadow: var(--shadow); position: relative; overflow: hidden; transition: all 0.3s var(--ease); }
.kpi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; background: var(--steel-300); }
.kpi:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.kpi.amber::before { background: var(--amber); } .kpi.good::before { background: var(--good); }
.kpi.warn::before { background: var(--warn); } .kpi.bad::before { background: var(--bad); }
.kpi-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--steel-600); font-weight: 600; margin-bottom: 8px; }
.kpi-value { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 36px; color: var(--steel-950); line-height: 1; }

/* Tables */
.table-wrap { overflow-x: auto; border-radius: var(--radius-lg); }
table.reg { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 14px; }
table.reg th { background: var(--steel-900); color: var(--steel-50); text-align: left; padding: 14px 16px; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; white-space: nowrap; }
table.reg th:first-child { border-top-left-radius: var(--radius-lg); }
table.reg th:last-child { border-top-right-radius: var(--radius-lg); }
table.reg td { padding: 14px 16px; border-bottom: 1px solid var(--steel-100); vertical-align: middle; white-space: nowrap; background: #fff; transition: background 0.2s var(--ease); }
table.reg tbody tr { transition: transform 0.2s var(--ease); }
table.reg tbody tr:hover td { background: var(--steel-50); }
table.reg tbody tr:last-child td { border-bottom: none; }
table.reg tbody tr:last-child td:first-child { border-bottom-left-radius: var(--radius-lg); }
table.reg tbody tr:last-child td:last-child { border-bottom-right-radius: var(--radius-lg); }

.badge { display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 12px; border-radius: 999px; }
.badge.good { background: var(--good-soft); color: var(--good-dark); }
.badge.warn { background: var(--warn-soft); color: var(--warn-dark); }
.badge.bad { background: var(--bad-soft); color: var(--bad-dark); }
.badge.overdue { background: var(--bad-dark); color: #fff; margin-left: 6px; }

/* Forms & Inputs */
.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px 24px; }
.form-grid .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 12.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--steel-700); }
input, select, textarea {
  font-family: 'Inter', sans-serif; font-size: 14.5px; padding: 12px 16px; 
  border: 1px solid var(--steel-300); border-radius: var(--radius); 
  background: var(--steel-50); color: var(--steel-950); width: 100%;
  transition: all 0.2s var(--ease); outline: none;
}
input:hover, select:hover, textarea:hover { border-color: var(--steel-600); }
input:focus, select:focus, textarea:focus { background: #fff; border-color: var(--amber); box-shadow: var(--shadow-focus); }
textarea { resize: vertical; min-height: 80px; }
input:disabled { opacity: 0.6; cursor: not-allowed; }

/* Password visibility toggle */
.password-field-wrap {
  position: relative;
  width: 100%;
}
.password-field-wrap input {
  padding-right: 72px;
}
.password-toggle-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  min-width: 54px;
  padding: 6px 8px;
  border: none;
  border-radius: 7px;
  background: transparent;
  color: var(--steel-600);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: color .2s var(--ease), background .2s var(--ease);
}
.password-toggle-btn:hover {
  color: var(--amber-dark);
  background: var(--amber-soft);
}
.password-toggle-btn:focus-visible {
  outline: none;
  box-shadow: var(--shadow-focus);
}
html[data-theme="dark"] .password-toggle-btn { color: #cbd5e1; }
html[data-theme="dark"] .password-toggle-btn:hover {
  color: #fcd34d;
  background: #2d2413;
}

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; padding: 12px 24px; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.2s var(--ease-spring); }
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--amber); color: var(--steel-950); box-shadow: 0 4px 12px rgba(245,158,11,0.25); }
.btn-primary:hover { background: #fcd34d; box-shadow: 0 6px 16px rgba(245,158,11,0.35); transform: translateY(-2px); }
.btn-dark { background: var(--steel-950); color: #fff; box-shadow: 0 4px 12px rgba(15,23,42,0.2); }
.btn-dark:hover { background: var(--steel-800); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,23,42,0.3); }
.btn-ghost { background: transparent; color: var(--steel-700); border: 1px solid var(--steel-300); }
.btn-ghost:hover { background: var(--steel-50); border-color: var(--steel-600); color: var(--steel-950); }
.btn-danger { background: var(--bad-soft); color: var(--bad-dark); }
.btn-danger:hover { background: #fecaca; }
.btn-sm { padding: 8px 16px; font-size: 12.5px; }

.actions-row { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
.filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; background: #fff; padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid rgba(0,0,0,0.04); }
.filter-bar input[type="text"] { min-width: 260px; flex: 1; }
.filter-bar select { width: auto; min-width: 140px; }
.filter-toggle { display: none; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.filter-toggle .count-badge { background: var(--amber); color: var(--steel-950); border-radius: 999px; font-size: 11px; font-weight: 800; padding: 1px 7px; margin-left: 6px; }
.reg-pagination { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px; }
.reg-pagination .reg-page-info { font-size: 13px; color: var(--steel-600); font-weight: 600; }

/* Alerts & States */
.alert { padding: 14px 20px; border-radius: var(--radius); font-size: 14px; margin-bottom: 20px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: viewFadeIn 0.3s var(--ease-out); }
.alert-error { background: var(--bad-soft); color: var(--bad-dark); border: 1px solid #fecaca; }
.alert-info { background: var(--amber-soft); color: var(--warn-dark); border: 1px solid #fde68a; }
.alert-good { background: var(--good-soft); color: var(--good-dark); border: 1px solid #a7f3d0; }

.empty-state { text-align: center; padding: 60px 24px; color: var(--steel-600); }
.empty-state .display { font-size: 22px; margin-bottom: 12px; color: var(--steel-900); }

/* Auth Extras */
.auth-card .brand { color: var(--steel-950); justify-content: center; margin-bottom: 8px; font-size: 22px; }
.auth-sub { text-align: center; color: var(--steel-600); font-size: 14px; margin-bottom: 24px; }
.login-sync-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 12px; color: var(--steel-700); font-weight: 600; margin-bottom: 28px; padding: 10px 16px; background: var(--steel-50); border-radius: 999px; border: 1px solid var(--steel-100); }
.login-sync-row .sync-dot { width: 10px; height: 10px; border-radius: 50%; }
.auth-card form { display: flex; flex-direction: column; gap: 18px; }
.auth-card .btn { justify-content: center; margin-top: 8px; padding: 14px; font-size: 15px; }
.auth-hint { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--steel-100); font-size: 12.5px; color: var(--steel-600); line-height: 1.6; text-align: center; }
.request-link-row { text-align: center; margin-top: 24px; }
.request-link-row button { background: none; border: none; color: var(--steel-600); font-size: 13.5px; font-weight: 500; cursor: pointer; transition: color 0.2s var(--ease); }
.request-link-row button:hover { color: var(--amber-dark); }

.tag { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; background: var(--steel-100); color: var(--steel-800); padding: 4px 8px; border-radius: 6px; }
.muted { color: var(--steel-600); }
.stock-low { color: var(--bad); font-weight: 700; }
.qty-pending { color: var(--warn-dark); font-weight: 700; }

/* Settings / Storage */
.sync-status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.sync-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.sync-dot-good { background: var(--good); box-shadow: 0 0 0 4px var(--good-soft); animation: pulseDot 2.5s ease-in-out infinite; }
.sync-dot-bad { background: var(--bad); box-shadow: 0 0 0 4px var(--bad-soft); }
@keyframes pulseDot { 0%, 100% { box-shadow: 0 0 0 4px var(--good-soft); } 50% { box-shadow: 0 0 0 8px rgba(16,185,129,0.15); } }
.sync-status-label { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 18px; text-transform: uppercase; letter-spacing: 0.04em; }
.kv-grid { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--steel-100); margin-top: 8px; }
.kv-row { display: flex; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--steel-100); font-size: 14px; }
.kv-key { color: var(--steel-600); font-weight: 600; flex-shrink: 0; }
.kv-val { text-align: right; color: var(--steel-900); font-weight: 500; }

.storage-bar-wrap { margin-bottom: 24px; }
.storage-bar-track { width: 100%; height: 16px; border-radius: 999px; background: var(--steel-100); overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
.storage-bar-fill { height: 100%; border-radius: 999px; transition: width 0.8s var(--ease-spring); }
.storage-bar-caption { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--steel-600); margin-top: 10px; font-weight: 500; }
.storage-legend { display: flex; flex-direction: column; gap: 12px; }
.storage-legend-row { display: flex; align-items: center; gap: 12px; font-size: 14px; }
.storage-legend-free { border-top: 1px solid var(--steel-100); padding-top: 12px; margin-top: 4px; }
.storage-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.storage-legend-label { flex: 1; color: var(--steel-700); font-weight: 500; }
.storage-legend-val { font-weight: 600; color: var(--steel-900); }

.spinner { display: inline-block; width: 16px; height: 16px; border: 2.5px solid rgba(0,0,0,0.1); border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Badges */
.request-card { border: 1.5px dashed var(--amber); background: var(--amber-soft); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 12px; transition: transform 0.2s var(--ease); }
.request-card:hover { transform: translateX(4px); }
.pending-count-dot { display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 20px; padding: 0 6px; border-radius: 999px; background: var(--bad-dark); color: #fff; font-size: 11px; font-weight: 800; margin-left: 8px; }

/* Compact multi-photo thumbnails inside register rows */
.photo-thumb-strip {
  display: inline-flex;
  flex-wrap: nowrap;
  align-items: center;
  gap: 4px;
  width: max-content;
  max-width: 132px;
  vertical-align: middle;
}
.photo-thumb-strip a {
  display: block;
  width: 34px;
  height: 34px;
  flex: 0 0 34px;
  line-height: 0;
}
.photo-thumb-strip img {
  display: block;
  width: 34px;
  height: 34px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,0.12);
}
.photo-more {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  flex: 0 0 28px;
  border-radius: 999px;
  background: var(--steel-100);
  color: var(--steel-700);
  font: 600 10px/1 'IBM Plex Mono', monospace;
}
table.reg td[data-label="Issue Photo"],
table.reg td[data-label="Return Photo"] {
  width: 140px;
  min-width: 90px;
  max-width: 140px;
  white-space: nowrap;
}

/* Responsive Adjustments */
@media (max-width: 768px) {
  /* Enforce two-row topbar layout */
  .topbar-inner { 
    flex-wrap: wrap; 
    height: auto; 
    padding: 12px 16px; 
    gap: 12px 8px;
    justify-content: space-between; 
  }
  .brand { font-size: 17.5px; flex-shrink: 0; }
  .who { flex-shrink: 0; margin-left: auto; gap: 10px; }
  .who-name { display: none; } 
  
  /* Force navigation to the second row and enable horizontal scrolling */
  .nav { 
    order: 3; 
    flex: 1 1 100%; 
    width: 100%; 
    margin: 0;
    overflow-x: auto; 
    padding-bottom: 4px; 
    -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; 
    display: flex;
    flex-wrap: nowrap; 
    gap: 8px;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav button.navlink { padding: 8px 16px; font-size: 13px; flex-shrink: 0; }
  
  /* Fix status bar wrapping */
  .status-bar-inner { padding: 8px 16px; flex-wrap: nowrap; gap: 12px; justify-content: space-between; }
  .status-sync { font-size: 10.5px; white-space: nowrap; flex-shrink: 0; }
  .status-clock { font-size: 10.5px; white-space: nowrap; flex-shrink: 0; text-align: right; }

  /* Main Layout Adjustments */
  .app-main { padding: 24px 16px 64px; }
  .page-head h1 { font-size: 24px; }
  .page-head .btn { width: 100%; justify-content: center; }
  
  .form-grid { grid-template-columns: 1fr; gap: 16px; }
  .panel-pad { padding: 20px 16px; }
  
  /* KPI Dashboard Adjustments */
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi { padding: 16px; }
  .kpi-value { font-size: 28px; }
  
  .actions-row { flex-direction: column; gap: 10px; }
  .actions-row .btn { width: 100%; }
  
  .filter-toggle { display: flex; }
  .filter-bar { display: none; flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
  .filter-bar.open { display: flex; }
  .filter-bar input[type="text"], .filter-bar select { width: 100%; min-width: 0; }
  .reg-pagination { flex-direction: column; text-align: center; }
  
  /* Mobile Table View (Card Format) */
  table.reg, table.reg thead, table.reg tbody, table.reg th, table.reg td, table.reg tr { display: block; }
  table.reg thead { display: none; }
  table.reg tr { 
    background: #fff; 
    border: 1px solid var(--steel-100); 
    border-radius: var(--radius); 
    margin-bottom: 16px; 
    padding: 8px 16px; 
    box-shadow: var(--shadow-sm); 
  }
  table.reg td { 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    gap: 16px; 
    padding: 12px 0; 
    border-bottom: 1px solid var(--steel-50); 
    white-space: normal; 
    text-align: right; 
  }
  table.reg td::before { 
    content: attr(data-label); 
    font-size: 11.5px; 
    font-weight: 600; 
    text-transform: uppercase; 
    letter-spacing: 0.05em; 
    color: var(--steel-600); 
    text-align: left; 
    flex-shrink: 0; 
  }
  table.reg td:last-child { border-bottom: none; }
  table.reg td:has(input), table.reg td:has(select) { flex-direction: column; align-items: stretch; gap: 8px; }
  table.reg td:has(input)::before, table.reg td:has(select)::before { text-align: left; }
  table.reg td input, table.reg td select { min-width: 0; }
  table.reg td:has(button) { justify-content: flex-end; }
  table.reg td:has(button) .btn { width: auto; }
}

@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .auth-card { padding: 32px 24px; border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .auth-main { padding: 0; }
}

/* ========================================================================== 
   MODERN UI REFINEMENT LAYER
   Keeps all existing functionality while upgrading layout, depth and motion.
   ========================================================================== */
:root {
  --modern-accent: #f59e0b;
  --modern-accent-2: #fb923c;
  --modern-blue: #2563eb;
  --modern-glass: rgba(255,255,255,.78);
  --modern-border: rgba(15,23,42,.08);
  --modern-ring: 0 0 0 4px rgba(245,158,11,.16);
}
body {
  background:
    radial-gradient(circle at 8% 8%, rgba(245,158,11,.10), transparent 28%),
    radial-gradient(circle at 92% 18%, rgba(37,99,235,.08), transparent 25%),
    var(--page-bg);
  background-attachment: fixed;
}

/* Header: slimmer glass bar with clearer hierarchy */
.topbar {
  background: rgba(15,23,42,.88);
  border-bottom: 1px solid rgba(255,255,255,.08);
  box-shadow: 0 12px 35px rgba(15,23,42,.18);
}
.topbar-inner { height: 70px; gap: 24px; }
.brand {
  font-size: 20px;
  letter-spacing: .075em;
}
.brand-mark {
  display: grid;
  place-items: center;
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  color: #111827;
  box-shadow: 0 8px 20px rgba(245,158,11,.25);
  font-size: 18px;
}
.nav { justify-content: center; }
.nav button.navlink {
  padding: 9px 16px;
  border: 1px solid transparent;
  color: #cbd5e1;
}
.nav button.navlink:hover {
  border-color: rgba(255,255,255,.10);
  background: rgba(255,255,255,.07);
}
.nav button.navlink.active {
  color: #111827;
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  box-shadow: 0 8px 22px rgba(245,158,11,.28);
}
.avatar { box-shadow: 0 0 0 3px rgba(245,158,11,.18); }
.status-bar { background: rgba(2,6,23,.45); }
.status-bar-inner { min-height: 34px; }

/* Main spacing and headers */
.app-main { padding-top: 36px; }
.page-head { margin-bottom: 26px; align-items: center; }
.page-head h1 {
  font-size: clamp(28px, 3vw, 38px);
  letter-spacing: .01em;
  text-transform: none;
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  padding: 5px 10px;
  margin-bottom: 9px;
  border: 1px solid rgba(245,158,11,.20);
  border-radius: 999px;
  background: rgba(245,158,11,.09);
  letter-spacing: .10em;
}
.page-sub { font-size: 14.5px; }

/* Cards and panels */
.panel,
.kpi,
.filter-bar {
  border: 1px solid var(--modern-border);
  box-shadow: 0 10px 30px rgba(15,23,42,.07);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.panel { overflow: hidden; }
.panel:hover { transform: translateY(-2px); box-shadow: 0 18px 42px rgba(15,23,42,.10); }
.panel-head { padding: 22px 26px; }
.panel-pad { padding: 30px 32px; }
.kpi-grid { gap: 18px; }
.kpi {
  min-height: 126px;
  padding: 24px 26px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.kpi::before { width: 5px; }
.kpi::after {
  content: '';
  position: absolute;
  right: -24px;
  top: -30px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: rgba(148,163,184,.08);
}
.kpi.amber::after,.kpi.warn::after { background: rgba(245,158,11,.10); }
.kpi.good::after { background: rgba(16,185,129,.10); }
.kpi.bad::after { background: rgba(239,68,68,.10); }
.kpi-label { font-size: 11px; z-index: 1; }
.kpi-value { font-size: 42px; z-index: 1; }

/* Inputs */
.field { gap: 9px; }
.field label { font-size: 11.5px; letter-spacing: .065em; }
input, select, textarea {
  min-height: 46px;
  border-radius: 12px;
  border-color: #d7dee8;
  box-shadow: inset 0 1px 2px rgba(15,23,42,.025);
}
textarea { min-height: 105px; }
input:focus, select:focus, textarea:focus {
  border-color: var(--modern-accent);
  box-shadow: var(--modern-ring);
}

/* Buttons */
.btn {
  min-height: 42px;
  border-radius: 12px;
  padding: 11px 20px;
  letter-spacing: -.01em;
}
.btn-primary {
  background: linear-gradient(135deg, #fbbf24, #f59e0b);
  box-shadow: 0 9px 22px rgba(245,158,11,.24);
}
.btn-primary:hover { background: linear-gradient(135deg, #fcd34d, #f59e0b); }
.btn-dark { background: linear-gradient(135deg, #1e293b, #0f172a); }
.btn-danger { border: 1px solid rgba(239,68,68,.15); }
.btn-sm { min-height: 34px; border-radius: 10px; }

/* Register */
.filter-bar { padding: 14px; gap: 10px; }
.table-wrap { scrollbar-gutter: stable; }
table.reg { font-size: 13.5px; }
table.reg th {
  position: sticky;
  top: 0;
  z-index: 2;
  padding: 14px 15px;
  background: linear-gradient(180deg, #1e293b, #172033);
  letter-spacing: .07em;
}
table.reg td { padding: 12px 15px; height: 58px; }
table.reg tbody tr:hover td { background: rgba(245,158,11,.035); }
.badge { padding: 5px 11px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.25); }
.photo-thumb-strip img { transition: transform .18s ease, box-shadow .18s ease; }
.photo-thumb-strip img:hover { transform: scale(1.12); box-shadow: 0 7px 16px rgba(15,23,42,.24); }
.reg-pagination { border-top: 1px solid var(--table-divider); }

/* Login: premium split-depth card without changing markup */
.auth-main {
  background:
    radial-gradient(circle at 20% 20%, rgba(245,158,11,.18), transparent 28%),
    radial-gradient(circle at 78% 28%, rgba(37,99,235,.17), transparent 30%),
    linear-gradient(135deg, #07101f, #111827 55%, #0b1220);
}
.auth-card {
  max-width: 440px;
  padding: 42px;
  border: 1px solid rgba(255,255,255,.16);
  border-top: 1px solid rgba(255,255,255,.22);
  box-shadow: 0 30px 70px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.3);
}
.auth-card .brand { font-size: 24px; margin-bottom: 12px; }
.auth-card form { gap: 20px; }
.login-sync-row { margin: 24px 0 28px; }
.request-link-row button { padding: 8px; }
.auth-hint { font-size: 12px; }

/* Dark theme refinements */
html[data-theme="dark"] {
  --modern-glass: rgba(15,23,42,.78);
  --modern-border: rgba(148,163,184,.15);
}
html[data-theme="dark"] body {
  background:
    radial-gradient(circle at 8% 8%, rgba(245,158,11,.08), transparent 28%),
    radial-gradient(circle at 92% 18%, rgba(59,130,246,.10), transparent 25%),
    var(--page-bg);
  background-attachment: fixed;
}
html[data-theme="dark"] .panel,
html[data-theme="dark"] .kpi,
html[data-theme="dark"] .filter-bar {
  box-shadow: 0 14px 34px rgba(0,0,0,.28);
}
html[data-theme="dark"] table.reg tbody tr:hover td { background: rgba(245,158,11,.055); }
html[data-theme="dark"] .eyebrow { background: rgba(245,158,11,.11); }

/* Motion and accessibility */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
}

/* Responsive polish */
@media (max-width: 768px) {
  .topbar-inner { padding: 12px 16px; }
  .app-main { padding-top: 22px; }
  .page-head h1 { font-size: 30px; }
  .panel-pad { padding: 22px 18px; }
  .kpi { min-height: 106px; padding: 18px; }
  .kpi-value { font-size: 34px; }
  table.reg tr { padding: 8px 16px; border-radius: 16px; }
  table.reg td { min-height: 48px; height: auto; }
}
@media (max-width: 480px) {
  .auth-card { padding: 72px 24px 36px; }
  .page-head h1 { font-size: 27px; }
}


/* Organized register action controls */
table.reg td.register-actions {
  display: grid;
  grid-template-columns: minmax(118px, 1fr);
  align-content: center;
  justify-content: end;
  gap: 6px;
  width: 150px;
  min-width: 150px;
  max-width: 150px;
  padding: 8px 12px;
  white-space: normal;
}
table.reg td.register-actions .btn {
  width: 100%;
  min-width: 0;
  min-height: 34px;
  padding: 7px 10px;
  gap: 6px;
  white-space: nowrap;
  line-height: 1.1;
}
table.reg td.register-actions .btn-danger {
  order: 10;
  background: #fff1f2;
  border: 1px solid #fecdd3;
  color: #be123c;
}
table.reg td.register-actions .btn-danger:hover {

  border-color: #fda4af;

html[data-theme="dark"] table.reg td.register-actions .btn-danger {

html[data-theme="dark"] table.reg td.register-actions .btn-danger:hover {

@media (max-width: 768px) {

  table.reg td.register-actions .btn { width: auto; min-width: 108px; }

/* Unified application dialog for confirmations, warnings and messages */
.app-dialog-backdrop {
  position: fixed; inset: 0; z-index: 1000;
  display: grid; place-items: center; padding: 20px;
  background: rgba(2,6,23,.62);
  backdrop-filter: blur(7px); -webkit-backdrop-filter: blur(7px);
  animation: dialogFade .18s ease-out;
}
.app-dialog {
  width: min(440px, 100%); display: grid;
  grid-template-columns: 52px 1fr; gap: 16px;
  padding: 24px; border-radius: 20px;
  background: #fff; color: var(--steel-800);
  border: 1px solid rgba(255,255,255,.45);
  box-shadow: 0 28px 80px rgba(2,6,23,.36);
  animation: dialogPop .24s var(--ease-spring);
}
.app-dialog-icon {
  width: 48px; height: 48px; display: grid; place-items: center;
  border-radius: 15px; background: var(--amber-soft); color: var(--amber-dark);
  font-size: 22px; font-weight: 800;
}
.app-dialog[data-type="danger"] .app-dialog-icon { background: var(--bad-soft); color: var(--bad-dark); }
.app-dialog[data-type="success"] .app-dialog-icon { background: var(--good-soft); color: var(--good-dark); }
.app-dialog[data-type="info"] .app-dialog-icon { background: #dbeafe; color: #1d4ed8; }
.app-dialog-content h2 { margin: 1px 0 7px; font-size: 22px; text-transform: none; }
.app-dialog-content p { margin: 0; color: var(--steel-600); white-space: pre-line; line-height: 1.6; }
.app-dialog-actions { grid-column: 1 / -1; display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
.app-dialog-actions .btn { min-width: 100px; }
.app-dialog[data-type="danger"] #appDialogConfirm { background: var(--bad); color: #fff; box-shadow: 0 8px 20px rgba(239,68,68,.22); }
html[data-theme="dark"] .app-dialog { background: #111827; color: #e5edf7; border-color: rgba(148,163,184,.2); }
html[data-theme="dark"] .app-dialog-content h2 { color: #f8fafc; }
html[data-theme="dark"] .app-dialog-content p { color: #b8c4d4; }
@keyframes dialogFade { from { opacity: 0; } to { opacity: 1; } }
@keyframes dialogPop { from { opacity: 0; transform: translateY(12px) scale(.96); } to { opacity: 1; transform: none; } }
@media (max-width: 480px) {
  .app-dialog { grid-template-columns: 44px 1fr; padding: 20px; border-radius: 17px; }
  .app-dialog-icon { width: 42px; height: 42px; }
  .app-dialog-actions { flex-direction: column-reverse; }
  .app-dialog-actions .btn { width: 100%; }
}

@media (max-width: 768px) {
  table.reg td.register-actions {
    display: flex !important;
    width: 100%;
    min-width: 0;
    max-width: none;

// Tracks whichever upload is currently in flight, so it can be cancelled
let activeUploadTask = null;

// Upload Progress Wrapper
async function uploadWithProgress(path, file, btnEl) {
  if (!storage) throw new Error("Storage not initialized");
  const fileRef = storageRef(storage, path);
  const uploadTask = uploadBytesResumable(fileRef, file);
  activeUploadTask = uploadTask;

  const STALL_TIMEOUT_MS = 30000;

  return new Promise((resolve, reject) => {
    let settled = false;
    let stallTimer = null;
    let lastBytes = -1;

    const clearStallTimer = () => { if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; } };
    const finish = () => { clearStallTimer(); if (activeUploadTask === uploadTask) activeUploadTask = null; };

    const armStallTimer = () => {
      clearStallTimer();
      stallTimer = setTimeout(() => {
        if (settled) return;
        settled = true;
        try { uploadTask.cancel(); } catch (_) {}
        finish();
        showCloudSyncRetry('Cloud Sync upload failed');
        reject(new Error('Upload stalled with no progress for 30 seconds. Check your connection, or ask an admin.'));
      }, STALL_TIMEOUT_MS);
    };

    armStallTimer();

    uploadTask.on('state_changed', 
      (snapshot) => {
        if (snapshot.bytesTransferred > lastBytes) {
          lastBytes = snapshot.bytesTransferred;
          armStallTimer(); 
        }
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        const pct = Math.round(progress);
        if (btnEl) btnEl.innerHTML = `<span class="spinner"></span> Uploading... ${pct}%`;
        setSyncingState(true, `Cloud Sync ${pct}%`);
        setCloudSyncProgress(pct);
      }, 
      (error) => {
        if (settled) return;
        settled = true;
        finish();
        console.error("Upload error:", error);
        showCloudSyncRetry(error && error.code === 'storage/canceled' ? 'Cloud Sync canceled' : 'Cloud Sync upload failed');
        reject(error && error.code === 'storage/canceled' ? new Error('Upload canceled.') : error);
      }, 
      async () => {
        if (settled) return;
        settled = true;
        finish();
        try {
          const url = await getDownloadURL(uploadTask.snapshot.ref);
          resolve(url);
        } catch (e) {
          reject(e);
        }
      }
    );
  });
}

// Client-Side Image Compressor
async function compressImage(file, maxWidth = 1280, quality = 0.7) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        let width = img.width;
        let height = img.height;

        if (width > maxWidth) {
          height = Math.round((height * maxWidth) / width);
          width = maxWidth;
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        // JPEG has no alpha channel. Without this fill, any transparent
        // areas in the source image (e.g. a PNG logo/screenshot) render as
        // solid black once converted, silently corrupting the photo.
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        canvas.toBlob((blob) => {
          if (blob) {
            const compressedFile = new File([blob], file.name.replace(/\.[^/.]+$/, "") + ".jpg", {
              type: 'image/jpeg',
              lastModified: Date.now()
            });
            resolve(compressedFile);
          } else {
            resolve(file); 
          }
        }, 'image/jpeg', quality);
      };
      img.onerror = () => resolve(file); 
    };
    reader.onerror = () => resolve(file); 
  });
}

function preferredTheme() {
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') return saved;
  } catch (_) {}
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}
function applyTheme(theme, persist = false) {
  const resolved = theme === 'dark' ? 'dark' : 'light';
  document.documentElement.dataset.theme = resolved;
  const dark = resolved === 'dark';
  ['themeToggle', 'authThemeToggle'].forEach((id) => {
    const toggle = $('#' + id);

    toggle.setAttribute('aria-label', dark ? 'Switch to light theme' : 'Switch to dark theme');
    toggle.title = dark ? 'Switch to light theme' : 'Switch to dark theme';
  });
  if (persist) {
    try { localStorage.setItem(THEME_KEY, resolved); } catch (_) {}
  }
}

  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark', true);
}

  try {

    try { storage = getStorage(app); } catch (e) { storage = null; }
  } catch (err) {

      lastSyncedAt = new Date();
      if (!appBootstrapped) {

// Before the first real-time snapshot arrives, issuesCache is genuinely empty —
// showing "0" for every KPI reads as "there are no records" rather than

function formatTimestamp(ms) {
  if (!ms || typeof ms !== 'number') return 'Syncing...'; 
  
  const d = new Date(ms);
  return d.toLocaleString(undefined, {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function renderRegister() {
  const isAdmin = currentUser.role === 'admin';
  let rows = enrichedIssues();

  if (registerFilterState.q) {
    const needle = registerFilterState.q.toLowerCase();
    rows = rows.filter((r) => {
      const rowText = [
        r.materialName, r.vendor, r.area, r.supervisorName, 
        r.empCode, r.issueDate, r.returnDate, r.status
      ].join(' ').toLowerCase();
      
      return rowText.includes(needle);
    });
  }
  
  if (registerFilterState.status !== 'all') {
    rows = rows.filter((r) => r.status.replace(/\s/g, '').toLowerCase() === registerFilterState.status);
  }

  if (registerFilterState.year !== 'all') {
    rows = rows.filter(r => r.issueDate && r.issueDate.startsWith(registerFilterState.year));
  }
  
  if (registerFilterState.month !== 'all') {
    rows = rows.filter(r => {
      if (!r.issueDate) return false;
      const parts = r.issueDate.split('-'); 
      return parts[1] === registerFilterState.month;
    });
  }

  const activeFilterCount = [
    !!registerFilterState.q,
    registerFilterState.status !== 'all',
    registerFilterState.year !== 'all',
    registerFilterState.month !== 'all',
  ].filter(Boolean).length;

  const totalRows = rows.length;
  const totalPages = Math.max(1, Math.ceil(totalRows / REG_PAGE_SIZE));
  if (registerFilterState.page > totalPages) registerFilterState.page = totalPages;
  if (registerFilterState.page < 1) registerFilterState.page = 1;
  const pageStart = (registerFilterState.page - 1) * REG_PAGE_SIZE;
  const pageRows = rows.slice(pageStart, pageStart + REG_PAGE_SIZE);

  // Always include the current year (even with zero records so far) plus any
  // year that actually appears in the data — instead of a fixed 2024–2028
  // list that would silently go stale in 2029 and can't reach older records.
  const yearOptions = Array.from(new Set([
    String(new Date().getFullYear()),
    ...issuesCache.map((r) => r.issueDate ? r.issueDate.slice(0, 4) : null).filter(Boolean),
  ])).sort((a, b) => b.localeCompare(a));

  return `
    <div class="page-head">
      <div>
        <span class="eyebrow">Records</span>
        <h1>${isAdmin ? 'Full Register' : 'Issue & Return Register'}</h1>
        <div class="page-sub">${isAdmin ? 'Every record. Admins can remove entries here.' : 'All material movements logged by the store.'}</div>
      </div>
    </div>

    <button type="button" class="btn btn-ghost filter-toggle" id="filterToggleBtn" aria-expanded="${registerFiltersOpen ? 'true' : 'false'}" aria-controls="regFilterBar">
      <span>Filters${activeFilterCount ? `<span class="count-badge">${activeFilterCount}</span>` : ''}</span>
      <span aria-hidden="true">${registerFiltersOpen ? '▲' : '▼'}</span>
    </button>

    <div class="filter-bar${registerFiltersOpen ? ' open' : ''}" id="regFilterBar">
      <input type="text" id="regSearch" placeholder="Search material, vendor, area, supervisor…" value="${escapeHtml(registerFilterState.q)}" aria-label="Search register" />
      <select id="regStatus" aria-label="Filter by status">
        <option value="all" ${registerFilterState.status === 'all' ? 'selected' : ''}>All statuses</option>
        <option value="issued" ${registerFilterState.status === 'issued' ? 'selected' : ''}>Issued</option>
        <option value="returned" ${registerFilterState.status === 'returned' ? 'selected' : ''}>Returned</option>
      </select>
      <select id="regYear" aria-label="Filter by year">
        <option value="all" ${registerFilterState.year === 'all' ? 'selected' : ''}>All Years</option>
        ${yearOptions.map((y) => `<option value="${y}" ${registerFilterState.year === y ? 'selected' : ''}>${y}</option>`).join('')}
      </select>
      <select id="regMonth" aria-label="Filter by month">
        <option value="all" ${registerFilterState.month === 'all' ? 'selected' : ''}>All Months</option>
        <option value="01" ${registerFilterState.month === '01' ? 'selected' : ''}>Jan</option>
        <option value="02" ${registerFilterState.month === '02' ? 'selected' : ''}>Feb</option>
        <option value="03" ${registerFilterState.month === '03' ? 'selected' : ''}>Mar</option>
        <option value="04" ${registerFilterState.month === '04' ? 'selected' : ''}>Apr</option>
        <option value="05" ${registerFilterState.month === '05' ? 'selected' : ''}>May</option>
        <option value="06" ${registerFilterState.month === '06' ? 'selected' : ''}>Jun</option>
        <option value="07" ${registerFilterState.month === '07' ? 'selected' : ''}>Jul</option>
        <option value="08" ${registerFilterState.month === '08' ? 'selected' : ''}>Aug</option>
        <option value="09" ${registerFilterState.month === '09' ? 'selected' : ''}>Sep</option>
        <option value="10" ${registerFilterState.month === '10' ? 'selected' : ''}>Oct</option>
        <option value="11" ${registerFilterState.month === '11' ? 'selected' : ''}>Nov</option>
        <option value="12" ${registerFilterState.month === '12' ? 'selected' : ''}>Dec</option>
      </select>
    </div>

    <div class="panel">
      <div class="table-wrap">
        ${rows.length === 0 ? (
          issuesLoaded
            ? `<div class="empty-state"><div class="display">No matching records</div><p>Try clearing filters, or log a new issue to get started.</p></div>`
            : `<div class="empty-state"><span class="spinner"></span><p style="margin-top:10px;">Loading records…</p></div>`
        ) : `
        <table class="reg">
          <thead>
            <tr>
              <th scope="col">Material</th><th scope="col">Qty Issued</th><th scope="col">Vendor</th><th scope="col">Area</th>
              <th scope="col">Issue Date</th><th scope="col">Issued At</th><th scope="col">Supervisor</th><th scope="col">Issued By</th>
              <th scope="col">Return Date</th><th scope="col">Returned At</th><th scope="col">Received By</th><th scope="col">Qty Returned</th><th scope="col">Qty Remaining</th><th scope="col">Condition</th><th scope="col">Return Photo</th><th scope="col">Issue Photo</th><th scope="col">Status</th>
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody>
            ${pageRows.map((r) => {
              const qtyReturned = r.qtyReturned || 0;
              const qtyRemaining = r.qtyIssued - qtyReturned;
              return `
              <tr>
                <td data-label="Material">${escapeHtml(r.materialName)}</td>
                <td class="qty" data-label="Qty Issued">${r.qtyIssued}</td>
                <td data-label="Vendor">${escapeHtml(r.vendor) || '—'}</td>
                <td data-label="Area">${escapeHtml(r.area) || '—'}</td>
                <td class="mono" data-label="Issue Date">${escapeHtml(r.issueDate)}</td>
                <td class="mono" data-label="Issued At">${formatTimestamp(r.createdAt)}</td>
                <td data-label="Supervisor">${escapeHtml(r.supervisorName) || '—'}${r.supervisorContact ? `<br/><span class="muted" style="font-size:11px;">${escapeHtml(r.supervisorContact)}</span>` : ''}</td>
                <td data-label="Issued By">${escapeHtml(r.issuedByName) || '—'}${r.empCode ? `<br/><span class="muted" style="font-size:11px;">${escapeHtml(r.empCode)}</span>` : ''}</td>
                <td class="mono" data-label="Return Date">${escapeHtml(r.returnDate) || '—'}</td>
                <td class="mono" data-label="Returned At">${r.returnedAt ? formatTimestamp(r.returnedAt) : '—'}</td>
                <td data-label="Received By">${escapeHtml(r.receivedByName) || '—'}</td>
                <td class="qty" data-label="Qty Returned">${qtyReturned}</td>
                <td class="qty ${qtyRemaining > 0 && r.status !== 'Returned' ? 'qty-pending' : ''}" data-label="Qty Remaining">${qtyRemaining > 0 ? qtyRemaining : '—'}</td>
                <td data-label="Condition">${escapeHtml(r.conditionOnReturn) || '—'}</td>
                <td data-label="Return Photo">${renderPhotoThumbs(r.returnPhotoUrls || r.returnPhotoUrl, 'Return photo')}</td>
                <td data-label="Issue Photo">${renderPhotoThumbs(r.photoUrls || r.photoUrl, 'Issue photo')}</td>
                <td data-label="Status">
                  ${r.status === 'Returned' ? '<span class="badge good">Returned</span>' : '<span class="badge warn">Issued</span>'}
                </td>
                <td data-label="Action" class="register-actions">
                  ${r.status !== 'Returned' ? `<button class="btn btn-dark btn-sm" data-return="${r.id}">Record Return</button>` : ''}
                  
                  ${r.status !== 'Returned' ? `<button class="btn btn-ghost btn-sm" data-edit-issue="${r.id}">Edit Issue</button>` : ''}
                  
                  ${isAdmin && r.status === 'Returned' ? `<button class="btn btn-ghost btn-sm" data-edit-return="${r.id}">Edit Return</button>` : ''}
                  ${isAdmin ? `<button class="btn btn-danger btn-sm" data-delete-issue="${r.id}"><span aria-hidden="true">🗑</span><span>Delete</span></button>` : ''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div class="reg-pagination">
          <button type="button" class="btn btn-ghost btn-sm" id="regPagePrev" ${registerFilterState.page <= 1 ? 'disabled' : ''} aria-label="Previous page">← Prev</button>
          <span class="reg-page-info" role="status" aria-live="polite">Page ${registerFilterState.page} of ${totalPages} · ${totalRows} record${totalRows === 1 ? '' : 's'}</span>
          <button type="button" class="btn btn-ghost btn-sm" id="regPageNext" ${registerFilterState.page >= totalPages ? 'disabled' : ''} aria-label="Next page">Next →</button>
        </div>
        `}
      </div>
    </div>`;
}

function renderStorageUsage() {
  const holder = $('#storageUsageHolder');
  if (!holder) return;

  const LIMIT_KB = 1024 * 1024; 

  const sections = [
    { label: 'Issues', data: issuesCache, color: '#3b82f6' },
  ];

  let usersKB = 0;
  const usersSizePromise = get(ref(db, 'users')).then((snap) => {
    const val = snap.val();
    usersKB = val ? new Blob([JSON.stringify(val)]).size / 1024 : 0;
  }).catch(() => { usersKB = 0; });

  usersSizePromise.then(() => {
    if (!document.contains(holder)) return;

    const breakdown = sections.map((s) => ({
      ...s, kb: new Blob([JSON.stringify(s.data)]).size / 1024,
    }));
    breakdown.push({ label: 'Users', kb: usersKB, color: '#8b5cf6' });

    const usedKB = breakdown.reduce((sum, s) => sum + s.kb, 0);
    const freeKB = Math.max(0, LIMIT_KB - usedKB);
    const pct = Math.min(100, (usedKB / LIMIT_KB) * 100);

    holder.innerHTML = `
      <div class="storage-bar-wrap">
        <div class="storage-bar-track">
          <div class="storage-bar-fill" style="width:${pct.toFixed(3)}%; background:${pct > 80 ? 'linear-gradient(90deg,#ef4444,#f59e0b)' : 'linear-gradient(90deg,#10b981,#f59e0b)'};"></div>
        </div>
        <div class="storage-bar-caption">
          <span>${usedKB.toFixed(2)} KB used</span>
          <span>${pct.toFixed(3)}% of ~1 GB free-tier limit</span>
        </div>
      </div>
      <div class="storage-legend">
        ${breakdown.map((s) => `
          <div class="storage-legend-row">
            <span class="storage-dot" style="background:${s.color};"></span>
            <span class="storage-legend-label">${s.label}</span>
            <span class="storage-legend-val mono">${s.kb.toFixed(2)} KB</span>
          </div>`).join('')}
        <div class="storage-legend-row storage-legend-free">
          <span class="storage-dot" style="background:var(--steel-100); border:1px solid var(--steel-300);"></span>
          <span class="storage-legend-label">Free</span>
          <span class="storage-legend-val mono">${freeKB.toFixed(2)} KB</span>
        </div>
      </div>
      <div class="muted" style="font-size:12.5px; margin-top:16px;">
        Estimated from data currently loaded in this session.
      </div>`;
  });
}

function wireViewEvents(viewId) {
  $$('[data-nav]').forEach((btn) => btn.addEventListener('click', () => {
    if (activeUploadTask) { try { activeUploadTask.cancel(); } catch (_) {} }
    navigateTo(btn.dataset.nav);
  }));
  $$('.kpi-button[data-kpi-status]').forEach((card) => card.addEventListener('click', () => {
    registerFilterState.status = card.dataset.kpiStatus || 'all';
    registerFilterState.q = '';
    registerFilterState.month = 'all';
    registerFilterState.year = 'all';
    registerFilterState.page = 1;
    navigateTo('register');
  }));

  if (viewId === 'register') {
    $('#regSearch')?.addEventListener('input', (e) => {
      const value = e.target.value;
      const cursorPos = e.target.selectionStart;
      clearTimeout(regSearchDebounceTimer);
      regSearchDebounceTimer = setTimeout(() => {
        registerFilterState.q = value;
        registerFilterState.page = 1;
        render();
        const input = $('#regSearch');
        if (input) { input.focus(); input.setSelectionRange(cursorPos, cursorPos); }
      }, 300);
    });

    $('#regStatus')?.addEventListener('change', (e) => { registerFilterState.status = e.target.value; registerFilterState.page = 1; render(); });
    $('#regYear')?.addEventListener('change', (e) => { registerFilterState.year = e.target.value; registerFilterState.page = 1; render(); });
    $('#regMonth')?.addEventListener('change', (e) => { registerFilterState.month = e.target.value; registerFilterState.page = 1; render(); });

    $('#filterToggleBtn')?.addEventListener('click', () => {
      registerFiltersOpen = !registerFiltersOpen;
      render();
    });

    $('#regPagePrev')?.addEventListener('click', () => {
      if (registerFilterState.page > 1) { registerFilterState.page -= 1; render(); }
    });
    $('#regPageNext')?.addEventListener('click', () => {
      registerFilterState.page += 1;
      render();
    });
    
    $$('[data-return]').forEach((btn) => btn.addEventListener('click', () => {
      returnFormTargetId = btn.dataset.return;
      returnFormError = '';
      navigateTo('return-record');
    }));
    $$('[data-delete-issue]').forEach((btn) => btn.addEventListener('click', async () => {
      if (await appConfirm('Delete this register entry permanently? This action cannot be undone.', { title: 'Delete register entry', type: 'danger', confirmText: 'Delete' })) deleteIssue(btn.dataset.deleteIssue);
    }));
    $$('[data-edit-return]').forEach((btn) => btn.addEventListener('click', () => {
      editReturnTargetId = btn.dataset.editReturn;
      editReturnError = '';
      navigateTo('edit-return');
    }));
    $$('[data-edit-issue]').forEach((btn) => btn.addEventListener('click', () => {
      editIssueTargetId = btn.dataset.editIssue;
      editIssueError = '';
      navigateTo('edit-issue');
    }));
  }

  if (viewId === 'profile') {
    $('#p_photo').addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { profileSelectedPhotoFile = null; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      
      const reader = new FileReader();
      reader.onload = () => { $('#p_avatarPreview').src = reader.result; };
      reader.readAsDataURL(file);
      
      // Compress the profile photo to max width 400px, 80% quality
      profileSelectedPhotoFile = await compressImage(file, 400, 0.8);
    });
    $('#profileForm').addEventListener('submit', handleProfileSubmit);
  }

  if (viewId === 'issue-new') {
    $('#issueForm').addEventListener('submit', handleIssueSubmit);
    $('#f_photo').addEventListener('change', handlePhotoSelected);
    $('#f_photoClear').addEventListener('click', clearSelectedPhoto);
  }

  if (viewId === 'return-record') {
    $('#returnForm').addEventListener('submit', handleReturnSubmit);
    $('#r_photo').addEventListener('change',async(e)=>{const files=Array.from(e.target.files||[]);if(!files.length){returnSelectedPhotoFiles=[];$('#r_photoPreviewWrap').style.display='none';return;}if(files.some(f=>!f.type.startsWith('image/'))){alert('Please choose image files only.');e.target.value='';return;}returnSelectedPhotoFiles=await Promise.all(files.map(f=>compressImage(f)));previewSelectedImages(files,'#r_photoPreview');});
    $('#r_photoClear').addEventListener('click',()=>{returnSelectedPhotoFiles=[];const i=$('#r_photo');if(i)i.value='';$('#r_photoPreviewWrap').style.display='none';$('#r_photoPreview').innerHTML='';});
  }

  if (viewId === 'edit-return') {
    $('#editReturnForm').addEventListener('submit', handleEditReturnSubmit);
    $('#er_photo').addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) { editReturnSelectedPhotoFile = null; $('#er_photoPreviewWrap').style.display = 'none'; return; }
      if (!file.type.startsWith('image/')) { alert('Please choose an image file.'); e.target.value = ''; return; }
      
      const reader = new FileReader();
      reader.onload = () => { $('#er_photoPreview').src = reader.result; $('#er_photoPreviewWrap').style.display = 'block'; };
      reader.readAsDataURL(file);

      editReturnSelectedPhotoFile = await compressImage(file);
    });
    $('#er_photoClear').addEventListener('click', () => {
      editReturnSelectedPhotoFile = null;
      const input = $('#er_photo');
      if (input) input.value = '';
      $('#er_photoPreviewWrap').style.display = 'none';
    });
  }

    $('#editIssueForm').addEventListener('submit', handleEditIssueSubmit);

      const file = e.target.files && e.target.files[0];

      editIssueSelectedPhotoFile = null;
      const input = $('#ei_photo');
      if (input) input.value = '';
      $('#ei_photoPreviewWrap').style.display = 'none';
    });
  }

  if (viewId === 'users-admin') {
    $('#newUserForm').addEventListener('submit', handleNewUserSubmit);
    loadRequestsTable();

  }

  if (viewId === 'settings-admin') {
    renderStorageUsage();
    $('#refreshSyncStatusBtn')?.addEventListener('click', () => render());
    $('#cleanupOldRecordsBtn')?.addEventListener('click', handleCleanupOldRecords);
  }
}

async function handleProfileSubmit(e) {
  e.preventDefault();
  if (!profileSelectedPhotoFile) { alert('No new photo selected.'); return; }
  
  const btn = $('#profileSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving...';
  setSyncingState(true, 'Uploading profile photo...');
  
  try {
    const ext = (profileSelectedPhotoFile.name.split('.').pop() || 'jpg').slice(0, 8);
    const path = `profile-photos/${currentUser.username}.${ext}`;
    const url = await uploadWithProgress(path, profileSelectedPhotoFile, btn);
    
    await update(ref(db, 'users/' + currentUser.username), { profilePhotoUrl: url, profilePhotoPath: path });
    
    currentUser.profilePhotoUrl = url;
    saveSession(currentUser);
    
    $('#topbarAvatar').src = url;
    $('#topbarAvatar').classList.remove('hidden');
    
    alert('Profile photo updated successfully!');
    profileSelectedPhotoFile = null;
    render();
  } catch (err) {
    alert('Could not upload photo: ' + (err.message || 'unknown error'));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Save Profile Photo'; }
    setSyncingState(false);
  }
}

async function handlePhotoSelected(e){const files=Array.from(e.target.files||[]);if(!files.length){clearSelectedPhoto();return;}if(files.some(f=>!f.type.startsWith('image/'))){alert('Please choose image files only.');e.target.value='';return;}selectedPhotoFiles=await Promise.all(files.map(f=>compressImage(f)));previewSelectedImages(files,'#f_photoPreview');}
function clearSelectedPhoto(){selectedPhotoFiles=[];const i=$('#f_photo');if(i)i.value='';const w=$('#f_photoPreviewWrap');if(w)w.style.display='none';const p=$('#f_photoPreview');if(p)p.innerHTML='';}
async function handleIssueSubmit(e) {
  e.preventDefault();
  issueFormError = '';
  hideInlineError('issueFormAlert');
  
  const materialName = $('#f_material').value.trim();
  const qty = parseInt($('#f_qty').value, 10);
  const vendor = $('#f_vendor').value.trim();
  const area = $('#f_area').value.trim();

  const supervisorName = $('#f_supervisorName').value.trim();
  const supervisorContact = $('#f_supervisorContact').value.trim();
  const empCode = $('#f_empCode').value.trim();
  const remarks = $('#f_remarks').value.trim();

  if (!materialName || !qty || qty <= 0 || !vendor || !area || !supervisorName || !supervisorContact) {
    issueFormError = 'Please fill in material, quantity, vendor, area, supervisor name, and supervisor contact number.';
    showInlineError('issueFormAlert', issueFormError);
    return;
  }
  
  if (!/^\d{10}$/.test(supervisorContact)) {
    issueFormError = 'Supervisor contact number must be exactly 10 digits.';
    showInlineError('issueFormAlert', issueFormError);
    return;
  }

  const photosToUpload = [...selectedPhotoFiles];
  const btn = $('#issueSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  
  setSyncingState(true, 'Saving record...');
  try {
    const newRef = push(ref(db, 'issues'));
    let uploadedPhotoUrls=[],uploadedPhotoPaths=[];
    if(photosToUpload.length&&storage){try{const u=await uploadMultiplePhotos('issue-photos',newRef.key,photosToUpload,btn);uploadedPhotoUrls=u.urls;uploadedPhotoPaths=u.paths;}catch(e){alert('The issue will be saved, but one or more photos could not be uploaded: '+(e.message||'unknown error'));}}
    await set(newRef, {
      materialName, qtyIssued: qty, vendor, area, empCode: empCode || null,
      issueDate, supervisorName, supervisorContact, returnDate: null, qtyReturned: 0, conditionOnReturn: null,
      issuedBy: currentUser.username, issuedByName: currentUser.fullName, receivedBy: null, receivedByName: null,
      remarks: remarks || null, 
      photoUrls: uploadedPhotoUrls,
      photoPaths: uploadedPhotoPaths, 
      createdAt: serverTimestamp(), updatedAt: serverTimestamp(),
    });

    clearSelectedPhoto();
    navigateTo('register');
  } catch (err) {
    issueFormError = 'Could not save this record: ' + (err.message || 'unknown error');
    showInlineError('issueFormAlert', issueFormError);
    btn.disabled = false; btn.textContent = 'Save Issue Record';
  } finally {
    setSyncingState(false);
  }

async function handleEditIssueSubmit(e) {
  e.preventDefault();
  editIssueError = '';
  hideInlineError('editIssueFormAlert');
  const issue = issuesCache.find((i) => i.id === editIssueTargetId);
  if (!issue) return;

  const materialName = $('#ei_material').value.trim();
